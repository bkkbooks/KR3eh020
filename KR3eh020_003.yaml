body:
  text: 雜病心法集解卷三真中風門總括經曰風者善行而數變腠理開則灑然寒閉則熱而悶其寒也則衰飲食其熱也則消肌肉蓋天地間惟風無所不入人受之者輕為感冒重則為傷重甚則為中然必其人真氣先虛營衛空疏然後外邪乘虛而入經所謂邪之所湊其氣必虛是也故中風之症河間以為將息失宜心火暴甚丹溪以為濕生痰痰生熱熱生風東垣以為本氣自病若以風為虛象者所以治法有清熱化痰養血順氣之不同而不專用風藥也心法要訣風從外中傷肢體痰火內發病心官體傷不仁與不用心病神昏不語言當分中絡經腑藏更審虛實寒熱痰脫症撒手為脾絕口開眼合絕心肝遺尿腎絕鼾聲肺閉症握固緊牙關初用通關散取嚏痰壅不下吐為先中風辨症平日寸關尺脈俱平之人忽然卒中昏死者此因中邪太甚閉塞九竅天真之氣不能與人之生氣相通則獨絕於內也譬如墜跌溺水豈能預期其死耶中風之脈一息七八至不大不小雖困可治若大而無倫小而如纖浮主晝死沉主夜亡至五臟脫症若三臟四臟並見者皆死候也救急方法凡中風中痰中惡初起卒然昏死俱用通關散吹鼻有嚏者生無者肺絕若牙關緊閉用開關散擦之痰壅氣悶口噤昏死用熏鼻法開之若舌強難言用解語法點之口噤咬牙戰慄鼓頷用烏梅方擦之湧吐方法凡中風中痰中惡初起痰涎壅盛無汗表實者服二聖散三聖散吐之若有汗裡實者用瓜蒂散加全蠍吐之甚者服五元散巴礬丸以上諸方皆見醫方湧吐門灌藥方法凡中風口噤湯藥不能下咽者須研碎應用之藥滾湯泡熟調如稀粥狀先以竹管插病人鼻孔醫者含前藥從管中用氣徐徐吹入但得下咽其病自解此法神妙免得撬牙折齒總注曰中風症分中血脈中腑中臟始自李東垣中血脈者用大秦艽湯中腑者用小續命湯中臟者用三化湯然從未見有三化湯中臟之症惟金匱書中分為四症曰絡曰經曰腑曰臟其說最為的當蓋口眼喎斜肌膚不仁邪在絡也左右不遂筋骨不用邪在經也昏不識人便溺阻隔邪在腑也神昏不語唇緩涎出邪在臟也分別症治於下中絡實症風邪中絡之人形氣實者其症口眼歪斜肌膚麻木風氣攻注骨節煩疼主以烏藥順氣散見醫方理氣門隨症加味經曰風勝則氣壅壅於皮膚則頑麻壅於骨節則煩痛壅於口面則喎斜壅於胸喉則痰喘壅於脈絡則語澀行難用此散先解表氣而兼順裡氣氣順則風散風邪卒中當先治標若氣虛病久非所宜也中絡虛症風邪中絡之人形氣虛者其症半身不遂手足不能運掉舌強不能言語主以大秦艽湯或服小續命湯隨症加味俱見醫方祛風門經曰掌受血而能握足受血而能步又脾主四肢脾弱血虛不能榮筋故手足不能運掉舌為心苗腎脈連舌本心火盛而腎水衰故舌本強硬若外無六經絕症內無便溺阻隔此屬輕症服此自愈中經實症風邪中經之人形氣實者其症左癱右瘓左體不用曰癱右體不用曰瘓主以換骨丹搜風順氣丸俱見祛風門或服萬靈丹見外科醫方地字號中經虛症風邪中經之人形氣虛者其症左癱右瘓筋脈拘急口眼歪斜語言蹇澀主以小續命湯隨症加減見祛風門注曰陰虛火旺痰隨火湧經絡中風不省人事風中左體為左癱屬血虛風中右體為右瘓屬氣虛即半身不遂症也風中血脈則拘急風中口面則喎斜風中舌本則語澀風濕中腰則腰痛主以小續命湯加減通治五痹八風分別在後中經絡閉症亦有風邪中經絡而為表邪固閉者其症口眼歪斜四肢拘急身體遍痛惡寒無汗氣盛喘促法宜開表服還魂湯見發表門千金方用此湯治邪在肺經卒中暴厥口噤氣絕下咽奏效治因虛召風有因虛召風中人經絡而病半身不遂者然審其人若舌強難言神氣不清者則是痰火為病治法詳後如神氣清爽但語言蹇澀舌軟無力而難言者乃是營衛不足之病主以黃耆五物湯見祛風門照法加味八風者冬至日正北大剛風立春日東北凶風春分日正東嬰風立夏日東南弱風夏至日正南大弱風立秋日西南謀風秋分日正西剛風立冬日西北折風此八風應時而至主生養萬物不應時而至主殺害萬物然必其人形氣素虛八方邪風方能中人為病也中腑實症風邪中腑之人形氣實者其症卒然昏倒不省人事大小便秘腹滿脹甚主以三化湯通利三焦見攻裡門中腑虛症風邪中腑之人形氣虛者雖有前症腹脹必緩不可峻攻須緩緩瀉之主以搜風順氣丸見祛風門注曰凡久病中風之人大便多燥結謂之風燥或初起以用小續命湯汗過次用三化湯下過津液枯竭以致燥結者但服此丸緩緩取效又曰凡中風不論經絡臟腑但見二便阻隔而無痞滿燥實堅之實症其人形氣不足難任攻下者均服此丸以搜六腑之風通腸胃中之氣二便自利矣中臟實症風邪中臟之人形氣實者其症痰涎壅塞神昏不語口眼喎斜兩手握固及牙關噤急喘滿閉症俱服牛黃清心丸見祛風門中臟虛症風邪中臟之人形氣虛者其症唇緩不收痰涎流出神昏不語身肢偏廢或與脫症同見者急服參附湯見補養門先固虛脫後治風邪或服回陽救急湯見祛寒門脫症見首篇集解中臟腑閉症亦有風邪中臟腑而為風痰閉結者其症腹滿便秘神昏口噤痰結咽喉壅閉不通急用奪命散吐下之見湧吐門或用前篇救急湧吐諸法開關之後按後篇附法門中選方施治中風附法總注中絡者邪方入衛尚在經脈之外故但肌膚不仁也中經者邪已入營脈之中骨肉皆失所養故身體重著而癱瘓也至於中腑中臟則已離外而內邪入深矣其中腑必歸於胃者胃為六府之也中臟必歸於心者心為神明之主宰也風入胃中胃熱必盛蒸其津液結為痰涎胃之大絡入心痰涎壅盛堵其出入之竅故中腑則不識人也諸臟受邪逆入於心則神明無主故中臟者舌縱難言廉泉穴開而流涎沫也廉泉穴在舌下竅通於腎津液之所出也凡臟寒之人卒中風寒無論中經絡臟腑但見六脈沉伏四肢逆冷者俱服三生飲見祛風門凡腑熱之人卒中風熱無論中臟腑經絡但見六脈浮數身熱心煩者俱服祛風至寶湯見祛風門凡痰飲之人卒中風痰無論中經絡臟腑但見脈浮滑有力痰涎壅盛者俱服青洲白丸子見除痰門要之風從外中其來必有先兆如手足無力語言蹇澀肌肉時或掣動手大指次指或微痛麻木不用者皆風邪外中之先兆也預服羌活愈風湯以防之老弱虛人常服大秦艽湯俱見祛風門中風脈略喻嘉言曰中風之脈必有所兼兼寒則浮緊兼風則浮緩兼熱則浮數兼痰則浮滑兼氣則浮澀兼火則盛大兼陽虛則脈微兼陰虛則細數虛滑為頭痛緩遲為營衛衰然虛浮遲數正氣不足尚可補救急大數疾邪不受制必死無疑若數大未至急疾尚有得生者矣內中痰火痰火內發迷人心竅令人精神恍惚舌強難言甚者神氣昏憒口噤卒倒無論中經絡臟腑主以滌痰湯清熱化痰湯若實痰便秘服礞石滾痰丸熱痰氣聚服清氣化痰湯俱見除痰門救急湧吐均按湧吐門要之痰火內中之病其來必有先兆如神短忽忽言語失常上盛下虛頭眩腳軟皆痰火內發之先兆也常服清熱化痰清氣化痰二湯預防之蓋痰即有形之火火即無形之痰痰隨火而升降火引痰而橫行變生諸症不可紀極火借氣於五臟痰借液於五味氣有餘則為火液有餘則為痰故治痰者必降其火治火者必順其氣所謂治痰先理氣也心在竅為舌心別脈系舌根脾脈連舌本散舌下腎脈挾舌本三脈虛則痰涎乘虛閉其脈道故舌不能轉運言語也凡風痰塞其經絡舌強不能言其症為重若痰火上攻舌腫不能轉者此屬輕症也風痱偏枯風痱症四肢不收身無痛處偏枯症半身不遂身有痛處皆語言不變神志不亂乃輕邪微病在分腠營衛之間治宜補營衛兼散風邪當服黃耆五物湯見祛風門喑痱重症喑痱症邪已入臟腎虛內奪少陰心氣不至志亂神昏口不能言厥逆悶死急服加味地黃飲見祛風門此因心脾腎三脈亡血不能營養舌本故風痰卒中即聲啞不能言也與前舌強舌軟有輕重之別類中風門總括類中風有九症一曰屍厥謂形厥而氣不厥也故口鼻無氣狀類死屍但脈自活動心口微溫也其他中虛中氣中食中寒中火中濕中暑中惡雖皆忽然昏倒不省人事類乎真中風病但不見口眼喎斜偏廢偏枯不仁不用等症與真中風為異耳集解汪訒庵曰西北風氣剛勁虛人感之多成真中風可用風藥下以治之南方卑濕質弱氣虛雖有中症而實不同名曰類中風治宜兼補養屍厥屍厥症忽然昏倒口鼻無氣狀類死屍卻脈息如常胸腹不冷古有數日復甦者臨時切忌推搖亂叫當審其脈之虛實兼寒兼痰分別救之如脈動而有力其先必二便秘結腹滿脹痛面紅唇赤然後昏死當用備急丸攻之見攻裡門實症兼痰用奪命散吐下之見湧吐門如脈微細無力其人必氣血素虛用獨參湯救之虛兼寒者用參附湯或用十全大補湯加菖蒲遠志俱見補養門如脈滑無力其人平日體肥痰甚者服星香散虛加人參見除痰門中虛中虛症即李杲所云本氣自病見後集解蓋內傷氣虛之人煩勞過度清氣不升忽然昏死主以補中益氣湯見理氣門欲冒症謂體虛勞碌之人房勞過度忽然昏冒甚或登時卒死手撤口開面帶歡容陰流敗精此名陰陽脫症緩則不救當令所交接之人扶其口以熱氣度入腹中頻頻吸引不可移動最要得法勿顧羞恥濃煎人參麥冬五味子當歸熟地酥炙鹿茸湯俟稍動息時灌入下咽良久必蘇李東垣曰中風非外來風邪乃本氣自病也凡人年逾四五旬氣衰之際或憂喜憤怒傷其氣者多患此症少壯人無有也若肥盛者則間有之亦是形盛氣衰方致此耳中氣中氣症脈沉手足冷不似中風脈浮手足溫也如形氣俱實之人因暴怒氣逆忽然昏倒噤急者服木香流氣飲形氣素虛之人中氣昏倒則當標本兼施邪正相安之劑服八味順氣散俱見理氣門中食中食症因貪食過飽復感寒氣或食後惱怒填塞胸中忽然昏死四肢不舉先用鹽湯探吐法若中食挾痰當用瓜蒂散吐之俱見湧吐門若中食挾寒服生薑湯以指探吐吐後服平胃散消導二陳湯俱見消導門後服香砂六君子湯見補養門中寒中寒症忽然昏死通身厥冷脈沉而遲或微細欲絕甚則腹痛縮陰如傷寒厥陰篇之臟寒臟厥但用附子理中湯隨症加味見祛寒門中火中火症即完素所云將息失宜心火暴甚解見後蓋七情過極五志之火內發令人昏倒無知筋骨不用也其先未昏冒時必見有便秘譫妄發斑等症主以涼膈散見瀉火門劉河間曰中風癱瘓非為肝木之風實甚亦非外中於風良由將息失宜心火暴甚腎水虛衰不能制之則陰虛陽實而熱氣怫鬱心神昏冒筋骨不用而卒倒無知也亦有因喜怒悲思恐五志過極而卒中者皆為熱甚俗云風者言其末而忘其本也法宜和臟腑通經絡便是治風也中暑中暑症須分陰與陽如暑中陰邪則似傷寒惡寒無汗頭痛身疼壯熱心煩或嘔或瀉此得之於受暑納涼寒外暑內主以二香飲見祛暑門李時珍曰有處高堂大夏而中暑者緣由納涼太過飲冷太多陽氣為陰邪所遏反中入內故症似傷寒用前湯以發越陽氣散水和脾則愈暑中陽邪者亦名中熱其症蒸蒸自汗大渴引飲面垢喘促頭痛心煩壯熱脈盛精神昏憒此得之於赤日長途中外皆熱初中昏憒不省者宜搗薑蔥炒熱熨臍或熨炒鹽或掬道旁熱土作圈箍臍內撒熱尿忌犯寒涼搗大蒜取汁溫水調勻灌之自省隨服益元散見清暑門若中熱氣實者服白虎蒼朮湯氣虛者服人參白虎湯俱見瀉火門活人書曰脈虛身熱謂之中暑乃不足之症頭痛面垢惡寒無汗宜溫散脈盛身熱謂之中熱乃有餘之症頭痛壯熱渴飲自汗則宜清涼李士材曰香薷為夏月發汗之藥其性溫熱只宜於中暑之人若中熱之人誤服之反成大害中暑附法治暑風由暑熱攻肝內生風病手足搐搦寒熱自汗口乾煩渴尿赤便秘先服香羌防湯祛風次服玉露散清熱俱見清暑門治暑厥由元氣虛暑熱攻心或夾痰濕手足厥冷昏憒不醒脈虛者服清暑益氣湯夾痰濕者服二香飲俱見清暑門治中暑兼濕停飲夾食身重無汗腹痛泄瀉口渴便秘主以胃苓湯傷暑吐瀉服薷苓湯俱見利濕門外傷暑氣服六和湯見和解門治伏暑煩渴發熱頭痛惡食服消暑丸治冒暑伏熱渴飲服大順散暑月酒食所傷煩渴吐瀉自汗倦怠服縮脾飲俱見清暑門治一切感冒暑氣皮膚蒸熱頭重自汗肢倦或煩渴吐瀉脈症實者服四味香薷飲隨症加減見清暑門若元氣虛素犯房勞者忌服此方中濕中濕症即丹溪所云濕生痰痰生熱熱生風是也蓋濕從內生得之於厚味醇酒生冷過節也其脈洪滑發熱身重頭痛煩渴便秘痰壅涎滑易出初中口噤昏死灌以生薑湯外用薑蔥熨法見和解門旋服滲濕湯見利濕門愈後服消導二陳湯見消導門附法濕有因外中得者如天陰淫雨晴後濕蒸早晨霧露及久臥濕地遠行涉水瘴氣山嵐皆從外中頭身重痛甚則昏冒泄瀉浮腫治以除濕湯如濕氣在表頭頂肩背腰脊重墜強痛者用羌活勝濕湯隨症加味若平常傷濕兼表裡者用胃苓湯柴苓湯五苓散分別治之俱見利濕門中惡中惡症謂中惡毒之氣由肺入心脾如古塚敗棺腐屍枯井淫祠冷廟破屋壞溝皆有一種冷濕糜爛之氣卒然中之閉塞肺氣侵入心脾致神魂離舍面黑錯忘手足握拳厥逆喘息甚則昏死脈緊細者吉浮大者凶初用霹靂散取嚏及救急湧吐諸法俱見湧吐門主以調氣散見理氣門古用蘇合香丸苦難卒得方見幼科補生門附法又有誤食菌蕈河豚溫疫牛馬自死牲畜露哺鼠殘之類亦名中惡此因腸胃受毒心腹刺痛腹皮青黑悶亂欲死或面黑甲錯氣閉昏死急用霹靂散取嚏滾茶泡膽礬末一錢鵝翎蘸掃喉間探吐惡物或用雄黃解毒丸下之或用救急湧吐諸方俱見湧吐門吐下之後當調脾胃服調氣散香砂和中湯俱見理氣門傷風感冒總括經曰卑下之地春氣常在故東南卑濕之區風氣柔弱易感風寒濕者為感冒稍重為傷風最重為中風皆邪由鼻入在於上部客於皮膚故無六經形症惟發熱頭痛諸條若兼胸滿惡食則是感冒夾食之疾矣治法衛主皮毛內合於肺衛為風寒所傷發熱惡寒頭痛有汗鼻塞輕者咳嗽噴嚏常流清涕若氣虛兼嘔瀉眩暈者服參蘇飲見表裡門若症兼三陽壯熱惡寒痰壅自汗偏正頭痛服川芎茶調散芎芷石膏湯四時感冒審其時令服人參敗毒散九味羌活湯俱見發表門若症兼陰陽表裡用五積散通治之感冒夾食痞悶噯氣服香蘇飲感冒夾食表裡兼症者服雙解通聖散俱見表裡門余詳幼科鼻淵症傷風屬肺故噴嚏鼻淵屬腦不噴嚏傷風寒邪故涕清鼻淵熱邪而涕濁較傷風為尤重也病久或有穢氣則熱深致腦衄鼻血或成控腦砂治法初由風熱入腦目暝頭痛鼻流濁涕或鼻塞氣閉孔中熱痛引及腦中涕濁氣穢日久熱深而成腦衄初起常服蒼耳散見瀉火門若失治病久熱鬱已深宜雙解通聖散加黃連解表通里見表裡門熱氣湧涕傷其鼻孔成瘡潰痛用豬膽汁調冰硼散敷塗見湧吐門若熱蘊於腦傷及所過營血致成衄者服犀角地黃湯加味見理血門若日久已成控腦砂鼻涕淋漓腥臭血水頭空苦痛蟲蝕腦者取經霜絲瓜藤燒灰存性研末酒水每調三錢日三服間服補中益氣湯見理氣門破傷風症有四因詳外科四卷總系破傷皮肉去血後筋失所養經絡空虛風邪乘入成痙毋論虛濕風毒內蘊不發於外瘡口起鏽痕周圍燥起白痂時流汙黑水漸次牙關緊急筋脈拘牽此破傷風之先兆也治法凡初起咬牙縮舌角弓反張者用玉真散如法服之外用此散唾津調塗瘡口輕者自愈見祛風門若微微傷損去血不多風襲成痙者必其人素熱熱甚風搏並於經絡此為風火邪盛多陽明實症用雙解通聖散加蠍尾見表裡門若前症風邪獨盛多太陽症者用全蠍尾七枚擂末熱酒調服服後風仍不解漸深入里者再服江鰾丸見祛風門如去血過多風邪乘虛襲入成痙者服桂枝補血湯見祛風門四時瘟疫總括溫病寒疫詳載二卷同傷寒門四時瘟疫乃天地之厲氣流行互相傳染邪自口鼻而入傳變急如風火但毒有在表在裡在陰在陽之分其或發或清或攻當因春風夏熱秋涼冬寒與夫歲氣太過不及六淫勝復人之強弱臟之虛實分別治之古法以攻毒為急者因其邪多在裡也治法一曰發毒主以人參敗毒散見發表門一曰清毒主以普濟消毒飲見瀉火門一曰攻毒主以二聖救苦丹見表裡門一曰兩解主以雙解通聖散見表裡門瘟疫傳變症候繁多要之治法只此四條瘟斑痧疹傷寒汗下失宜致發斑疹已詳二卷辨症門此因時氣傳染感而即出故名瘟斑瘟痧瘟疹發於氣分者為痧色白如膚粟發於血分者為斑疹故色紅赤又膚淺者為疹深重者為斑斑或如豆或成連片二症正紅者輕赤者重黑者死若色淡紅稀暗乃因邪在三陽已成斑疹由外邪入里邪從陰化或過服涼藥所致屬陰分當從陰寒治之治法如初起尚未出透色正紅表熱輕者服升麻葛根湯升發之見發表門如初起出不透徹色紫赤表熱重者服三黃石膏湯宣發之見表裡門凡斑痧疹已經出透不可再表只宜清解主以消斑青黛飲見瀉火門凡斑痧疹初起表裡俱實法宜汗下兼行主以雙解通聖散見表裡門凡平常風痧斑疹或隱或現者只服荊防敗毒散見發表門余詳幼科痙病門總括痙病大法已載二卷同傷寒門總屬太陽之病須分別剛柔治之剛痙經曰太陽病發熱無汗惡寒者名曰剛痙其症背反張搖頭口噤項強拘急轉側艱難身熱足寒面目赤色脈浮緊或洪大風寒盛也初起服葛根湯見發表門余按後附法調治柔痙經曰太陽病發熱汗出而不惡寒名曰柔痙其症發熱自汗口氣蒸手呵欠煩悶手足顫動頭搖口噤或戴眼反張脈浮洪者服桂枝葛根湯脈浮緩者服桂枝防風湯俱見發表門余按附法附法凡風寒濕三邪雜揉成痙毋論剛柔用小續命湯隨症加減見祛風門如剛柔二痙表裡俱實形氣強者用如聖飲隨症加味見祛風門如過汗表虛汗出不止因而成痙者服桂枝加附子湯見發表門如產後金瘡血出過多風襲成痙者服桂枝合補血湯見祛風門如傷血成痙腹滿停瘀二便燥結者用大承氣湯下之見攻裡門如產後惡露不盡少腹硬痛成痙者桃仁承氣湯下之見理血門如潰瘡流去膿血太多風襲成痙用十全大補湯加祛風藥見補養門如柔痙失治邪傳少陽脈浮而弦用小柴胡湯倍柴胡見和解門如柔痙失治邪傳陰經脈細肢冷者主以當歸四逆湯見祛寒門如已成陰痙冷汗不止脈微欲絕者主以回陽救急湯見祛寒門犬咬成痙凡瘋狗咬傷風毒入腹成痙風者狀類破傷風初咬當用酒壺拔法取撮口小砂罐二個每盛半罐燒酒先以一罐架炭火上令滾無聲傾酒按合傷口上拔出汙黑血水滿則自落再以次灌照法煎滾傾酒按之輪流提拔以水盡為度後用唾津調玉真散敷之見祛風門若毒盛再按外科四卷如法治之凡瘋犬咬傷已成痙者用斑蝥七枚拌糯米三合同炒至米黃為度去米不用再切大黃片一錢同斑蝥研細熬滾米醋半杯和白湯半杯調勻前末空心溫服逐下惡毒從小便中出弱者減半服余詳外科若平常犬咬成痙治法按前附法門痹病門總括三痹者風寒濕為病而得名也邪者風寒濕三氣也風邪勝其痛流走曰行痹寒邪勝其痛甚苦曰痛痹濕邪勝其痛重著曰著痹五痹者皮脈肌筋骨遇邪為病之時而得名也秋時遇邪為皮痹皮雖麻木尚微覺痛癢也夏時遇邪為脈痹脈中血不流行而色變也長夏遇邪為肌痹肌膚頑木不知痛癢也春時遇邪為筋痹筋攣節痛屈而不伸也冬時遇邪為骨痹骨重痠疼不能舉動也五痹日久則入臟腑痹入五臟者內舍於五臟也久病皮痹復感於邪而見煩滿喘咳之症者是內傳於肺則為肺痹久病脈痹復感於邪而見心煩心悸嗌乾噫氣有時則恐之症是內傳於心則為心痹久病肌痹復感於邪而見嘔涎心下痞硬四肢怠惰之症是內傳於脾則為脾痹久病筋痹復感於邪而見喜飲尿多夜臥則驚時作太息之症是內傳於肝則為肝痹久病骨痹復感於邪而見腹脹尻以代踵足攣不伸脊以代頭傴僂不直之症是內傳於腎則為腎痹此痹入五臟之分也痹入六腑者因久痹不已復感於邪臟實不受而傳入腑也凡久患痹而見喜飲小便秘不脹則瀉不瀉則脹之症是內傳於大小腸則為腸痹若少腹胞中按之痛如湯沃之狀小便秘澀鼻流清涕者是內傳膀胱則為胞痹也三焦之痹附於膀胱從水道也胃痹附於大小腸從傳化也惟膽為清淨之腑不受痹邪此痹入六腑之分也又有周痹隨血脈上下為病也或痛或腫或手或足患有定處痛無歇止或從上病及於下或從下病及於上不似諸痹痛有歇止左右走移也周痹甚者或偏廢不仁不用狀似中風但身常疼痛而口眼不喎斜也治法治患諸痹形氣虛者服小續命湯氣血實者服二痹湯俱隨症加味治三痹初起用木通湯隨症加味冶三痹氣血凝滯服三痹湯治五痹不已乘虛入臟留連日久者服獨活寄生湯俱見祛風門治胞痹用五苓散加附子治腸痹用五苓散加蒼朮見利濕門治冷痹身寒肢冷狀類中寒者見祛風門治熱痹肌熱如火服升陽散火湯加黃連羚羊角末見瀉火門治皮痹日久氣虛用補中益氣湯加黃柏紅花見理氣門凡痹患在筋骨則受邪深故痛久難已患在皮脈則受邪淺故易治易愈凡痹日久內傳所合之臟則為五臟之痹若其人中虛受邪則難治多死凡臟實不受邪痹復還於外則易治易愈如久病皮痹當內傳入肺若無胸滿喘咳之症則是肺實不受邪侵也餘臟仿此痿病門總括五痿者心肝脾肺腎之痿也痿屬燥病故皆因肺熱而生但陽明為臟腑之海主潤宗筋陽明無病則宗筋潤能束骨而利機關雖有肺熱不能成痿也肺熱葉焦胃腑虛弱津液不化筋骨失養皮毛悴痿發為痿躄不能行動因而心氣熱為脈痿脛節縱而不任地肺兼心病也因而腎氣熱為骨痿腰脊不能興舉肺兼腎病也因而肝氣熱為筋痿筋失所養拘攣不伸肺兼肝病也因而脾氣熱為肉痿胃燥而渴肌肉不仁肺兼脾病也治法痿屬燥病因何而用治濕熱苦燥之藥蓋遵內經之治法獨取於陽明胃也故胃家無病雖有肺熱惟病肺而不病痿也是知病痿者必胃家有故或濕熱或積熱或濕痰不論新久只要胃壯能食先審症攻之治痿病初起胃壯能食者先用攻法如胃有濕痰服控涎丹見除痰門胃有積熱服六一順氣湯先攻之胃有濕熱服小胃丹均見攻裡門若胃弱食少氣血津液不足者當補養脾胃不可峻攻至久病留連或諸燥熱攻下之後皆當審症調養治濕熱成痿兩足痿軟發熱如火者主以加味二妙散見祛風門治時令濕熱痿躄喘促口渴便秘者服清燥湯及諸湯見潤燥門治陰虛濕熱成痿服虎潛丸筋骨痿軟日久不愈服加味金剛丸痿病日久氣血俱虛服十全大補湯俱見補養門腳氣門總括此因內有濕熱外感風寒相合為病故往來寒熱狀類傷寒兩腳腿脛腫熱如火者濕熱盛也名曰濕腳氣若不腫不熱內中悶痛或外乾枯虛煩微熱者寒濕盛也名曰乾腳氣凡腳氣脈急少腹頑木不知痛癢不過三五日內其邪必入心間若入心間嘔吐喘滿是為腳氣衝心之症目額皆黑恍惚譫妄則是水來剋火命難全也治法腳氣初起毋論干濕但審其脈症表實無汗者服攢風散汗之裡實熱盛便秘燥渴者服羌活導滯湯下之俱見利濕門治濕腳氣濕盛重痛腫熱如火者服勝濕餅逐之形氣實者再服加味蒼柏散形氣虛者常服當歸拈痛湯解之俱見利濕門治乾腳氣初起寒濕盛者用五積散加附子溫散之見表裡門若寒虛形氣弱者常服獨活寄生湯見祛風門外敷濕熱腳氣用如意金黃散乾腳氣敷沖和膏俱見外科六卷內傷門總注勞役傷氣傷元氣也飲食傷形傷胃腑也傷氣宜補有熱中濕熱暑熱火鬱寒中之分傷形宜消有飲食失節過於溫涼之別蓋脾胃元氣一虛四藏失其調和所以五臟之脈交相混見故肝弦心洪脾緩之脈反見於上按之沉澀肺脈反見於下也其形忽肥忽瘦者火乘土位上並陽分血脈上行而上盛故面紅虛肥下並陰分血脈下行而上虛故面白消瘦今之虛損病人早晨面青白瘦而惡寒午後面紅赤肥而發熱是也其症身肢重倦氣不周也骨節痠疼血不榮也氣少息微中氣乏也心中虛煩心血少也食入反出胃虛不納也口中沃沫脾不散精也飲食無味胃氣傷也胸膈不快濁氣滯也耳鳴耳聾陰火上衝也大便時瀉不瀉小便時利不利脾濕不分也飧瀉完穀不化脾家虛濕不化也大便後或見膿血脾經濕熱釀成也此傷氣傷形所見脈症也辨似內傷外感脈皆大內傷之脈氣口大於人迎不似外感之脈人迎大於氣口也內傷外感皆頭痛內傷之頭痛時痛時不痛不似外感頭痛常痛不休也內傷外感皆惡寒內傷之惡寒得溫暖而即解不似外感之惡寒雖近烈火而仍寒也內傷外感皆發熱內傷之發熱熱在肌內以手捫之覺熱從內泛不如外感之發熱熱在皮膚以手捫之熱自內輕也內傷外感皆自汗內傷之自汗氣短乏聲怯弱不似外感之自汗氣壯促語聲高也內傷外感手皆熱內傷則手心發熱不似外感之手背發熱也內傷外感皆鼻不和內傷之鼻息氣乏而喘不似外感之鼻息氣促而鳴也內傷外感皆不食內傷之不食口中無味不似外感之不食聞食則惡也內傷外感皆口渴內傷之渴初病即渴其飲甚少不似外傷之渴三日後始渴其飲甚多也此內傷外感之辨似也治法治內傷熱中熱傷元氣脈虛大而洪頭痛時作時止夾表熱而自汗心煩氣虛不耐勞碌氣不蒸化口渴飲少表虛失衛畏寒惡風氣乏不周懶言倦怠動則喘促上氣不足息者主以補中益氣湯見理氣門加味法如兼陰火乘陽燥熱晝甚者加生地炒黃柏以補水救陰若兼陽熱晝夜心煩宜瀉火安神煎湯吞送硃砂安神丸見理血門治內傷清氣下陷濁氣上乘清濁相干而兼濕熱二便不調飧瀉膿血主以調中益氣湯見理氣門治內傷氣虛濕多熱少遏抑清氣不得上升脾胃身重而痛倦怠懶食口苦舌乾大便不調小水頻數洒洒惡寒慘慘不樂面色不和陽氣不升主以升陽益胃湯見理氣門治前症有因熱多濕少陰火困脾陽氣不得上升脾胃而成以上諸症者服補脾胃瀉陰火升陽湯見補養門以上三方隨症加減俱同補中益氣湯治夏令內傷暑少濕多腰以下痿軟難於轉動行走不正兩足欹側者主以清燥湯見潤燥門治長夏濕熱炎蒸暑多濕少身熱自汗口渴心煩倦怠少氣小水短澀大便稀溏惡食脈虛者服清暑益氣湯見清暑門治肌熱表熱四肢發熱骨髓中熱熱如火燎捫之烙手此因血虛及胃弱遇食冷物抑遏陽氣鬱於脾土服升陽散火湯見瀉火門治內傷火鬱身雖有如前烙手之熱而反惡寒脈來沉數者此因火鬱肌里內熱外寒用火鬱湯發之見瀉火門治內傷寒中水來侮土寒濕為病腹脹尿多流涎流涕外則足軟脾脊腰背睪丸牽引悶痛如脾胃寒濕氣尚實者服白朮附子湯若脾胃寒濕而氣虛者用理中湯加附子茯苓蒼朮俱見祛寒門治脾胃寒濕形氣俱虛氣乏食減喜食熱物面色青黃腹痛腸鳴流涎吐冷大便清溏氣腥不臭但用理中湯加味治之見祛寒門治脾胃俱虛飲食減少過時不化反飽脹悶面色痿黃肌肉漸瘦軟困無力者法當平補常服資生丸見補養門治內傷門胃強脾弱之症蓋胃強所以能食脾弱則不能消化致食後腹痛腸鳴飧瀉暴注完穀不化者長服消食健脾丸治脾胃兩虛不思飲食即少食亦不能消化瀉下完穀者服開胃進食湯若因傷食停滯則用平胃散加味治之或服消導二陳湯治因傷醇酒厚味濕熱內釀痞脹不食嘔噦噁心吞酸噫氣大便黏臭小水短赤飲食愛冷口舌生瘡者服清胃理脾湯以上俱見消導門酒病門酒病內傷飲酒無度多成內傷蓋酒能內釀濕熱也酒病初起先當發汗次利小便使上下分消其濕免釀成內熱方妙如飲酒大醉發熱惡寒頭疼自汗者忌用桂枝湯解表只服石葛湯如縱飲火酒胸膈蘊熱以致吐血衄血而成內傷者初起服連葛丸俱見消導門治酒病頭痛身熱嘔吐懶食倦怠心煩似外感而實非外感者服葛花解酲湯汗之見消導門若傷肺嗽血主以瀉白散見瀉火門治酒病元氣已虛肢軟食少面紅虛浮用補中益氣湯倍陳皮加法半葛根炒神麯麥芽白芍小便閉加麥冬大便閉加桃仁麻仁見理氣門若腹脹吐瀉口乾嘔痰者用香砂六君湯加炒神麯厚朴見補養門若虛寒胸滿便滑食少腿足漸腫悶痛者服八味地黃丸見補養門枳梖子或白蔻嚼服能解酒毒鹽花捺牙樟樹皮煎服俱能醒酒虛癆門總括虛者陰陽氣血榮衛精神骨髓津液不足是也損者外而皮脈肉筋骨內而肺心脾肝腎消損是也虛損成勞者謂虛損日久留連不愈而成五勞七傷六極也勞因復感者謂不足之人榮衛不固復感外寒則損從皮毛肺始陰虛更生內熱則損從骨髓腎始內傷飲食勞倦則損從肌肉脾始此虛損成勞之因也五勞一損皮聚毛落灑淅惡寒咳嗽虛喘肺勞也二損血脈衰少男子面無血色女子經水不通心勞也三損飲食衰少肌肉消瘦大便溏瀉脾勞也四損兩脅引胸而痛緩不能行動肝勞也五損骨痿不能久立午後發熱盜汗骨蒸腎勞也如從下腎臟損起者損至皮聚毛落主死從上肺臟損起者損至骨痿不能興起於床則終從脾臟損起者或至皮聚毛落或至骨痿不起皆主死此五勞之症也七傷一恐懼不解則傷精精傷則骨酸痿厥精時自下蓋五臟主藏精者也不可傷傷則失守而陰虛陰虛則無氣無氣則死矣一怵惕思慮則傷神神傷則恐懼自失破䐃脫肉毛悴色夭死於冬也一喜樂無極則傷魄魄傷則狂狂則意不存乎人毛悴色夭死於夏也一悲哀動中則傷魂魂傷則狂妄不精不精則不正陰縮而攣筋兩脅骨不舉毛悴色夭死於秋也一憂愁不已則傷意意傷則悗亂四肢痿而不舉毛悴色夭死於春也一盛怒不止則傷志志傷則喜忘前言腰脊強痛毛悴色夭死於季夏一勞倦過度則傷氣氣傷則火愈壯壯火則食氣故無氣以動喘乏汗出內外皆越則氣日耗氣日耗則死矣此七傷之症也六極一數轉筋十指爪甲皆痛筋極也一牙齒動手足痛不能久立骨極也一面無血色頭髮自墜落血極也一身上常如鼠走削瘦乾黑肉極也一氣少無力身無膏澤翁翁羸瘦眼無精光立不能穩體癢生瘡精極也一胸脅逆滿恆欲大怒氣乏不能言氣極也此六極之症也脈症虛勞之脈象宜和緩二三四至來去有神此病易治即浮軟微弱而有胃之真臟脈者亦可得生若陰虛之勞脈細數則必形消著骨而後死者陰主形也陽虛之勞脈微革則不待痿盡忽然而脫者陽主氣也五臟之脈無和緩象為無胃之真臟脈即形肉雖存亦必不久於人世矣一息二至損傷之脈也一息一至名為行屍脈主死此辨脈之大法也人身大骨即顴肩腰股之大骨也大肉即頭項四肢之大肉也凡大骨痿軟不能支持大肉削瘦消陷成坑居常動做精神漸衰真臟脈不見者一歲必死若真臟脈見遇所不勝之時日凶可期也若真臟脈不見有是症者喘滿動形半載內死有是症者五臟內損痛引肩胸一月而死有是症者肉盡之處皆枯燥破裂謂之破䐃身熱不已十日內死真臟脈見目眶下陷視不見人傾刻而死若能見人則神尚未去至所不勝之日時而死也此辨虛勞脈症之總訣也治法後天脾胃水穀生化營衛故治法本平氣血而脾臟症治已統載內傷門先天腎藏精氣生化之源故治法本平陰陽其腎肝心脾症治詳刻於後治虛勞陰虛火動皮寒骨蒸咳嗽不寐食少痰多心煩氣短咯血等症用拯陰理勞湯隨症加味治虛勞陽虛氣弱表熱自汗身髓痠疼倦怠惡煩勞動則氣張而喘息用拯陽理勞湯隨症加味治腎虛成勞午後發熱形體消瘦津血枯竭水泛為痰咳嗽盜汗遺精失血消渴淋濁口燥咽痛虛火上炎諸症服六味地黃湯已成勞嗽服都氣湯火不歸元服七味地黃湯火妄刑金服生麥地黃湯相火不足羸弱少氣服八味地黃湯陰虛火旺服知柏地黃湯脾腎大虛水腫痰喘服金匱腎氣湯腎虛消渴服七寶美髯丹治陰虛火旺宜滋水制火服大補陰丸若火旺無制妄行傷金致肺痿咳嗽或咳膿血者主以滋陰降火湯以上俱見補養門治虛熱如火捫之烙手而無汗者此為火鬱服升陽散火湯見瀉火門若虛熱烙手而有汗者此為骨蒸只服大補陰丸地黃湯治肺腎兩虛成勞嗽血服固本湯脾肺腎三臟虛損加蜜耆炙草五味只肺臟氣虛成勞者用保元湯加味調治俱見補養門治肺虛成勞兼氣滯不快服異功散肺氣虛兼有痰飲服六君子湯若虛勞肌熱渴瀉服七味白朮散氣虛久瘧留連不愈服四獸飲肺勞不兼他症者常服四君子湯以上俱見補養門肺臟虛損咳血嗽血金被火刑者服加味救肺飲見理血門治心臟虛損虛煩不眠心口多汗健忘驚悸服天王補心丹見補養門若心脾兩傷煩熱盜汗服歸脾湯心虛怔忡服養心湯見理血門治肝臟虛損筋緩不能自持目暗不能視物用四物湯加棗仁炙草木瓜凡肝臟虛損用四物湯養血調肝血虛氣弱主以聖愈湯虛火氣燥血熱者服知柏四物湯熱甚再加炒川連黃芩血虛煩勞往來寒熱者用四物湯加柴胡丹皮炒研梔子凡血分虛勞血熱甚者四物湯加黃連黃芩血虛甚者加附子肉桂血瘀宜破四物內加桃仁紅花失血宜止加茅根炒黑蒲黃血虛勞損惟發熱不惡寒者服地骨皮飲以上俱見理血門凡血虛肝燥骨蒸勞嗽主以消遙散見和解門治虛勞吐血氣血兩虛者服八珍湯平補之若氣乏色枯毛髮脫落自汗盜汗發熱咳嗽食少泄瀉吐衄消瘦用十全大補湯俱見補養門若脾肺氣虛榮血不足而見前症者常服人參養榮湯見理血門治五勞六極裡急腹痛並治裡虛心悸衄下亡血夜夢遺精手足煩熱四肢痠痛津血虧損等症先服小建中湯溫和脾胃見發表門若前症惡寒衛氣不足脈遲弱者服黃耆建中湯若前症榮血虧脈細澀者服當歸建中湯將成癆瘵服樂令建中湯俱見祛寒門若里不急腹不痛雖有前症只宜和解服雙和飲見理血門脾臟虛勞症治統載前條內傷門虛勞久病不愈治法見後癆瘵門癆瘵骨蒸總括久病癆疾而名曰瘵瘵者敗也氣血下奴疾久則生癆蟲此症有陰虛乾血有陰虛積熱之分正治俱用補陰藥若皮膚乾澀目黑無光其人初病能食不瀉胃氣尚壯也至病久亦不作瀉二者皆可以攻下為先治也癆瘵症治癆瘵之人病至大便泄瀉則必死若不瀉能食堪任攻治尚可得痊治陰虛乾血肌膚甲錯目暗無光者用大黃䗪蟲丸攻利之見理血門治陰虛積熱甲錯目暗能食不瀉者用大黃青蒿煎清利之見瀉火門治癆瘵日久內生癆蟲死後傳染甚至滅門名傳屍癆服傳屍將軍丸見丹溪心法或用雄檳丸獺肝丸集效丸俱見殺蟲門外治每逢癸亥日用薑片貼腰眼兩穴點艾丸各灸七壯骨蒸症治火炎水竭真陰消爍故肌骨之間蒸蒸而熱也李東垣曰晝熱夜靜是陽旺於陰分也晝靜夜熱是陽氣下陷入陰中也此名熱入血室見婦科若晝夜俱熱是重陽無陰也當急瀉其陽峻補其陰晝甚在氣夜甚在血治癆瘵初利後其人骨瘵胃尚壯能食五心煩躁甚者服柴胡清骨散如體弱熱微骨蒸晡甚自汗食少倦渴而嗽血痰者服黃耆鱉甲散如風勞骨蒸午後壯熱頰赤自汗咳嗽而脈細數者服秦艽鱉甲散如肺痿骨蒸兼寒熱咳嗽形羸自汗聲啞脈軟弱者服秦艽扶羸湯若胃熱骨蒸先後寒熱漸成羸瘦有汗脈長者症屬陽明服石膏散若肺勞有熱難服補氣藥者先服二母散潤之以上俱見瀉火門若肝燥骨蒸用消遙散加味見和解門如熱微體弱用人參養榮湯皮外發熱加柴胡胡連骨內蒸熱加青蒿鱉甲見理血門失血諸症總括九竅一齊出血名曰大衄鼻出血曰鼻衄鼻血如泉湧曰腦衄耳出血曰耳衄目出血曰目衄皮膚出血曰肌衄齒牙出血曰齒衄又名曰牙宣此皆隨所衄之處而命名也若血從口出則為內衄內衄出血又各有別吐血出於胃涎嗽出於脾咳血出於肺嘔血出於肝咯血出於心唾血出於腎他如尿血從精竅出淋血從膀胱出此臟腑失血之分也脈證失血之症脈必見芤緩小可喜數大堪憂若有蓄血脈見牢大亦不主凶統以身涼脈小者為順身熱脈大多痰者為逆如脈大痰喘不能安臥及大衄大下血出如泉湧不止或血出氣腥穢臭或膿血雜間而出此為內潰腐屍之症則難生矣勞傷失血治胃傷吐血吐者血出無聲不似嘔血上逆漉漉有聲也如其人氣血虛弱不見火象者用人參養榮湯加麥冬清補之見理血門蓋血存胃中者為守管之血守而不走胃虛不能攝血故從喉吐出也法宜理損若系火迫妄行詳後治法治脾傷嗽血嗽者血隨痰涎嗽出也勞傷患此服加味救肺飲見理血門若痰涎壅促陣陣急嗽帶出血者先服白金丸見除痰門若嗽血氣逆上盛下虛者服蘇子降氣湯如痰黃積熱嗽血氣實者服瀉肺丸下之俱見理氣門治肺傷咳血咳者聲從肺來血隨咳而出也勞傷咳血服加味救肺飲若鬱熱咳血服雞蘇丸咳嗽痰血服咳血方肺痿咳血服獨聖散俱見理血門若肺癰咳出膿血服保肺湯見理氣門治肝傷嘔血嘔者血出氣逆漉漉有聲也如怒極傷肝面青嘔血血虛肝燥骨蒸嘔血俱服八味逍遙散見和解門治心傷咯血咯者血痰成團不時咯出也由心火刑肺多早間咯血兩頰色赤咽喉不清主以太平丸獨聖散俱見理血門治腎傷唾血者唾者唾津中帶血或帶血絲也如因腎水不足虛火上炎尺脈細數而唾血者服元麥地黃湯見補養門蓋腎脈上入肺循喉嚨其支者從肺絡心屬胸中故病則俱病也涎唾中有少血散漫者腎從相火炎上之血也若血如紅緶從肺中咳出者此肺絡受熱傷之血也如咳出白血淺紅淡色似肉似肺者必死努傷失血治飽食用力或因持重努傷脈絡或因跌打損傷脈絡令人吐血嘔血者俱服佛手散見理血門血瘀加大黃下之加桃仁紅花破之血瘀氣滯加鬱金兌童便與酒行之努傷嗽血咯血服法制丸見攻裡門血瘀胃痛腹脅脹痛蓄血急痛形氣實者服桃仁承氣湯見理血門努傷日久亦宜理損按勞傷諸法治之或用逍遙散加味見和解門熱傷失血治血為熱迫妄行氣分上為吐血衄血等症法宜清熱主以犀角地黃湯見理血門隨症加味胃熱吐血加條芩川連胸膈滿痛內有瘀血加桃仁紅花酒大黃肝熱嘔血及因怒吐血加柴胡丹皮炒梔仁腎熱吐血加元參黃柏知母心熱咯血加天冬麥冬肺熱咳血加知母貝母桔梗花粉脾熱嗽血加知母貝母涎壅急嗽帶出血者加鬱金或單服白金丸見除痰門吐衄日久常服法制丸見攻裡門凡衄血吐血血出多者則熱隨血減然氣亦隨亡當用參地煎活法治之如還元水發灰散韭菜汁聽其選用俱見理血門余法再詳幼科二便下血總括血病傷及於腑者則血滲入腸胃濁道上從咽出下後從二便而出也傷及於臟者則血溢出胸中清道上從喉出下從精竅而出也治法勞傷宜理損熱傷宜清熱努傷初宜逐瘀日久亦宜以理損為主尿血血與尿先後出莖中不痛此為精竅之病陰絡受傷也主以四物湯加牛膝見理血門若因提氣採戰忍精不泄或因年老竭欲而成尿血者其血成塊竅滯不利莖中急痛欲死服諸藥不效用珀珠散如法常服若大便燥結先用八正散加牛膝鬱金下之下後方服前散俱見利濕門若尿閉不通先用導赤散加牛膝鬱金利之利後仍服前散見瀉火門至若血淋乃熱傷陽絡之病血尿同出莖中脹痛症治載四卷淋症門腸風腸風與臟毒皆屬熱傷陰絡熱與風合為腸風下血其血色鮮而清肛不腫痛先糞後血乃為遠血從胃腑小腸中來故名腸風初起用槐花散加秦艽防風或服槐角丸若便血日久不愈用和血湯升補之或人參養榮湯俱見理血門臟毒熱與濕合為臟毒便血其血色晦而濁肛門腫痛先血後糞從大腸而來乃為近血故名臟毒初起肛門腫痛下血者用槐花散加炒苦楝蒼朮日久不愈用和血湯少加吳萸炒川連清補之俱見理血門若不下血只大腫大痛大便不通者此非臟毒下血之症乃臟毒下血之瘍也先用大黃皂刺湯攻之見攻裡門或服梔子金花湯見瀉火門攻後用平胃散加地榆和之見消導門余法詳外科三卷汗症門自汗自汗屬陽無因而汗自出有虛有實表虛者汗出濈濈發熱惡寒脈虛氣乏不兼他症者服黃耆六一湯以固表見清暑門自汗日久易感風寒服玉屏風散以固表見補養門亦有表虛自汗怯冷惡寒脈浮而遲四肢厥冷者服桂枝附子湯溫之見發表門若不惡寒肢冷只自汗不止屬血虛者忌用附子服黃耆建中湯和之見祛寒門以上治表虛自汗凡裡熱自汗便秘煩渴口氣蒸手蒸蒸汗出不惡寒反惡熱腹脹滿而脈洪實者服調胃承氣湯六一順氣湯下之見攻裡門若陽明胃熱獨盛自汗惡熱而頭額汗居多小水短赤煩渴大飲者主以白虎湯清之見瀉火門余見後附法盜汗盜汗屬陰睡則汗出醒則汗止當分別心虛心火治之心虛不固宜補心其症驚悸盜汗虛煩不眠發熱體倦食少神衰服酸棗仁湯見理血門若心火傷陰釀成盜汗者服當歸六黃湯清之見收澀門附法陽虛自汗甚者服牡蠣散見收澀門輕者用補中益氣湯加麻黃根浮小麥見理氣門脾虛自汗肢冷泄瀉汗有常期者用六君子湯加蜜黃耆浮小麥見補養門中寒自汗肢冷脈遲服附子理中湯見祛寒門陰虛盜汗甚者服柏子仁丸見收澀門輕者用四物湯加蜜黃耆浮小麥炒黃芩川連見理血門外用撲汗法見收澀門消渴門總括上消屬肺飲水多而小便如常中消屬胃飲水多而小便短赤多食善飢下消屬腎飲水多而小便渾濁色如膏脂三消皆燥熱病也然亦有寒者試觀年老人好飲茶水夜必多溺未必盡因熱也總之飲水多小便少而渾赤者屬熱是火盛耗水而渾也飲水少而小便多色清白者屬寒是火虛不能耗水也脈症三消之脈數大者吉細微短澀皆逆脈也三消飲水多不能食若能食大便硬脈大洪實者為胃腑熱實下之可愈若不能食濕多者則舌白苔滑病久則變為水腫洞瀉熱多者則舌紫苔干病久則發為癰疽而死也治法三消初起便硬能食脈症實者服調胃承氣等湯先下實熱見攻裡門若裡熱極深服梔子金花湯下之見瀉火門三消初起不能食而渴飲已屬胃虛者若更泄瀉肌熱胃虛無實熱者常服七味白朮散若下焦虛寒飲一溲二服金匱腎氣湯俱見補養門三消初起不能食但渴不瀉雖虛猶有燥熱也服竹葉石膏湯見瀉火門若燥熱渴極脈虛氣弱服竹葉黃耆湯見潤燥門治上消氣虛熱盛服人參白虎湯初起熱微者服蓮花飲俱見瀉火門中消胃熱善消水穀服消渴方胃熱甚者當按前法先下實熱下消腎熱腰足痿軟服茯苓丸清渴煩躁而赤咽乾服地黃飲子三消煩躁不生津液不思飲食服本事黃耆湯以上俱見潤燥門方法洗淨豬肚納豆豉二合縛定煮爛食肚飲湯數次可愈或豬血煮清湯常服或蠶繭殼煎湯代茶或服炒米綠豆粥神病門神之名義動植之物一有其形則形之至精至粹之處即名曰心動物之心者形若垂蓮中含天之所賦虛靈不昧之靈性也植物之心者即中心之芽中含天之所賦生生不已之生意也此形若無此心則形無主宰而良性生意亦無著落矣此心若無良性生意則心無所施用不過是一團死肉一枯草木之芽也蓋人雖動物之貴而其中含良性與一切動物皆同本乎天真也天真之氣分而言之為精氣神故曰以精為體以神為用也合而言之渾然一氣天真一氣天真之祖也神之變化魂者陽之靈隨神行來魄者陰之靈並精出入蓋神機不離乎精氣而亦不雜乎精氣妙合而用也故指神而言則神超乎精氣之外指精氣而言則神寓乎精氣之中意者心神之機動而未形之謂也志者意所專注也思者志之變動也慮者以思謀遠之謂也智者以慮應物之謂也此皆識神變化之用也五臟神情五臟所藏七神心藏神肝藏魂肺藏魄脾藏意與智腎藏精與志也五臟所生七情心生喜肝生怒肺生悲脾生憂思腎生恐懼也氣和則達志故生喜笑氣暴則志憤故生恚怒淒心則哀苦故生悲哭聚心不解散故生憂思內恐外觸非常事物故生恐懼驚駭也神病六症六症者驚悸怔忡恍惚健忘失志傷神六名也此皆因心虛膽弱諸邪得以乘之但當審其所兼之症分別虛實施治又當按後癲癇九氣痰飲等門合症揀方自有效法之處通治驚悸怔忡恍惚健忘失志傷神六症有因心氣熱者先服安神丸兼氣怯膽虛恐怖不能獨臥者服仁熟散兼虛煩不眠者服酸棗仁湯兼食少不眠體虛發熱盜汗者服歸脾湯兼心虛血少者常服養心湯兼脾肺氣血虛食少發熱服人參養榮湯以上俱見理血門再有煩躁懊憹諸煩不眠症詳載二卷傷寒辨大症篇嘈雜症治有因內傷飲食清痰稠飲滯於中州似飢非飢似痛非痛胸中嘈雜懊憹不安或兼噯噫噁心久則呃噎反食初起治宜南星法半陳皮之類以消痰芩連知柏石膏梔子以降火蒼朮白朮炙草神麯以燥脾消食有因血虛嘈雜者服養血八珍湯見補養門胃氣虛冷心下嘈雜口吐冷涎者服旋覆花湯見除痰門痰火食積口渴嘈雜服痰火越鞠丸見理氣門鬱火嘈雜口苦嗌乾服三補丸見瀉火門癲癇門總括李時珍曰經有言癲狂疾者又言癲疾為狂者是癲狂為兼病也邪入於陽者為狂邪入於陰者為癲疾癲疾始發志意不樂或精神呆癡言語無倫臥則安靜以邪並於陰也狂疾始發目直詈罵不識親疏或怒叫欲殺夜不安臥以邪並於陽也癇疾始發吐涎神昏卒倒無知口噤牙緊抽搐之時多少不等而省後起居飲食皆如無疾之人與癲狂為異耳癇疾雖分為五曰雞馬牛羊豬名者以其病狀聲音偶相類故也其實則痰火氣驚四者而已所以為治同乎癲狂也治法通治癲狂癇疾初起多痰者用三聖散吐之見湧吐門若風盛兼痰服青洲白丸子辰砂散熱盛有痰服礞石滾痰丸牛黃丸清熱化痰湯痰盛兼氣鬱者服白金丸痰盛兼驚者服控涎丹氣實服遂心散若神輕驚悸內無痰壅者服抱龍丸鎮癇丹以上俱見除痰門治風邪癲癇初起用皂角汁灌入鼻內令風涎從口鼻中唾涕而出若蘇後流涎不止服鹽湯自止次服沉香天麻丸獨活湯俱見祛風門凡癲狂疾初起痰壅氣閉者當用引涎追淚取嚏法俱按湧吐門治陰癇疾初起手足厥冷面色青白僵臥抽搐口吐涎沫脈沉遲或細弱者宜炙百會穴不拘壯數以蘇為度再發再炙回陽抑陰內服醒脾湯妙香散俱見補養門諸氣門總括經曰九氣寒氣炅氣喜氣怒氣勞氣思氣悲氣恐氣驚氣是也夫人身一氣流行不為邪觸何病之有若為寒觸外束皮膚腠理閉其氣收矣即為寒病炅即火也若為火觸熱蒸汗出腠理開其氣泄矣即為暑病若為喜觸氣和志達其氣緩矣素中虛者緩則氣散即為暴脫之病若為怒觸怒則氣逆甚則嘔血其氣上矣上極而下乘脾之虛即為飧瀉腸鳴之病若為思觸心有所存氣不流行其氣結矣即為鬱結之病若為勞觸喘息汗出其氣耗矣即為勞倦之病若為悲觸心肺氣戚榮衛不散其氣消矣即為怯弱之病若為恐觸卻傷精志其氣下矣即為遺泄之病若為驚觸心無所依神無所歸慮無所定其氣亂矣即為怔忡等病也九氣養生壯者得之氣行而愈弱者得之氣著為病矣辨症短氣者氣短而不能續息也少氣者氣少而不能稱形也皆屬不足氣痛者氣為邪阻氣道不通或在經絡或在臟腑攻衝走注時作疼痛也鬱氣者或得於名利失志或得於公私怫情憂思憤懣氣漸鬱結而成也上氣者濁氣上逆也穀氣郁在胃者則上逆呃噎噫氣吞酸吐酸之類也下氣者清氣下陷也然清氣下陷則失氣不甚臭穢惟傷食矢氣其臭甚穢俗名放臭屁乃腸胃鬱結穀氣發內而不宣通於腸胃之外也治法治寒邪傷營氣喘胸滿表實無汗脈浮緊者用麻黃湯發之見發表門寒邪結胸氣喘而嘔自利厥冷脈沉遲者用理中湯溫之見祛寒門胃熱諸病氣喘自汗心煩渴飲脈洪大者用白虎湯清之見瀉火門熱傷元氣氣短而咳口渴多汗脈虛弱者用生脈散補之見清暑門治六鬱氣痛謂氣鬱血鬱食鬱痰鬱熱鬱濕鬱也用越鞠湯隨症加味七情氣逆用四磨湯七氣湯香砂和中湯治上盛下虛氣逆上攻喘嗽滿門痰壅暈眩便秘嘔血服蘇子降氣湯陰陽壅滯氣不宣通服木香順氣湯清郁湯治七情過節七氣病生鬱結生痰如膜如絮凝結喉間名梅核氣久則變生呃噎上吐涎沫下秘二便初起服四七湯七氣湯余見婦科治諸氣為病水腫脹滿氣痛走注內外牽疼痰壅喘嗽俱服木香流氣飲若七情氣滯胸腹脹痛服分心氣飲以上俱見理氣門治清陽不升濁氣上逆及氣虛患生諸病主以補中益氣湯見理氣門若陽虛氣弱服四君子湯氣虛有痰用六君子湯俱隨症加味治心氣實而病驚悸氣亂走痛者服鎮心丹若心氣虛而病驚悸氣亂虛煩者服妙香散以上俱見補養門痰飲門總括飲則清稀故為陰盛痰則膠黏故為陽盛其痰稠濁是熱痰屬心也沫清是寒痰屬腎也少而黏連咯不易出是燥痰屬肺也多而易出是濕痰屬脾也痰湧面青搐搦暈眩是風痰屬肝也飲色清稀膈滿而吐涎者此飲留於膈間名曰伏飲也若喘咳面腫不得臥此飲留於肺名曰支飲也飲散四肢身常重痛此飲留行於體名曰溢飲也咳嗽嘔涎引脅疼痛此飲留於脅下名曰懸飲也平日肥盛今忽消瘦水走腸間漉漉有聲者此飲留行於腸胃名曰痰飲也凡飲留於胸肺則喘滿短氣而渴飲留於膈下則心下悸或背心寒冷也脈略浮滑主風痰浮弦主風飲沉滑主痰食沉弦主懸飲肺飲不弦氣喘胸滿脈沉主留飲四肢歷節必走痛兩關浮弦實大主膈上有稠痰法宜吐之關上脈伏而大下眼胞狀如煤煙燻黑者皆為痰病也凡久得澀脈主痰飲膠固阻塞脈道急宜調治諸痰治法諸痰者即總括所載之熱痰寒痰濕痰風痰燥痰食痰氣痰之類也諸痰主以二陳湯隨症加味惟與燥痰不相宜以茯苓半夏多滲燥耳治肺經燥痰少而黏連咯不易出宜燥痰湯咳痰久而帶血宜白花膏濕鬱痰嗽用清肺飲隨症加味傷風頭痛咳嗽痰喘主以金沸草散治熱痰變生諸症服清氣化痰湯酒食生痰膈滿眩嗽服順氣消食丸中脘氣滯痰涎不利服三仙丸脾虛痰厥頭痛服半夏天麻白朮湯風痰鬱結肩揹走痛服豁痰湯痰喘氣急形氣實者服蘇葶滾痰丸痰火嘈雜心懸如飢服三聖丸痰迷心竅舌黑暈眩服加味導痰湯治痰攻眼腫並酒病手臂麻木重痛及寒痰壅塞痞悶者服加味二陳湯以上諸方皆見除痰門留飲治法留飲者即總括所載之伏飲支飲溢飲懸飲痰飲之總名也諸飲初起形氣實者通用控涎丹攻之虛者用桂苓甘術湯溫之俱見除痰門蓋飲屬陰邪留於上下內外今人胸背腰項或手足筋節牽引鉤痛走移不定或肢體冷痹氣脈不通此不與風濕癱瘓及上痰病同其治也治伏飲伏於膈間胸隔滿悶嘔吐清涎脈症實者用舟車丸先攻利之脈症虛者用半夏茯苓湯加丁香俱見利濕門治支飲水飲攻肺喘咳而腫不得臥者用葶藶大棗湯瀉之後服定喘湯千緡湯俱見表裡門治懸飲留於脅下咳嗽引痛及伏飲嘔涎心脅痞硬服十棗湯見攻裡門治溢飲流散肢體身肢重痛初起喘咳腫脹脈浮數有熱者用越婢加蒼朮湯解表清裡見利濕門余法按除痰門選用治溢飲夾寒心下有水氣發熱乾嘔或喘咳作渴飲少喜熱尿或秘或利脈浮而弱短氣不得臥者用小青龍湯隨症加減見發表門治痰飲寒實填塞喉間胸膈痞硬氣上衝咽不得息者用瓜蒂散先吐之見湧吐門或用透羅丹下之見攻裡門治痰飲熱實壅塞膈上心下滿而硬痛者服大陷胸湯或六一順氣湯若三焦熱實服小胃丹一捻金沆瀣丹分別下之俱見攻裡門治痰飲停塞中脘兩臂疼痛脈沉細者當用平和之劑常服指迷丸或三仙丸膈中痰飲服潤下丸俱見除痰門咳嗽門總括有聲無痰曰咳有痰無聲曰嗽有聲有痰曰咳嗽內經雖云五臟六腑皆令人咳而大要皆在聚於胃關於肺也因胃濁則所遊溢之精氣與脾濕所歸肺之精液皆不能清水精之濁難於四布此生痰之本咳嗽之原也肺居胸中主氣清肅或為風寒外觸或為痰熱內干清肅有失降下之令因氣上逆而咳嗽也久病不已則傷肺成勞矣脈略咳嗽之脈浮主風緊主寒數主熱細主濕洪滑多痰弦澀少血沉數實熱濡弱虛勞右關脈澀飲食傷脾左關弦短疲極肝衰浮短傷肺濡脈為宜浮大易治沉伏難醫脈細不足以息皆逆症也治法治感冒風寒傷肺咳嗽噴嚏唾痰惡寒發熱主以參蘇飲若兼頭痛服芎蘇飲更兼吼喘服杏蘇飲如系虛勞之人及胎前產後傷風咳嗽當服茯苓補心湯俱見表裡門治肺火鬱氣分身熱而腫喘咳無痰用瀉白散隨症加味若因飲酒傷肺咳出痰血口氣腥臭嗌乾口苦者服瀉白後方俱見瀉火門治肺經燥熱咳嗽痰黏咯不易出者用清肺湯隨症加味若肺氣本虛燥郁咳嗽喘嘔膨脹者服救肺湯治肺燥氣實喘嗽痰稠胸腹滿悶二便秘澀者服瀉肺湯瀉肺丸或服清燥寧嗽化痰定喘丸以上俱見潤燥門治寒實痰嗽涎飲頓塞氣閉不通先用透羅丹下其寒結見攻裡門後按痰飲門隨症調治治虛寒咳嗽氣乏喘息並年久勞嗽痰血氣腥者服人參養肺湯肺痿久嗽乾咳者服瓊玉膏十味煎久嗽方均見潤燥門治久嗽氣血兩虛者用八珍湯加炒黃柏知母麥冬貝母陳皮五味子痰嗽脾虛服香砂六君子湯肺虛久嗽服補肺湯阿膠散久嗽痰血服紫菀湯固金湯夜則嗽甚不得安臥及虛損勞熱陰火久嗽服八仙長壽飲以上均見補養門治脾肺氣虛不能實腠理易感風寒咳嗽自汗痰涎清稀氣乏虛喘者主以補中益氣湯隨症加味見理氣門如早間頻頻咳嗽兼吐酸痰此脾虛飲食所化也前湯加炒神麯麥芽山楂木香嗽久不止加麥冬五味子如久嗽吐痰形衰食少聲音嘶啞者此氣虛兼燥也前湯加鹽酒炒黃柏知母天冬麥冬桑皮杏仁五更嗽甚服逍遙散見和解門早間嗽血服太平丸見理血門喘吼門總括一呼一吸氣出急促者謂之喘急若更喉中有聲響者謂之哮吼氣粗胸高不能布息抬肩而喘者屬陽喘實邪風與痰也若更痰稠便硬則為熱實氣乏息微不能續息張口而喘者屬陰喘虛邪虛與寒也若更痰飲清冷則為寒實矣凡患喘吼忌食酸鹹肥甘脈略喘吼之脈浮滑而手足溫者生沉澀而四肢冷者死脈大而形衰脈數而形損出氣多入氣少汗出潤髮喘咳吐血不得臥者此為肺絕皆凶症也治法治外寒傷肺喘急氣逆脈浮滑者服華蓋散若肺虛感寒氣逆膈熱喘吼夾寒者服定喘湯若水飲攻肺喘不得臥形氣實者服葶藶大棗湯攻之痰飲喘甚服千緡湯表實無汗喘吼危急者服五虎湯表裡均實服八仙湯久吼遇寒即發服九實湯均見表裡門治喘吼裡實便秘脹痛服三一承氣湯下之裡熱痰喘服一捻金下之俱見攻裡門痰喘氣急服滾痰丸脈沉細服指迷丸見除痰門治上盛下虛氣促喘急而無痰者服蘇子降氣湯若七情鬱結上氣喘急服四磨湯養親湯七氣湯俱見理氣門氣虛而喘不能續息服五味子湯夏服清暑益氣湯俱見清暑門治陰虛火動虛喘不已服知柏地黃湯火旺刑金服滋陰降火湯陰陽不升降上盛下虛喘息氣逆頭暈目眩者主以黑錫丹治氣短喘促提不能升咽不能降此元海無根肝腎已敗子午不交氣脫症也服貞元飲亦有肝腎虛敗不能納氣浮散虛喘入少出多脈微細者服理陰煎以上俱見補養門哮吼俗名馬脾風喉中聲響如水雞之聲甚者聲如拽鋸因寒邪客於肺腧寒化為熱閉郁肺經如兼稠痰便硬者先用吐法次用下法治哮吼初起痰涎壅盛氣閉不通先服三聖散吐之見湧吐門哮吼取吐後吼仍不止便秘脹滿服一捻金下之見攻裡門哮吼表盛無汗形氣實者服五虎湯兩解之若喘急不得息形氣虛者服八仙湯和解之久吼遇寒則甚服九實湯俱見表裡門治痰吼食吼炙焦皂角二兩蒸熟籮卜子四兩研末薑汁糊丸白湯下醋嗆成吼粉草切片豬膽汁浸透炙乾研末蜜丸臨臥白湯下二錢鹽嗆成吼小薊草二兩豬精肉四兩同煮爛食肉飲湯余按幼科
