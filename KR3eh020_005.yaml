body:
  text: 傷寒雜病醫方卷五醫方發表門桂枝湯治風寒在表脈浮弱自汗出頭痛發熱惡風惡寒鼻鳴乾嘔等證及雜病自汗盜汗虛損虛瘧皆可煎服若傷寒脈浮緊無汗及酒客病風寒而汗出者禁用桂枝生薑酒洗白芍各三錢炙甘草二錢紅棗二枚煎湯溫服須臾啜熱粥一碗以助藥力溫覆取微汗不可令如水流漓必不除一服汗出不必再服若不出汗照法再服禁生冷黏滑肉面五辛酒酪臭惡等物後諸仿此醫宗金鑑曰此方為仲景群方之冠乃解肌發汗調和營衛之第一方也凡中風傷寒脈浮弱汗自出而表不解者皆得而主之其他但見一二證即是不必悉具故麻黃葛根青龍發汗諸劑踵行其後也如汗不出麻黃證也脈浮緊麻黃脈也余法詳見一卷太陽上中下篇疏邪實表湯陶節庵用代桂枝湯治同前證土炒白朮二錢桂枝白芍羌活防風川芎炙草各錢半生薑三片紅棗二枚飴糖一匙自汗不止加蜜炙黃耆喘加柴胡杏仁胸膈飽悶加桔梗炒枳殼黃耆湯張潔古用代桂枝湯治春夏月發熱惡寒自汗不止脈微弱者蜜炙黃耆土炒白朮北防風等分煎服惡風汗甚加桂枝白朮湯王海藏用代桂枝湯治內傷冷飲外感風邪寒熱自汗脈浮者土炒白朮北防風各三錢炙草錢半生薑三片小建中湯治傷寒表未解或心悸而煩或腹中急痛而脈陽澀陰弦者酒洗白芍六錢桂枝生薑各三錢炙草二錢大棗二枚飴糖一合煎服凡病嘔者忌服恐甜助嘔也桂枝加葛根湯治太陽風傷衛汗出惡風項背強急太陽兼陽明症者葛根四錢桂枝白芍炙草各二錢生薑大棗引桂枝加芍藥湯治太陽病誤下之致邪入太陰腹滿時痛時止脈浮弱白芍六錢桂枝生薑各三錢炙草二錢大棗二枚桂枝加大黃湯治太陽病誤下邪陷入太陰腹滿大實作痛脈浮數者桂枝生薑白芍各三錢炙草二錢大黃一錢大棗二枚桂枝加厚朴杏仁湯治表症誤下之致微喘氣逆而停表邪者桂枝生薑白芍各三錢炙草薑炒厚朴各二錢去皮尖杏仁十枚大棗二枚桂枝新加湯治傷寒發汗後身痛脈沉遲者用此補氣血而通營衛酒洗白芍生薑各四錢桂枝三錢人參炙草各二錢大棗二枚桂枝去芍藥湯治太陽病下之脈促胸滿者此陽邪內陷滿而不痛尚未成結胸也桂枝生薑各三錢炙草二錢大棗二枚桂枝加附子湯太陽病發汗遂漏不止其人惡風小便難出四肢微急難屈伸者桂枝生薑白芍各三錢炙草炮附子各二錢大棗二枚桂枝去芍藥加附子湯治傷寒八九日風濕相搏身重煩痛不能轉側不嘔不渴脈浮虛澀即前方減去芍藥以避酸寒也桂枝甘草湯治發汗過多叉手冒心心下悸欲得按者桂枝五錢炙甘草三錢大棗三枚煎湯頻服桂枝麻黃各半湯若太陽病得之八九日如虐狀熱多寒少脈微浮緩小便清白而不嘔者病當自愈如脈微不緩面赤熱而身癢者猶有表邪怫鬱也用此湯輕輕表之桂枝錢半麻黃炙草酒洗白芍生薑各一錢去皮尖杏仁十粒大棗一枚服取微汗桂枝二麻黃一湯治太陽病服桂枝湯大汗出形如虐日再發者服此桂枝二錢麻黃一錢酒芍生薑炙草各錢半去皮尖杏仁十粒棗一枚桂枝二越婢一湯治太陽病發熱惡寒熱多寒少脈微弱者服此解之桂枝生薑酒芍各二錢麻黃炙草各一錢石膏末二錢大棗二枚桂枝龍骨牡蠣湯金匱治男子遺精女子夢與鬼交者桂枝生薑白芍煅龍骨煅牡蠣粉各二錢炙草錢半大棗二枚桂枝五物湯金匱治血痹身體不仁如風痹狀亦治風中經絡心清舌軟難言者蜜炙黃耆酒洗白芍桂枝生薑各三錢大棗二枚桂枝栝蔞湯治太陽症備身強𠘧𠘧脈反沉遲此為痙用此徹熱榮筋調和營衛桂枝生薑白芍天花粉各三錢炙草二錢棗二枚桂枝防風湯治嬰兒傷寒不堪發汗用此解肌桂枝白芍防風炙草等分薑棗引喘加炒枳殼去皮尖杏仁嘔加製半夏陳皮桂枝羌活湯治風瘧初起先傷於風後傷於寒熱多寒少脈浮有汗桂枝羌活防風甘草等分煎湯於臨發之先服之嘔加半夏桂枝芍藥湯治太陽陽明合病日間發瘧寒熱大作汗出不止桂枝錢半黃耆白芍知母石膏各三錢煎服寒熱必減桂枝石膏湯亦治前瘧桂枝一錢黃芩二錢知母石膏末各三錢麻黃湯治傷寒太陽症寒邪傷營發熱無汗惡風惡寒頭痛而喘身痛腰疼項背牽強骨節痠痛胸滿嘔逆脈浮緊或浮數並治太陽陽明合病喘促胸滿及風寒濕三痹肺經壅塞昏亂不語冷風哮吼等症去根節麻黃三錢桂枝二錢炙草一錢去皮尖杏仁草粒不用引煎湯熱飲溫覆靜臥只取微汗中病即止無汗再服一劑醫宗金鑑曰此方開表逐邪發汗第一峻劑其制在溫覆取汗若不溫覆取汗則不峻也解見太陽中篇凡傷風有汗脈浮弱尺脈遲者禁服升陽發表湯節庵用代麻黃湯治同前症麻黃桂枝各錢半羌活防風白芷川芎升麻甘草各一錢去皮尖杏仁十粒生薑蔥白豆豉引川芎湯潔古用代麻黃湯治春初秋末傷寒發熱無汗惡寒強痛身重牽疼脈浮緊者川芎羌活法制蒼朮各三錢惡寒甚者加入麻黃一錢溫服取微汗麻黃杏仁甘草石膏湯治汗下後汗出而喘亦治溫瘧先熱後寒喘甚渴飲無汗者麻黃四錢炙草二錢石膏末八錢去皮尖杏仁草粒麻黃連翹赤小豆湯治傷寒因發汗不盡邪熱壅於肌表而發黃者麻黃連翹根炙草生薑各二錢赤小豆一合梓樹根白皮五錢去皮尖杏仁十粒大棗二枚服取微汗麻黃升麻湯治傷寒六七日大下後寸脈沉遲手足厥冷下部脈不至咽喉不利唾出膿血下利不止者麻黃萎蕤當歸白芍茯苓炙草土炒白朮去心天冬升麻桂枝黃芩知母乾薑石膏末麻黃白朮湯金匱治濕家身體煩痛用此發汗燥濕麻黃三錢土炒白朮桂枝各二錢炙草一錢制杏粒煎服取汗麻黃附子湯金匱治水病脈沉虛脹屬少陰氣水者麻黃三錢炙草炮附子各二錢溫服麻黃附子細辛湯治少陰傷寒始得之反發熱脈沉太陽少陰同病者麻黃炮附子各二錢北細辛一錢方解見一卷少陰篇麻黃附子甘草湯少陰始得病反發熱脈沉者則用前湯若得之二三日脈沉熱微而無吐利厥逆之裡症者用此湯微表之麻黃炙甘草各二錢炮附子錢半麻黃羌活湯治寒瘧初起先傷於寒後傷於風寒多熱少脈浮無汗者麻黃羌活防風甘草等分煎湯將發之先溫服取汗嘔加製半夏還魂湯治邪在太陰卒中暴厥口噤氣絶下咽奏效而不用溫覆取汗麻黃三錢炙草二錢去皮尖杏仁十粒千金方加肉桂治同三拗湯局方治感冒風寒鼻塞咳嗽麻黃四錢留根節發中有收也杏仁草粒留尖取其發連皮取其澀也生甘草二錢補中有瀉也大青龍湯治太陽風寒兩傷營衛同病脈浮緊身疼痛發熱惡寒不汗出而煩躁又治兩傷病脈浮緩身不痛而重乍有輕時而無少陰症者方解見一卷太陽下篇麻黃石膏末各三錢桂枝炙草各一錢生薑錢半去皮尖杏仁十粒大棗二枚服取微汗得汗即停張仲景曰若脈微弱汗出惡風不可服此誤服則致變厥逆筋惕肉瞤此為亡陽急服真武湯以救逆見祛寒門小青龍湯治傷寒表不解心下有水氣發熱乾嘔或咳或渴或喘或噎或少腹痛小水不利短氣不得臥及雜病膚脹水腫等症麻黃桂枝白芍炙草各三錢北細辛製半夏五味子乾薑各二錢加減法渴去半夏加花粉喘去麻黃加制杏仁噎膈去麻黃加炮附子尿祕少腹滿去麻黃重加茯苓形腫喘逆去麻黃肺脹咳而上氣煩躁而喘心下有水脈浮者加石膏末五錢葛根湯治太陽病項背𠘧𠘧無汗惡風又治太陽陽明合病下利頭痛腰疼肌熱鼻乾脈浮大而長葛根四錢麻黃生薑各三錢桂枝白芍炙草各二錢大棗二枚合病不下利但嘔者加製半夏二錢葛根解肌湯治傷寒溫病發熱惡寒頭痛項強前湯加黃芩二錢升麻葛根湯治陽明傷寒傷風頭痛身重發熱惡寒無汗口渴目痛鼻乾臥不得安及陽明發斑欲出不出凡寒暄不時致生疫疾一切斑疹升麻三錢葛根白芍各三錢炙草一錢生薑三片隨症加味頭痛加川芎白芷身痛背強加羌活防風頭面浮腫加芥穗防風白芷川芎連翹牛蒡石膏末咽痛加桔梗斑出不透加紫草茸脈弱加人參腹痛倍加白芍胃弱食少加土炒白朮發熱不止春加柴胡防風黃芩夏加黃芩石膏凡痘疹初發熱此湯主之見五集痘科柴葛解肌湯節庵用代葛根湯治太陽陽明合病頭目眼眶疼痛鼻乾不眠肌熱惡寒脈微洪無汗者柴胡葛根羌活黃芩白芷白芍甘草桔梗石膏末等分生薑紅棗引惡寒甚冬月加麻黃春夏秋加蘇葉柴胡升麻湯治少陽陽明合病傷風壯熱惡寒頭痛身疼鼻塞咽乾痰盛咳嗽唾涕稠黏及陽氣鬱遏元氣下陷並時疫感冒脈浮洪兼弦者柴胡前胡芥穗黃芩赤芍各二錢升麻葛根桑白皮各錢半石膏末三錢生薑三片豆豉二十粒十神散治時氣瘟疫風寒兩感惡寒無汗發熱頭痛鼻塞咳嗽脈浮者麻黃蘇葉升麻葛根川芎白芷甘草陳皮赤芍香附等分薑蔥引百解散治瘟疫初起表實無汗壯熱憎寒頭身強痛咳嗽煩喘唾涕稠黏脈浮有力者麻黃二錢製蒼朮芥穗白芷各錢半陳皮甘草各一錢生薑蔥白引脈浮有汗按和解門表裡俱實按表裡門大羌活湯潔古用治兩感傷寒見二卷兩感附法羌活獨活防己防風黃芩黃連製蒼朮白朮川芎生地炙草知母生薑引沖和靈寶飲節庵治兩感初起發熱憎寒頭痛煩渴口燥舌乾三陽經先受病者羌活防風白芷川芎柴胡細辛生地黃芩薄荷甘草石膏葛根薑棗冬月去黃芩加麻黃余按二卷辨症篇人參敗毒散治傷寒傷風憎寒壯熱頭項強痛鼻塞聲重風痰咳嗽凡時氣疫癘嵐瘴鬼瘧或聲如蛙鳴赤眼口瘡濕毒流注腳腫腮腫喉痹毒痢諸瘡斑疹脈浮有表者皆宜服此人參甘草各五分羌活獨活柴胡前胡枳殼桔梗川芎茯苓各一錢薄荷三分生薑三片口乾舌燥加黃芩濕熱腳氣加製蒼朮大黃皮膚風癢加蟬蛻荊防敗毒散前方去人參加芥穗防風治前症脈浮數而兼風熱通治瘡瘍初起發熱惡寒亦治腸風下血清鮮連翹敗毒散前方去人參加連翹銀花治一切風熱瘡毒之主方硝黃敗毒散前方去人參加芒硝大黃治脈浮而數裡熱便祕者黃芩敗毒散前方去人參加黃芩治溫病發熱不惡寒而口渴者倉廩散前方加陳米一合治噤口痢食入即吐及痢後寒熱渴飲再造散治無陽症凡傷風寒寒熱無汗頭身強痛服汗藥數劑汗不出者此因陽虛不能作汗也人參炮附子北細辛各五分黃耆桂枝羌活防風川芎炙草酒炒白芍各一錢薑棗引夏月加黃芩石膏九味羌活湯張元素用代麻黃桂枝青龍各半等湯治傷寒傷風憎寒壯熱頭疼身重項痛脊強嘔吐煩渴脈浮無汗及四時感冒諸症羌活防風法制蒼朮各錢半川芎白芷生地黃芩甘草各一錢北細辛五分薑棗引脈虛自汗去蒼朮加黃耆白朮胸滿去生地加枳殼桔梗喘加制杏仁夏月加知母石膏末要汗下兼行加大黃此方藥備六經治通四時不犯三陽禁忌為解表神方春可治溫夏可治熱秋可治濕冬可治寒是諸路之應兵用代麻桂青龍等湯最為穩常但陰虛氣弱之人及表虛自汗之症亦在所禁耳羌活沖和湯金鑑用治一切頭風暈痛眉稜骨痛即前方倍用川芎白芷加白菊花錢半隨經加引頭痛由項後起者屬膀胱經倍羌活加藁本脈實便祕俱加酒炒大黃痛由太陽起牽引眉目腦額者屬胃經倍白芷加葛根石膏末各二錢痛由耳後起者屬膽經加柴胡痛兼足冷氣逆者屬腎經倍用細辛痛兼腹痛身重屬脾經倍蒼朮痛兼肢冷嘔吐涎沫屬肝經加吳萸大痛煩渴肌熱倍條芩加石膏痛吐痰飲手足溫者加茯苓製半夏貼太陽穴法治風邪入腦頭痛如破雀腦川芎白附子等分研末生蔥搗汁調作二餅貼左右太陽穴以布裹住良久自愈清上蠲痛湯治一切頭痛隨症加味羌活獨活防風菊花川芎白芷甘草當歸蔓荊子北細辛製蒼朮酒炒黃芩去心麥冬生薑引加味法左邊痛加柴胡膽草生地紅花右邊痛加葛根虛加黃耆眉骨痛加天麻法半痰痛加法半南星食痛加炒枳實神麯麥芽腦頂痛加藁本蒼耳風甚加芥穗蒼耳全蠍殭蠶氣血兩虛加參耆炒芍熟地虛寒痛去黃芩麥冬加乾薑桂心甚加白附天麻藁本芎芷石膏湯治頭風暈痛脈浮洪數羌活藁本白芷川芎石膏菊花風甚目昏加防風芥穗熱甚加梔子連翹條芩薄荷苦痛加細辛頭痛煩渴脈實便祕加酒炒大黃芒硝川芎茶調散治諸風上攻偏正頭痛目眩發熱惡風有汗鼻塞淡壅者薄荷葉八錢川芎芥穗各五錢羌活白芷防風甘草各三錢北細辛一錢共研細末每用茶湯調化三錢食後熱服菊花茶調散前方加白菊花炒殭蠶治頭目脹痛風熱兼痰者以上二散照減分量加茶葉同煎服治頭痛甚便清震湯治雷頭風頭面疙瘩昏痛惡寒發熱狀似傷寒耳中常聞雷鳴製蒼朮升麻荷葉等分煎湯頻服又名升麻湯蔥豉湯治傷寒初起發熱惡寒頭身強痛表實無汗蔥白七莖豆豉一合煎湯溫服或加生薑服此若無汗出加葛根二錢再煎服取汗如夾熱煩渴表實無汗切碎薑蔥豆豉豆腐同煮熟空心服食取汗杏蘇散治傷風喘嗽脈浮緩者去皮尖杏仁十粒桑白皮炒枳殼酒炒黃芩去心麥冬蘇葉陳皮前胡貝母桔梗甘草各一錢生薑引醫方湧吐門瓜蒂散仲景治傷寒如桂枝症頭不痛項不強寸脈微浮胸中痞硬氣上衝喉不得息者胸有寒也用此吐之通治卒中痰迷涎飲壅盛顛狂煩亂人事昏沉五癇痰壅窒塞上膈及火氣上衝喉不得息食停上脘欲吐不出亦治卒然發黃心滿氣喘甜瓜蒂炒黃色赤小豆等分研極細末量人虛實或用一錢或五分煎豆豉湯調服白湯調服亦可吐時須令閉目束緊肚皮如吐不止服蔥白湯解之倘服藥良久不作吐者令含砂糖一塊當即作吐凡頭額兩太陽痛者令噙水一口將竹管挑此散一字吹入鼻中鼻出黃水即愈凡胸中停食停痰及水濕涎飲胸滿頭痛發熱惡寒脈浮緊而不大者皆服此散吐之但亡血虛家老人産婦血虛脈微者忌服三聖散治中風風癇痰厥頭痛炒瓜蒂藜蘆防風等分研末每用一錢白湯調服照前法吐之用此吹鼻能治頭風二聖散治風痰壅盛炒瓜蒂一錢焙全蠍五分共研極細白湯調服二神散治傷寒煩悶炒瓜蒂研末豆豉湯調服一錢照前法吐之參蘆散治虛弱人痰涎壅盛人參蘆研末竹瀝調一二錢滾湯沖服丹溪曰人參補陽中之陰參蘆反瀉太陰之陽亦猶麻黃根莖不同也稀涎散治中風暴僕痰涎壅盛氣閉不通先開其關令微吐稀涎續進他藥亦治喉痹不能進食者白礬一錢皂角去皮弦炙焦二錢共研極細白湯調服五分以取微吐但使咽喉疏通能進湯藥即止勿再服吐後關開應用藥餌須緩緩與服若飲食太猛恐傷胃氣也丹溪曰胃氣亦賴痰以養不可盡攻盡則虛而愈劇常山方用吐瘧痰白礬皂角藜蘆常山甘草研末白湯每下五分五元散湧吐重劑白礬膽礬皂角藜蘆赤豆研末白湯每下五分巴礬丸巴豆肉枯礬等分研末水糊小丸水下三分梔子豉湯治傷寒汗吐下後虛煩不眠甚者反復顛倒心下懊憹及大下後身熱不退心下結痛或痰在膈中用此微吐之糞微溏者勿服連殼大梔子七枚豆豉二合煎湯溫服以取微吐本方加甘草治前症兼少氣者加生薑治前症兼嘔者去豆豉加乾薑治誤下身熱不去微煩者去豆豉加厚朴枳實治下後煩滿者梔子柏皮湯治傷寒身熱發黃梔子黃柏甘草等分煎湯溫服枳實梔豉湯治傷寒新差勞復炒梔子炒枳實淡豆豉溫服取汗梔豉大黃湯治酒疸發黃心中懊憹時或熱痛亦治傷寒食復等症梔子豆豉大黃枳實酌量煎服輕則消導重則吐下瓜蒂散吐中之重劑用吐上焦有形之實邪凡未經汗下邪郁胸膈而痞滿者宜之梔子豉湯吐中之輕劑用吐無形之虛煩凡經汗吐下邪乘虛客於胸中而懊憹者宜之若停宿食宜服梔豉大黃湯乾薑霍亂吐方治腹中絞痛欲吐不得吐欲瀉不得瀉俗名絞腸痧症炒枯鹽一把淬熱童便中分作三碗頓服一碗旋以指頭或用鵝翎探掃喉間令作大吐再服一碗如法再探再吐三飲而三吐之鹽湧於上溺泄於下則中通矣方極簡便鹽湯探吐法治傷食物痛連胸膈痞悶不通手足逆冷尺脈全無者炒枯鹽一把淬熱湯中頓服一二碗旋以指探喉間令作大吐立愈凡霍亂蠱毒冷氣鬼氣宿食腹痛先用此法三飲而吐之大勝用藥桐油餞治喉風喉痹痰涎壅塞氣閉不通熱水半杯內調桐油少半取雞鵝硬翎蘸桐油探掃喉間導引作吐一連探吐數次痰涎湧出以氣通聲高為度預煎甘草湯頻頻漱口以解油毒後服藥餌凡腹痛便祕者為下症胸滿便軟者為吐症若大便溏瀉多屬裡虛寒在下也不宜取吐雄黃解毒丸治纏喉急痹痰涎壅盛內外腫痛湯水不下病勢危急者明淨雄黃川鬱金各三錢先研細末剝淨巴豆肉十四粒綿紙包裹捶壓去油合前末研勻米醋糊為丸緑豆大茶湯送下七丸得吐利自愈若昏冒不醒牙關噤急者用醋化開十丸含醫人口中以竹管插其鼻將藥從管中徐徐吹入度過咽喉俾得吐利其關立開如意勝金錠治喉痹初起狀似傷寒用此開關利格火牙硝淨兒茶石硫黃生川烏薄荷葉小川芎乾生地等分研極細搗生蔥汁糊藥為錠每重一錢薄荷湯磨化服之甚者連服三錠得吐利自減奪命散治中風閉症腹滿便祕神昏口噤痰結喉間生南星半夏葶藶子白芷梢各一錢先研極細另研巴豆肉紙包壓去油取霜一錢合前末研勻每用五分白湯調服以吐利為度清化丸治積熱上攻喉痛聲嘶痰涎壅閉黃連桔梗各三錢粉甘草山豆根各二錢硼砂薄荷葉各一錢研末蜜丸重一錢噙化白湯咽下聲嘶方研細薄荷葉一兩拌白糖烏梅肉各二兩搗膏為丸常當噙咽兒茶散通治音啞兒茶五錢硼砂三錢研末白湯每調二錢頻咽下嚏鼻追喉引涎諸方皆屬上行宣越之法故並載湧吐門通關散治中風中痰中惡驚癇卒然昏死不省人事吹鼻取嚏以通關生南星生半夏北細辛薄荷葉牙皂肉等分研極細男左鼻女右鼻每用竹筒吹入三五釐有嚏者生無嚏者肺氣絶也治痰厥加白礬霹靂散治中惡卒死川芎白芷牙皂肉北細辛明雄黃各五分躑躅花俗名老虎花一分先研極細加麝香五釐再同研勻磁瓶收貯每用三五釐吹鼻取嚏引出毒涎溫水漱淨後服湯藥如聖散治時氣纏喉牙關噤閉藜蘆雄黃枯礬皂角等分研極細每用三五釐吹鼻得嚏自開碧雲散治頭風目翳眉稜腦額諸痛鵝不食草即石胡荽曬灱五錢川芎四錢北細辛辛夷淨仁各一錢青黛五分曬研極細每用五釐口含溫水竹管吹鼻取嚏或用小瓶收貯常常嗅鼻能墜風翳蓽茇散治風熱頭痛研蓽茇五錢豬膽汁拌濕曬乾再研極細照前法吹鼻令出黃水治風濕頭痛甜瓜蒂松羅茶等分研末吹鼻熏鼻法治中風痰口噤昏死巴豆肉五錢綿紙包裹捶碎令油黏紙上去渣再卷皂角末燒煙燻鼻巴豆油紙搓丸塞鼻治喉痹不通解語法治中風舌強不能言取烏龜放磁盤中以鏡對照龜自撒尿用雞翎蘸尿頻點舌根下舌自軟能言開關散治中風痰驚癇痙症牙關不開生南星烏梅肉各三錢先搗如泥拌冰片一分再同搗勻每用二錢遍捺牙關涎出立開烏梅方通治口噤不開搗烏梅肉頻捺牙關風寒牙噤生薑捺之一笑丸治六郁牙痛蟲牙痛研碎川椒七粒和巴豆肉一粒再同研勻搗飯糊為丸薄綿包裹咬在痛處良久惡涎湧出方取下漱後玉池散用此噙漱治諸蟲牙痛升麻防風白芷川芎細辛藁本甘草當歸黑豆槐花地骨皮等分煎湯常常噙漱牙疳散主治牙疳及牙痛焙乾人中白煅緑礬五倍子檳榔片各二錢冰片五釐共研極細煎甘草湯漱口用此捺牙再漱再捺風熱牙痛用石膏白芷各五錢花椒膽草枯礬炒鹽各二錢研末捺之風冷牙痛用良薑細辛川椒蓽茇升麻草烏等分研末捺之溫水漱口經驗方治牙痛舌腫唇口諸症元明粉硼砂兒茶各二錢川連雄黃青黛各五分先研細末兌冰片五釐再同研勻吹捺聽便風牙方炒焦草烏片二錢焙灱全蠍殭蠶各一錢北細辛五分先研末加冰片五釐再同研勻每用五分捺牙吐出風涎良久用白湯漱口溫風散治風牙痛不甚焮腫不怕冷熱當歸川芎白芷藁本防風細辛各一錢露蜂房五分煎湯先噙一半漱吐風涎次溫服一半寒牙痛前方加羌活麻黃炮附子先噙漱一半次服一半又方乾薑黑豆花椒艾茸蔥白等分煎湯照前法噙服冰硼散通治口舌咽鼻腫痛潰爛硼砂元明粉各三錢硃砂冰片各一分共研極細或吹或搽七寶散治喉風腫痛牙硝雄黃白礬膽礬硼砂牙皂焙灱全蠍等分研末每用三五釐竹管吹入良久用白湯漱吐惡涎珍珠散治咽喉潰爛川連黃柏貝母兒茶硼砂青黛煅人中白各錢半煅魚腦石燒蠍子灰水粉各一錢冰片牛黃硃砂豆腐煮珍珠各五分麝香三分共研極細磁瓶收貯每用三五分吹捺患處消蛾方治乳蛾初起膽礬枯礬硼砂各錢半焙灱雞內金百草霜各二錢研細醋調成糊鵝翎蘸掃患處滿吐惡涎後用薄荷湯漱口附嗅鼻法治厄逆不止石硫黃淨乳香等分封口煎湯乘熱揭孔以鼻嗅之又方燒鹽梅存性香藎蒂煎湯調服或薑汁白蜜滾水沖服附硫汞散治吐逆噦噫湯水到咽即吐石硫黃三錢水銀錢半同研至水銀不見星色如煙煤為度搗生薑汁和酒調成糊滾湯沖化頓服次日大便出黑糞已後食不再吐逆又方淨黃土和鹽少許搓三丸彈子大煅紅淬白湯中待溫頓服之水調灶心土塞鼻服藥不吐醫方攻裡門大承氣湯治傷寒陽明府病陽邪入里胃實不大便腹常滿痛發熱自汗而不惡寒胃實譫語手足濈然汗出胃燥妄言如見鬼狀喘冒不能臥脈滑實沉實痞滿燥實堅五症全見者並治雜病三焦俱熱六脈沉實及陽明剛痙然非大實大滿不可輕投恐有寒中結胸痞硬之變酒洗大黃四錢薑汁炒厚朴八錢麵炒枳實一錢淨芒硝三錢俱另包先將厚朴枳實煎湯次入大黃煎數沸後將芒硝同煎一二沸去滓溫服良久大便下利不可再服此正陽陽明藥解見一卷陽明篇小承氣湯治傷寒陽明症譫語便硬潮熱而喘及雜病上焦痞滿不通生大黃四錢薑炒厚朴二錢麵炒枳實一錢溫服取微下勿令大泄五症未全故除芒硝毋傷真陰此少陽陽明藥解見一卷陽明篇調胃承氣湯治傷寒陽明症不惡寒反惡熱口渴便閉譫語腹滿中焦燥實及傷寒吐後腹中脹滿陽明病不吐不下而心煩者亦治渴症中消善食而溲金鑑治表解有汗裡熱不除胃因不和而邪不作解者酒浸大黃四錢芒硝八錢炙甘草二錢煎湯少少溫服只取微泄此足太陽陽明藥也三湯方解見一卷陽明篇後三一順氣湯後人合前三湯為一方治傷寒雜病蓄熱內甚燥實堅脹酒浸大黃炒厚朴淨芒硝炙甘草各二錢炒枳實一錢溫服取下六一承氣湯節庵合三一承氣與大柴胡大陷胸六方為一方治潮熱自汗煩渴譫語發斑發黃腹滿便祕胃府實症酒洗大黃炒厚朴柴胡黃芩芒硝炙草各錢半炒枳實八分臨服兌鐵鏽水三匙或加白芍麻仁丸治大陽症傳入陽明腸胃燥熱大便祕結小水數多脈浮而澀蒸曬去殼淨麻仁二兩去皮炒灱杏仁薑炒厚朴去皮大黃酒炒白芍各一兩麵炒枳實五錢曬灱研細煉蜜糊丸梧子大白湯先下十丸日三服漸加至二十丸以便利為度大陷胸湯治傷寒下之早表邪入里心下滿而硬痛或重汗而復下之不大便五六日舌上燥渴日晡潮熱從心至小腹硬滿痛不可近或無大熱但頭出微汗脈沉而為水結胸症大黃五錢芒硝一兩先煎熟去渣另調甘遂末五分溫服以取快利大陷胸丸治傷寒結胸項強如柔痙狀大黃芒硝炒葶藶子炒灱去皮杏仁各五錢甘遂五分共研末蜜糊丸彈子大水煎服過宿乃下小陷胸湯治傷寒誤下邪結心下按之則痛脈浮滑者並治痰熱塞胸薑製半夏栝蔞仁各三錢黃連一錢煎湯溫服十棗湯散治太陽中風下利嘔逆表解者乃可攻之其人頭痛漐漐汗出心下痞硬痛引脅下乾嘔短氣汗出不惡寒表解而里未和邪熱內蓄有伏飲者宜之炒黑芫花紅芽大戟甘遂各二錢共研極細強人用一錢虛人用五分紅棗十枚煎湯調服取快利下後服粥補養黃龍湯節庵治熱結下利見二卷辨症篇後酒洗大黃炒厚朴芒硝當歸桔梗炙草各一錢人參煨枳實各五分薑棗引老弱人去芒硝三化湯機要治中風邪實便祕腹滿脹痛者大黃四錢炒厚朴羌活各一錢炒枳實一錢溫服通利三焦復其傳化之常小胃丹丹溪治胸膈腸胃熱痰濕痰炒芫花大戟甘遂各一錢酒炒黃柏六錢煨大黃三錢米粥糊為小丸薑湯送下五分備急丸千金治食停腸胃冷熱不調腹脹氣急痛滿欲死及中惡客忤暴病卒死脈症實者巴豆肉紙包捶去油取霜二錢大黃乾薑各三錢共研末蜜為丸緑豆大每用三丸白湯送下口噤者化開灌之硇砂丸本事治一切積聚痰飲心脅引痛通治肉食積滯血積氣積硇砂白芷乾薑三稜巴豆霜各三錢木香檳榔胡椒青皮肉蔻各錢半炒乾漆大黃各五錢研末煮醋糊為小丸薑湯每下五丸木香檳榔丸治胸腹積滯痞滿結痛二便不通或瀉泄下利裡急後重食瘧實積木香檳榔去白陳皮醋炒青皮麵炒枳殼酒炒黃柏吳萸湯炒黃連醋炒三稜莪朮各五錢大黃一兩黑醜香附米各二兩共曬灱研末煮芒硝四兩濾汁糊丸緑豆大每用一錢或八分白湯送下導滯丸東垣治傷濕熱之物不得施化腹痛痞硬及酒食積滯瀉泄大黃一兩麵炒枳實炒神麯酒炒黃連黃芩各五錢土炒白朮茯苓澤瀉各三錢曬灱研末煮麵糊丸緑豆大每用一錢薑湯送下日三服化滯丸治心腹急痛濕熱鬱結及氣積食滯脈沉有力者巴豆肉紙包捶壓去油取霜二錢醋炒青皮三稜莪朮酒炒黃連各五錢製半夏陳皮各八錢木香丁香各三錢曬灱研末麵糊小丸白湯每下五分透羅丹治寒實痰飲喘咳頓塞氣閉不通巴豆霜皂角肉製半夏炒杏仁大黃黑醜等分研末麵糊小丸薑湯每下五分或三分一捻金治裡熱便祕痰壅氣促喘急脹滿大黃檳榔白醜黑醜人參以沙參代等分研細末每用一錢或五分蜜湯調服黑白散治熱毒壅結肛門腹痛脹祕欲死黑醜白醜半生半炒大黃檳榔陳皮甘草各三錢元明粉五錢研極細蜜水每調下一錢大黃湯治三陽熱結反胃厄逆川大黃五錢切片薑汁拌炒焦黑色兌陳米一合蔥白三寸煎湯作二次溫服破郁丹治心口飽塞噯氣不止醋炒香附二兩梔仁川連青皮枳實莪朮蘇子俱炒檳榔栝蔞仁各五錢研末煮麵糊小丸白湯下一錢一塊氣通治積聚癥瘕及厄逆疝氣形氣實者三稜莪朮香附青皮神麯麥芽蘿蔔子俱炒灱各五錢白醜檳榔陳皮鬱金炒川連各三錢麵炒枳實炙牙皂肉百草霜各錢半共研極細煮麵糊丸緑豆大每用三四十丸視病上下食前食後酒水送下日三服破積丸治積聚癥瘕炒焦乾漆去油巴豆霜醋煮硇砂各三錢煨大黃煨三稜各五錢共研極細煮醋糊為小丸米湯每下五分日二服桃仁煎治血積血瘕去皮尖灱桃仁大黃朴硝各五錢炒焦虻蟲二錢共研極細慢火熬成米醋糊末為丸緑豆大曬乾磁瓶收貯先日莫吃晚飯五更初溫酒送下一錢攻下惡物為度不下利再服三稜煎治積聚癥瘕去皮尖杏仁萊蔔子乾漆青皮神麯麥芽各一兩俱炒灱研極細末另切碎三稜四兩入砂鍋內酒熬成膏布濾去渣糊勻藥末為丸梧子大空心米湯送下三十丸日二服保安丸治心腹內結塊如拳漸上撞心及奔豚惡症酒蒸曬大黃三兩乾薑一兩炮附子五錢醋炙鱉甲兩半研極細醋糊丸梧子大每日五更白湯送下二十丸以通利為度四制丸治一切痢疾錦紋大黃一斤切片分作四分去聲一分煎黃連一兩取湯拌大黃炒焦一分用乳汁浸透炒焦一分煎吳萸一兩取湯拌大黃炒焦一分用童便浸透炒焦共研極細酒煮灰麵糊丸梧子大每服一二錢白痢煎吳萸湯送下赤痢煎川連湯送下赤白痢米湯送下法制丸通治失血夾熱停瘀及咳血咯血等症川大黃一斤切大片拌紅花四兩燒酒浸透盛大碗內九蒸九曬以大黃透黑為度曬灱研末水糊丸梧子大青黛滾衣每用一錢空心白湯送下沆瀣丹治小兒裡熱便祕之通劑酒蒸大黃酒炒黃芩酒炒黃柏川芎各九錢酒炒赤芍炒灱黑醜滑石檳榔連翹各六錢麵炒枳殼薄荷葉各四錢曬灱研末煉蜜為丸重一錢空心白湯化服大黃皂刺湯治疝瘕血疝形氣實者大黃皂刺等分酒煎成湯空心溫服中病即止當歸承氣湯河間治裡熱火鬱或皮膚枯燥或咽燥鼻乾或二便祕結蓄瘀發狂酒浸大黃當歸芒硝各三錢炙甘草二錢薑棗引大黃甘草湯金匱治食已即吐外臺用治吐水有升無降者並治三焦消渴實症酒浸大黃六錢炙草三錢煎湯溫服取下蜜煎導法治陽明症自汗尿利大便祕結白蜜四兩入銅杓內慢火熬煉頻攪勿令灼焦俟凝結如飴糖狀捻作挺子頭鋭如指約長三寸摻皂角末少許乘熱套入肛門中良久候欲大便時取出膽汁導法治同前症豬膽一枚瀝汁兌醋少許和勻用竹管如指頭大長三寸下削平口刮光套入肛內二寸許上裁斜口令其俯臥以膽汁自斜口灌入良久必欲大便方才取出醬薑導法主治冷祕取肥實大醬薑削作挺子如小指大插入肛中待欲大便時方取出集解曰津液枯者宜蜜煎導法熱邪盛者宜膽