炒大黃二兩曬灱生地歸尾炙川山甲去皮炒灱桃仁元明粉各五錢桂心二錢共研極細面為丸梧子大酒水每下二錢下瘀血湯治血蠱石瘕單腹鼓脹酒炒大黃四錢桃仁去皮尖炒灱草粒土鱉去足炒黃三枚酒煎服大黃蟅蟲丸治五勞七傷內有乾血肌膚甲錯兩目黑暗酒蒸大黃曬灱生地各一兩桃仁杏仁去皮尖炒灱酒炒白芍各五錢炒條芩甘草各三錢炒焦乾漆炒焦土鱉焙灱蠐螬各一錢炒焦螞蝗十條虻蟲去頭足翅炒焦七枚共研極細蜜為小丸酒水每下五分日三服桃仁承氣湯治傷寒外症不解熱結膀胱小腹脹滿大便黑小便利燥渴譫語血發熱如狂及血瘀胃痛腹痛脅痛瘧疾實熱夜發痢疾蓄血急痛去皮尖研桃仁十粒大黃四錢芒硝甘草桂枝各一錢節庵加當歸白芍柴胡蘇木青皮枳實功效尤速當歸活血湯治夾血症解見一卷辨症篇不與桃仁承氣症治相同當歸赤芍生地川芎甘草柴胡炮薑人參紅花桂心炒枳殼制桃仁酒水煎服二三劑去桃仁紅花桂心加茯苓炙白朮多服自愈復元活血湯治從高墜下瘀留脅下痛不可忍歸尾二錢酒浸大黃三錢柴胡花粉炙山甲各錢半甘草紅花制桃仁各一錢酒水煎服槐花散治腸風藏毒下血炒槐花炒側柏葉炒黑芥穗炒枳殼炒川連等分研末米湯下二錢腸風加秦艽防風藏毒加蒼朮苦楝肉槐角丸前散去柏葉加當歸槐角條芩地榆研末酒糊小丸米湯每下一錢治便血日久不止和血湯治久便血製蒼朮秦艽當歸蜜耆白芍桂心丹皮陳皮生地熟地炙草生草酒炒升麻有熱加吳萸湯炒黃連等分煎服凡治痔漏方法詳見外科醫方便考當歸芍藥湯治下痢膿血稠黏腹痛後重歸尾白芍黃芩黃連各一錢大黃炙草木香檳榔桂心各五分煎服痢不減倍大黃前症兼渴去桂心炙草加炒枳殼香連和胃湯治痢疾攻後病勢大減用此調養木香黃連黃芩炙草當歸白芍茯苓陳皮土炒白朮炒研砂仁白痢久虛加人參炮薑赤痢血多加炒地榆椿白根皮白朮和中湯治白痢日久當歸白芍白朮茯苓陳皮炙草炒連炒芩木香汁兌服加味補血湯治赤痢日久當歸川芎赤芍升麻炒連炒芩去皮桃仁赤白兼者加茯苓白朮香附陳皮白多紅少再加炮薑炒吳萸香連化滯湯治時痢裡熱歸尾白芍川連條芩黃柏甘草木香檳榔酒浸大黃炒枳殼滑石末酌量服芍藥地榆湯治下利膿血脫肛者製蒼朮炒地榆白芍卷柏蒲黃炒阿膠等分煎服小薊飲子治下焦熱結而成血淋小薊木通生地當歸甘草藕節炒蒲黃炒梔子淡竹葉滑石末等分煎服失笑散治殺血心痛一切血滯瘀痛五靈脂焙灱蒲黃微炒等分研極細每用一錢醋調成糊滾湯化服
