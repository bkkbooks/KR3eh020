body:
  text: 傷寒心法集解卷一傷寒六經大旨傷寒總注曰傷寒者傷於太陽寒水之經也太陽司營衛而主表故外感之病由表而傳裡者統名傷寒其傳經則由太陽而次傳陽明以陽明主肌肉較之營衛之在表為稍深也若由肌肉而再入則將傳裡矣當其將入而未能遽入為半表半裡則少陽證是也夫三陽之邪能從外解則不至傳入三陰若由此而入陰則邪愈深矣入於太陰則猶在腹故有腹滿自利之證入於少陰則已及腎而真水被其銷鑠命根危矣其入之甚深而至於盡處則為厥陰此傳經之次第也六經始於太陽然太陽一經之病治法如此其繁者何也以外感之邪始於太陽一經多夾雜他經而他經與本經其受邪又有多寡不等仲景欲人於邪之差多差少處權衡不爽故雖一經之病而不得不詳及他經也喻嘉言謂王叔和不應以合病並病壞病過經不解病俱編入太陽篇中不知合病並病仲景正慮太陽夾雜他經而壞病過經不解病又皆由太陽誤治所致焉得不收入太陽項下此可見叔和之編次未可盡非也又如風傷衛用桂枝湯寒傷營用麻黃湯而證見煩躁則太陽之邪已恐其入陽明而爍枯津液故青龍湯加石膏以解熱而生津耳成無己以為治風寒兩傷而不言其預救陽明尚論篇因之以嘉言之明而亦昧此況其下焉者乎夫麻黃桂枝青龍湯皆太陽之表劑也陶節庵謂惟冬月嚴寒及西北之地宜用麻黃桂枝若南方溫暖及春夏秋感冒只宜羌活湯發汗此陶氏之法而為後世所當遵者也若邪不在營衛而在太陽之府則又有利小便之法夫太陽之病在經則發汗在府則利小便二法足以盡之使無兼夾之證與誤治之變何仲景之不憚煩而立法如此其多乎至於陽明在外則主肌肉在內則連太腸白虎湯所以退在經之熱承氣湯所以瀉在府之邪正治亦惟有二法而無如其或兼太陽或兼少陽則下治之法又當旁通矣況陽明有府之邪又有虛有實實者可下虛者或因發汗過多而致大便枯燥則下法又宜斟酌矣仲景立法所以又不得不細辨也然而熱之虛實邪之淺深則又惟觀舌之法可據節庵亦教人以此認證此又仲景所未備者也惟少陽則止有和解一法而已若或誤治變逆則太陽陽明二篇之救法可仿也三陰惟太陰立法最簡原文不過九條蓋邪之由陽而入陰者初入陰其地界尚淺故其脈浮者仍用升舉之法使邪復出於陽分而解縱有用下法者亦必兼桂枝總以邪入陰分未深不用竣下之法也若不由陽邪傳入而寒氣直中者則惟溫之而已又有本經自病非干外邪如脾土自弱或飲食所傷則東垣之脾胃論薛立齋汪石山之發明又皆所以輔翼仲景之書矣少陰則或溫或下法更不一大抵陽邪傳經則宜下陰邪直中則宜溫乃一定不易之法但又慮陰精素虧者溫固難施下亦宜慎故復有潤燥清熱之法誤汗亡陽者又有救逆固本之法陰盛格陽陽盛格陰者又有辨別真偽之法以腎之一臟真水真火寄居其中為人生立命之本也後賢如丹溪立齋諸人皆推原此旨透發妙論以治虛損勞傷各證而義始無餘蘊焉至於厥陰則傳經已盡而邪當復還於表能還於表則厥冷者變為溫熱而愈不能還於表則厥深熱深而不愈仲景所以禁用下法不使陷入之陽邪終不得還於表也其有用溫藥者亦為寒氣直中者而設非為傳經之陽邪而設也然陽邪傳入厥陰有因下利日久邪雖不還於表而亦從利出已盡於是邪盡而正亦脫又必用溫補之藥若正氣雖虛而熱邪未盡雖不得已而用溫補必以寒涼參入其間如烏梅丸乾薑黃連人參湯麻黃升麻湯之屬總以傳經皆屬熱證無單用溫補之理也此三陰治法惟陶節庵辨之甚悉以初病不發熱而惡寒手足厥冷者為直中陰經之寒證以由發熱起邪自三陽傳入厥陰而後手足變厥冷者為熱證以此辨證施治節庵可謂有功雖所著傷寒六書苟簡粗率使仲景精義淹沒不彰固不能無咎而其功則亦不可掩也要之傷寒論一書引而伸之雜證治法皆出於此歷代名家著書立說所論雜證各有所長惟以仲景傷寒六經而旁通於他病自能遊刃有餘若不明仲景傷寒六經則凡遇一病難免面牆而立故知醫學千支萬派無不從傷寒論一脈流出也奈論中頭緒繁多未易領會茲節錄傷寒總注繫於篇首俾學者便於熟讀默記明其大旨然後再玩味全書則易讀易解有會心之樂而無望洋之嘆矣三陽傷寒篇醫宗金鑑曰六經為病盡傷寒氣同病異豈期然推其形藏原非一因從類化故多端明諸水火相勝義化寒變熱理何難漫言變化千般狀不外陰陽表裡間太陽上篇辨太陽風邪中衛脈證治法太陽主表為一身之外藩總六經而統榮衛凡外因百病之襲人必先於表表氣壯則衛固榮守邪由何入經曰雖有大風苛毒勿之能害是也若表氣虛則榮衛之氣不能御外故邪得以乘之經曰虛邪不能獨傷人必因身形之虛而後客之也衛陽也榮陰也風陽邪也寒陰邪也邪之害人各從其類故中風則衛受之傷寒則榮受之衛分受邪則有汗而脈浮緩此為虛邪桂枝湯證也榮分受邪則無汗而脈浮緊此為實邪麻黃湯證也榮衛俱受邪均無汗皆為實邪大青龍湯證也大綱三法用之得當其邪立解用違其法變證百出緣風為百病之長故以風邪中衛列為上篇寒邪傷榮列為中篇風寒兩傷列為下篇其條目詳載本篇之下俾讀者開卷瞭然有所遵循也太陽上篇集解金鑑曰太陽主表表統榮衛風邪中衛寒邪傷榮均表病也脈浮表病脈也頭痛項強惡寒表病證也太陽經脈上額交巔入絡腦還出別下項連風府故邪客其經必令頭項強痛也惡寒者因風寒所傷故惡之也傷寒論首揭此條為太陽病之提綱凡上中下三篇內稱太陽病者皆指此脈證而言也又曰榮衛二者皆胃中後天之穀氣所生其氣之清者為榮濁者為衛衛即氣中之剽悍者也營即血中之精粹者也以其定位之體而言則曰氣血以其流行之用而言則曰榮衛榮行脈中故屬於陰衛行脈外故屬於陽也然榮衛之所以流行者皆本乎腎中先天之一氣故又皆以氣言曰營氣衛氣也滑壽曰脈在肉上行主表也方有執曰表即皮膚榮衛麗焉故脈見尺寸俱浮知病在太陽表也惡寒者該風而言也風寒初襲而鬱於表不能再勝風寒之外忤故畏惡之論中謂嗇嗇惡寒者肌被寒侵怯而斂也淅淅惡風者肌因風灑疏難御也翕翕發熱者肌得熱蒸合欲揚也嗇嗇淅淅翕翕俱從皮毛上形容較之傷寒之見證有浮沉淺深之別吳人駒曰頭為三陽之通位項為太陽之專位有所障礙不得如常之柔和是為強痛程應旄曰太陽經之見證莫確於頭項痛惡風寒故首揭也太陽中風總訣脈浮緩為中風頭項強痛惡寒風病即發熱汗自出鼻鳴乾嘔桂枝功若傷寒治不同誤服桂枝邪逆攻酒病妄投釀濕熱當隨變證急宣通前章言太陽膀胱經風邪傷衛脈證治法也中風病名也見前後集解其脈浮緩其證頭痛項強惡寒惡風發熱自汗鼻鳴乾嘔主以桂枝湯功能治中風虛邪或服疏邪實表湯俱見醫方發表門次章言傷寒病酒客病誤服桂枝湯致變救逆也傷寒乃無汗之實邪治宜麻黃湯發汗若誤服桂枝湯則表邪愈固裡氣更逆致令嘔吐不已當詳二卷傷寒辨證篇以救逆酒客病謂醉酒之人狀似中風先宜取汗次宜利小便以分消其濕熱若誤服桂枝湯則濕熱內釀榮血受傷致令嘔吐血膿當開表通里以救逆方法另詳三卷內傷酒病門太陽中風集解金鑑曰衛為表陽風屬陽邪風邪中人則衛受之從其類也風中於衛即發熱者以風衛皆陽其性本熱故變熱甚捷不似傷寒待其閉鬱而始發熱也衛病不能固表又為陽邪所蒸故腠理疏而汗自出也汗出表虛為風所忤故惡風寒風性柔軟故脈來浮緩也此條為中風病之提綱後凡稱太陽中風者皆指此脈證而言也汪琥曰此中風非東垣所云中府中藏中血脈之謂蓋中字與傷字同義仲景論中不直言傷風者恐後學不察誤以咳嗽鼻塞聲重之傷風混同立論故以中字別之也論曰脈緩當作浮緩看浮是太陽病脈緩是中風主脈中篇緊脈亦當仿此又曰治中風當及其發熱自汗之時用桂枝湯服取微汗風邪自解苟失其時則風邪入里病熱必深桂枝湯非所宜矣致變救逆集解金鑑曰桂枝湯本為解肌中風表虛之藥也若其人脈浮緊發熱惡寒身痛無汗乃傷寒表實之病不可與也當須識此為麻黃湯證勿令誤服桂枝湯若誤服之表氣愈固裡氣更逆致嘔吐不已當隨其變證救之程應旄曰可與不可與只在毫釐疑似之間誤多失於倉卒須將營衛之分別處兩兩互勘陰陽不悖虛實瞭然不以桂枝湯誤治脈浮緊無汗之傷寒自不致以麻黃湯誤治脈浮緩汗自出之中風矣金鑑曰酒客過飲而病其病之狀頭痛發熱汗出嘔逆乃濕熱熏蒸使然非風邪也若誤與桂枝湯服之則嘔以酒客不喜甘故也桂枝湯乃辛甘之品能動熱助湧若其人內熱素盛誤服此湯又不即時嘔出則益助其熱其後必吐膿血然亦有不吐膿血者則是所傷者輕而熱不甚也救逆用葛花解酲湯之類見醫方消導門太陽中篇辨太陽寒邪傷營脈證治法太陽統攝之營衛乃風寒始入之兩途風則傷衛寒則傷營衛氣慓疾統氣而行脈外其用疏泄而屬陽邪之犯也易故其犯之也則有汗為虛邪營氣專精統血而行脈中其體固密而屬陰邪之犯也難故其犯之也則無汗為實邪夫冬固寒冷也然春月餘寒秋末早寒皆能致病但見無汗實邪脈來浮緊即可謂之傷寒不必盡屬隆冬也且太陽經也膀胱府也由經視府則經為表而府為里矣上篇桂枝湯解肌所以治風傷衛之表也而未及衛分之裡故又立五苓散一方佐桂枝以和衛分之裡焉此篇用麻黃湯發汗所以治寒傷營之表也而未及營分之裡故又立桃仁抵當等方佐麻黃以攻榮分之裡焉至於汗下失宜過之則傷正而虛其陽不及則熱熾而傷其陰虛其陽則從少陰陰化之證多以太陽少陰為表裡也傷其陰則從陽明陽化之證多以太陽陽明遞相傳也此篇所以又有四逆承氣之治也凡風傷衛之虛邪已列上篇茲以寒傷營之實邪疏為中篇俾讀者會大意於胸中斯臨證處方自不致誤矣太陽中篇集解魏荔彤曰傷寒與中風其脈俱浮而彼為浮緩此為浮緊陽邪舒散故緩陰邪勁急故緊同為在表之浮而一緩一緊風寒迥異矣程應旄曰頭痛發熱太陽病皆然而身痛腰痛骨節痠痛是寒傷營室若風傷衛則無是也惡風惡寒太陽病皆然而無汗而喘是陽被壅遏若風傷衛則無是也得其所同因以別其所異焉沈明宗曰太陽之邪從皮毛而入郁遏肺氣以故作喘且寒主收斂寒邪傷榮則腠理閉密故用麻黃湯發之太陽傷寒總訣脈浮緊是傷寒無汗嘔喘惡風寒頭疼身痛已未熱麻黃湯服莫疑難尺脈遲營弱看先與建中待脈還麻黃漏汗四肢急救逆桂枝附子添前章言太陽經寒邪傷榮初起脈證治法也傷寒病名也見前後集解其脈浮緊其證無汗嘔逆而喘惡風惡寒頭疼項強身體盡痛或已發熱或未發熱皆為實邪治宜發汗主以麻黃湯或服升陽發表湯俱見醫方發表門次章言尺中脈遲誤服麻黃湯致變救逆也正傷寒六脈皆浮緊故用麻黃湯發汗若尺中脈遲與關不合者是營氣不足不可發汗當先和之俟尺脈不遲再審證施治宜服小建中湯見發表門若尺遲營弱誤服麻黃湯致變漏汗惡風四肢拘急小便少而難出當用桂枝加附子湯以救逆見發表門太陽傷寒集解金鑑曰營表陰也寒陰邪也寒邪傷人則榮受之從其類也已發熱者寒邪束於皮毛元府閉密陽氣鬱而為熱也未發熱者寒邪初入尚未鬱而為熱頃之即發熱也但為寒所傷則不論已熱未熱而必惡風寒也寒入其經故通身痛胃中之氣被寒外束不能發越故作嘔喘寒性勁急故其脈陰陽俱緊也此條為傷寒病之提綱後凡稱太陽傷寒者皆指此脈證而言也又曰太陽經脈起於目內訾上額交巔入絡腦還出別下項循肩膊內夾脊抵腰中至足小指出其端寒邪客於其經則榮血凝澀所傷之處無不痛也榮病者惡寒衛病者惡風今榮病而言惡風者蓋以風動則寒生惡則皆惡未有惡風而不惡寒惡寒而不惡風者所以仲景於中風傷寒證中每互言之以是知中風傷寒不在惡寒惡風上辨而在微甚中別之也無汗者傷寒實邪腠理閉密雖發熱而汗不出不似中風虛邪發熱而汗自出也陽氣被寒邪所遏故逆而為喘主以麻黃湯者解表發汗逐邪安正也喻嘉言曰仲景慮惡寒身痛嘔逆又未發熱恐後人誤認為陰經之證故早於篇首揭明太陽病或已發熱或未發熱必惡寒體痛嘔逆脈陰陽俱緊者名曰傷寒以辨之程應旄曰傷寒陰陽俱緊之脈大不同於中風陽浮而陰弱之緩脈矣其證與脈兼得其實然後乃得正其名曰此太陽傷寒之病而非中風之脈證所能混也吳綬曰凡傷寒寒邪在表閉其腠理身痛拘急惡寒無汗脈浮緊者須用麻黃辛苦之藥開發腠理逐寒邪使汗出而解惟夏月炎暑之時雖有是證宜加涼藥如防風通聖散三黃石膏湯是也致變救逆集解金鑑曰傷寒脈證當用麻黃湯發汗若尺中脈遲是營氣不足須用小建中湯和之倘誤服麻黃湯致漏汗惡風四肢拘急小便少而難出者用桂枝加附子湯救逆可也王肯堂曰麻黃湯為元氣不虛者設也如夾時氣者宜十神散見發門夾寒者宜五積散夾熱者宜雙解通聖散俱見表裡門夾暑濕者宜藿香正氣散見和解門夾食者宜人參養胃湯見消導門夾痰者宜芎蘇飲見表裡門隨證救逆可也太陽下篇辨太陽風寒兩傷脈證治法太陽中風者風邪傷衛也傷寒者寒邪傷榮也上篇中篇已詳言之茲以風寒兩傷榮衛兼病者疏為下篇蓋以風寒二氣多相因而少相離有寒時不皆無風有風時不皆無寒風寒併發邪中於人則榮衛兼病惟其證均無汗皆謂之實邪故立大青龍湯兩解之法發其寒邪外閉風邪內郁不汗出而煩躁之汗也然必審其人脈不微弱無少陰證者乃可與之若脈證不實誤服此湯則大汗淋瀝厥逆筋惕肉瞤必致亡陽之變故又立真武一湯以救青龍之誤也夫表寒裡熱者大青龍固所宜服若表裡俱熱則又非大青龍所能勝任爰立白虎湯以輔青龍之不逮至於寒熱輕微者則更立桂枝二越婢一湯麻黃桂枝各半湯桂枝二麻黃一湯皆兩解榮衛之法也合上篇中篇而熟讀之則三法瞭然以之施治庶不紊也太陽下篇集解成無己曰風並於衛者為榮弱衛強寒並於榮者為榮強衛弱今風寒兩傷故為榮衛俱實主以大青龍湯兩解之喻嘉言曰大青龍湯為太陽無汗而設與麻黃湯證何異因有煩躁一證兼見則非此法不能解也程應旄曰此湯非為煩躁而設為不汗出之煩躁而設也若脈浮弱汗出惡風者雖有煩躁證乃少陰亡陽之象全非汗不出而鬱熱者比也吳綬曰大青龍湯治傷寒發熱惡寒不得汗出煩躁不安脈浮緊或浮數者用此湯發汗則愈乃仲景之妙法也譬若亢熱已極一雨而涼其理可見也若不曉此理見其躁熱妄投寒涼之藥其害深矣如脈微弱汗出惡風者忌用此湯誤服之致變逆證所以又立真武湯以救逆也風寒兩傷總訣中風病脈浮緊無汗乾嘔遍身疼寒熱更兼煩躁證表實裡熱主大青傷寒病脈浮緩無汗身重乍時輕煩躁而無少陰證大青龍湯發之靈脈微弱汗自出誤服青龍厥冷生心悸頭昏身瞤動急投真武湯救蘇首章言以中風之病而得傷寒之脈與證更兼表實無汗內熱之煩躁也凡中風之證必自汗發熱惡寒頭疼而遍身不痛其脈浮緩今脈浮緊是寒傷榮之脈也今無汗而遍身痛發熱惡寒是寒傷榮之證也更兼煩躁是陽熱蒸於內也故以大青龍湯主之見醫方發表門二章言以傷寒之病而得中風之脈與證更兼太陽無汗內熱之煩躁也凡傷寒之證必強痛無汗發熱惡寒而身痛不減其脈浮緊今脈浮緩是風傷衛之脈也今身重不痛乍有輕時是風傷衛之證也內熱煩躁而無少陰症者謂無身重但欲寐之證也故亦以大青龍湯發之三章言前二章脈證倘未全具若誤服大青龍湯致變逆證法當救逆也蓋大青龍證脈必浮緊或浮緩證必無汗發熱惡寒或身痛身重煩躁內熱今脈微弱反汗出是大青龍證尚未悉具誤服此湯致變厥冷筋惕心悸頭眩熱仍不退身肉瞤動振振欲擗地皆誤與大青龍湯發汗之變證當用真武湯以救逆見醫方祛寒門方解曰方名大青龍者取龍與雲雨之義也治風不外乎桂枝湯治寒不外乎麻黃湯合桂枝麻黃二湯以成劑故為風寒兩傷者之主方二證俱無汗故減芍藥不欲其酸收二證俱煩躁故加石膏以解其熱也設無煩躁又當從事於麻黃桂枝各半湯矣許叔微曰仲景治傷寒一則桂枝湯二則麻黃湯三則青龍湯蓋桂枝治風麻黃治寒青龍兼治風寒不拘時候施於脈證相對者無不獲效今人未曉前人處方用藥之意多不敢用無足怪也風寒兩傷集解金鑑曰中風脈當浮緩今脈浮緊是中風之病而兼傷寒之脈也中風當身不痛汗自出今無汗而遍身痛是中風之病而兼傷寒之證也不汗出而煩躁者太陽鬱熱之所致也風陽邪也寒陰邪也陰寒鬱於外則無汗陽熱蒸於內則煩躁此風寒兩傷榮衛兼病故以大青龍湯主之傷寒脈當浮緊今脈浮緩是傷寒之病而兼中風之脈也傷寒當身痛今身不痛是傷寒之病而兼中風之證也身輕邪在陽也身重邪在陰也乍有輕時謂身重而有時輕也若但欲寐身重無輕時是少陰證也今無少陰欲寐身重無輕時之證乃榮衛兼病之太陽證也脈雖浮緩證則無汗此屬實邪故亦以大青龍湯發之仲景先以脈微汗出示禁次以無少陰證發明詳審慎重之至也此為太陽風寒兩傷榮衛兼病之提綱凡太陽中風傷寒涉於榮衛兼病者皆指此二條而言也至變救逆集解傷寒論首言誤汗次言過汗者互文以明其義也蓋二症皆屬亡陽故均主以真武湯扶陽抑陰以救其逆也大汗出熱仍不解者陽亡於外也心下悸築築然動陽虛不能內守也頭暈眼黑陽微氣不能升也蠕蠕然身肉瞤動陽虛液涸失養於經也振振欲擗地者謂聳動不已不能興起欲墜於地陽虛氣力不能支也此皆誤服大青龍湯發汗致變也張璐曰此為誤服大青龍湯因而致變者立法也汗出雖多而熱不退則邪未盡而正已大傷況裡虛為悸上虛為眩經虛為瞤身振振搖無往而非亡陽之象所以用真武湯把關坐鎮之法也傷寒傳經欲愈脈證總訣一太陽二陽明三日少陽受病侵初起欲吐脈數急定知邪盛欲傳經二三日脈安寧胃經膽經無病形此是邪衰欲自愈身和無苦不須驚首章言傷寒一日太陽受病二日陽明受病三日少陽受病此言傳經次第也若初病乾嘔不止或頗欲吐兼煩躁脈數急者此外邪不解內熱已成欲傳經也宜以大青龍湯發表解熱以殺其勢或現表裡熱證者用雙解通聖散兩解之見醫方表門用藥得當其邪可退不至傳經若已傳經當照後法循序施治次章言太陽傷寒至二三日內並無陽明證之不惡寒反惡熱身熱心煩口渴不眠等證亦無少陽證之寒熱往來脅痛喜嘔口苦耳聾等證且脈靜身無所苦者此為太陽邪衰熱微不傳他經欲自愈也傷寒傳經集解總注曰傷寒一二日太陽二三日陽明三四日少陽四五日太陰五六日少陰六七日厥陰此言其常不必拘執且傳經中變症不一有專經不傳者有越經傳者有傳一二經而止者有發於陽即入少陰者有直中三陰者有足經冤熱而傳手經者有誤藥而傳變者大抵熱邪乘經之虛即傳經實不受邪則不傳陽邪勝則傳陰邪勝多不傳故經謂脈靜為不傳脈數急為欲傳也又曰足經自足上行胸腹頭背主一身之大綱故寒邪入之即見於其經若手經第行於胸不能主一身之大綱然邪入足經勢必牽連手經故感風寒者頭項痛肩肘節亦牽痛也聖人言足不言手足可該手手亦可該足非不傳手經也夫五藏六府十二經氣相輸絡相通豈有傳足而不傳手者哉亦豈有傷足而不傷手者哉虞天民謂發熱先手惡寒先足義可互通矣陽明全篇辨陽明傷寒初終脈證治法陽明主裡內候胃中外候肌肉故有病經病府之分如論中身熱煩渴目痛鼻乾不得眠不惡寒反惡熱者此陽明經病也潮熱譫語手足腋下濈然汗出腹滿脹痛大便硬者此陽明府病也其候各有三經病則有邪已傳陽明而太陽之表未罷兼見頭痛惡寒無汗之太陽證者有太陽之邪罷悉傳陽明但見壯熱有汗心煩不眠口渴引飲之陽明證者有陽明之邪未已復轉少陽兼見胸脅痛寒熱往來口苦而嘔目眩耳聾之少陽證者以上經病三證主以葛根湯或桂枝加葛根湯發之或用白虎湯清之或用柴胡白虎湯和之隨證施治可也府病則有太陽陽明謂太陽病或發汗或吐或下或利小便亡其津液胃中乾燥太陽之邪兼胃燥而轉屬陽明致小便反數大便硬者所謂脾約是也有正陽陽明謂陽氣素盛或有宿食太陽之邪一傳陽明遂入胃府致大便不通者所謂胃家實是也有少陽陽明謂病已到少陽法當和解而誤發汗利小便亡其津液胃中燥熱復轉屬陽明致大便結燥者所謂大便難者是也以上府病三證雖均為可下然不無輕重之分故或以三承氣湯下之或麻仁丸通之或蜜煎膽汁導之量其病而治之可也此陽明病之大略也茲以在經在府詳疏於篇俾讀者易為分別則臨證施治自不紊矣陽明全篇集解總注曰陽明之病本自太陽初得病時發其汗汗先出而不透徹乃為汗不如法故未盡之邪因而轉屬陽明也邪在經則為外證邪入府則為胃實便難脾約三證矣論中言三日陽明脈大者謂不兼太陽陽明之浮大亦不兼少陽陽明之弦大而獨見正陽陽明之大脈也蓋由去表傳裡邪熱入胃而成內實之府病也陽明傷寒表病總訣脈浮長頭額疼太陽未罷傳陽明無汗惡寒面赤熱鼻乾目痛臥不寧太陽表郁陽明或兼項強背牽疼或下利兮或嘔逆葛根湯治莫逡巡首章言太陽未罷初傳陽明太陽表邪怫鬱陽明肌熱為陽明表病也其脈浮長陽明之表脈也緣緣面赤連額疼發熱惡寒身體無汗目痛鼻乾臥不得寧皆屬陽明經表證兼有太陽餘邪也主治葛根湯以解兩經之邪或服柴葛解肌湯俱見發表門次章申言太陽陽明相合為病如太陽則有強痛發熱惡寒無汗之表證陽明則有肌熱惡熱心煩不眠之郁證二陽合病證當下利亦用葛根湯兩解之若不下利而但加嘔者內加製半夏陽明表病集解方有執曰陽明經也胃府也太陽之邪初傳陽明經則為陽明外證表病程應旄曰陽明惡寒終是帶表至於府病則惡熱矣表之罷否於此驗之鄭重光曰此辨陽明傷寒之外證不惡熱而惡寒起自傷寒也論云惡寒將自罷邪過表也即自汗出而惡熱邪鬱於肌肉腠理開汗外泄也方解曰葛根為陽明主藥凡太陽兼陽明證者則佐入太陽藥中凡少陽兼陽明證者則佐入少陽藥中無不可也李東垣定為陽明經藥張潔古云未入陽明者不可便服豈二人未讀仲景書乎要之葛根桂枝俱是解肌和里之藥故有汗無汗下利不下俱可用之此與麻黃之專於發表者不同也陽明傷寒熱病總訣脈長洪屬陽明不惡寒兮反惡熱身熱汗出煩躁渴白虎湯醫真妙訣脈洪弦兼少陽耳聾口苦痛胸脅往來寒熱眩而嘔白虎小柴湯合啜首章言太陽已罷邪傳陽明經中尚未入府其熱漸深表裡俱熱而為經中熱病也其脈長洪陽明熱脈也煩躁渴飲身熱汗出不惡寒反惡熱皆陽明經熱證也主以白虎湯解在經表裡之熱見醫方瀉火門次章言邪在陽明熱尚未罷又傳少陽亦陽明經中熱病當兩經兼治也脈洪兼弦耳聾口苦胸痛脅痛往來寒熱目眩而嘔是陽明兼少陽經脈證當解兩經之邪主以柴胡白虎湯見瀉火門陽明熱病集解總注曰陽明傷寒有經熱有府熱如潮熱自汗不大便者府熱也身熱汗出不惡寒反惡熱者經熱也今汗自出似從中風傳來故與中風外證同也而身熱不惡寒反惡熱則知為陽明經熱故不與中風外證同也然陽明之熱發於肌肉必蒸蒸而熱又不似太陽之陣陣發熱也柯琴曰陽明邪從熱化故不惡寒而惡熱熱蒸外越故身熱汗出熱爍胃中故渴欲飲水邪盛而實故脈洪然猶在經或兼浮也蓋陽明屬胃外主肌肉雖內外大熱而未實終非苦寒之味所宜也故主以白虎湯此湯入胃輸脾歸肺水精四布大煩大渴可除矣白虎為西方金神取以名湯秋金得令而炎暑自解方中有更加人參者亦補中益氣而生津也用以協和甘草粳米之補承製石膏知母之寒瀉火而土不傷乃操萬全之術也陽明傷寒府病總訣脈實大胃府熱胃實便難脾約決承氣三湯麻仁丸議下不無輕重別硬未定脈微澀熱遠蜜煎導其熱浮緩惡寒先解表桂枝湯加葛根啜首章言熱邪已入胃府其脈實大其證胃實正陽陽明也大便難者少陽陽明也脾約糞出如彈丸者太陽陽明也解見全篇蓋此三證皆可議下然必蒸蒸潮熱濈濈汗出或滿或痛始可議其微甚分別下之如三承氣湯麻仁丸六一順氣湯隨證選用俱見攻裡門次章言雖有前證腹不滿大便溏硬未定脈微澀者慎不可下如舌滑尿白裡熱尚微雖小便數大便硬其熱遠在廣腸亦不可下用蜜煎豬膽二導法通利之見攻裡門此陽明慎下之法也又言胃實自汗潮熱原應下之若兼惡寒脈浮緩之表則當用桂枝加葛根湯先解其表表解之後乃可議下方見發表門陽明府病集解總注曰病人得汗後煩熱解太陽之邪將盡未盡其人復如瘧狀日晡時發熱則邪入陽明審矣然雖已入陽明尚恐未離太陽故必詳辨其脈脈實大者可下若脈浮虛者仍是陽明兼太陽宜先汗解而後議下也方解曰大承氣湯正陽陽明藥也治脈沉實三焦大熱痞滿燥實堅五證全見者宜之小承氣湯少陽陽明藥也治邪在上焦則滿在中焦則脹胃實則潮熱邪乘心則狂妄胃熱干肺則喘急因痞滿燥實堅證未全具故除芒硝欲其毋犯下焦真陰也調胃承氣湯太陽陽明藥也其病在上不宜竣攻故用緩劑以調和承順之非若大小承氣專於攻下也麻仁丸乃潤燥之通劑又不待邪入胃府而後用也至若津液內竭腸胃乾燥大便因硬此非結熱故不可攻宜以潤藥外治而導引之故用豬膽蜜煎二導法少陽全篇辨少陽傷寒初終脈證治法少陽主春其氣半出地外半在地中人身之氣亦如之故主半表半裡也半表者謂在外之太陽也半里者謂在內之太陰也邪入其間陰陽相移寒熱交作邪正相持進退互拒此際汗吐下三法俱在所禁故立小柴胡湯和解法加減施治然小柴胡加減法中又有口不渴身有微熱者加桂枝以取汗及下後胸脅滿微結小便不利渴而不嘔頭汗出往來寒熱者用柴胡桂枝幹薑湯汗之又有柴胡證具而反下之心下滿而硬痛者此為結胸證大陷胸湯主之及柴胡證仍在者先與小柴胡湯如嘔不止心下急鬱郁微煩者為未解也方用大柴胡湯下之更有本柴胡證醫以丸藥下之至微利胸脅滿而嘔日晡潮熱者用小柴胡加芒硝下之等法是仲景治少陽亦有汗下之法在臨證詳察因病施治不可執一也少陽全篇集解金鑑曰凡中風與傷寒五六日內更見往來寒熱胸脅苦滿默默不欲食心煩喜嘔者此是邪傳少陽也蓋少陽之邪進可傳太陰之裡退可還太陽之表中處半表半裡之間外並於表則作寒內並於里則發熱表裡無常故往來寒熱不定也少陽之脈下胸循脅邪湊其經故胸脅苦滿也少陽邪近乎陰故默默也少陽木邪病則妨土故不欲飲食也邪在胸脅火無從泄上逼於心故心煩也邪欲入里胃氣外拒故嘔嘔則木氣舒故喜之也此皆小柴胡應有之證也其餘諸證時或有之總宜小柴胡湯為主各隨現證加減治之然論中既分中風傷寒之傳而不分其治者何也蓋以太陽有榮衛之分故風寒之辨宜嚴及傳陽明少陽則無榮衛之分且其邪皆化為熱故同乎治法也少陽傷寒證治總訣脈來弦少陽病口苦耳聾目眩運胸脅苦滿不欲食心煩喜嘔柴胡證或咳渴或腹痛脅或硬疼心悸動小柴胡湯是主方加減更須隨證用首章言傷寒傳入少陽所見主證也口苦咽乾目眩耳聾胸脅苦滿往來寒熱默默不欲食心煩喜嘔而脈弦主以小柴胡湯見和解門次章言少陽傷寒兼見或有之證也既有如前之脈證而又或咳或渴或腹中疼或脅硬痛或悸不嘔或尿不利及舌胎滑白皆少陽或有之證也均宜小柴胡湯隨證加減治之俱見醫方和解門少陽傷寒集解成無己曰邪在表裡之間謂之半表半裡論中兼言傷寒中風者是或傷寒或中風非謂傷寒又中風中風復傷寒也五六日邪自表傳裡之時邪在表則寒在裡則熱今在半表半裡之間未有定處故往來寒熱也邪在表心腹不痛邪在裡則心腹脹痛今言胸脅苦滿亦是在表裡之間也邪在表呻吟不安邪在裡則內煩也經雲陽入之陰則靜默默由邪方自表之裡在表裡之間也邪在表尚能食邪在裡不能食不欲食者未至於必不能食故亦為在表裡之間也邪在表則不煩不嘔邪在裡則煩滿而嘔今煩而喜嘔是邪在表方傳裡也邪初入里未有定處所傳不一故有或見諸證也金鑑曰邪傳太陽陽明曰汗曰吐曰下邪傳少陽惟宜和解汗吐下三法皆在所禁以其邪在半表半裡而角於軀殼之內界在半表者是客邪為病也在半表半裡者是主氣受病也邪正在兩界之間各無進退而相持故立和解之法既以柴胡解少陽在經之表寒黃芩解少陽在府之裡熱猶恐在裡之太陰正氣一虛在經之少陽邪氣乘之故以人參薑棗和中而預壯裡氣使里不受邪而和還於表以作解也世俗不審邪之所據果在半表半裡之間與所以應否和解之宜及陰陽疑似之辨總以小柴胡湯為套劑醫家幸其自處無過病者喜其藥味平和殊不知因循致誤亦復不淺故凡治病者當識其未然圖機於早也然少陽證又有可吐可汗可下三條上言其禁恐失宜也此言其可貴變通也分別於下一可吐如邪傳少陽但胸滿煩熱者太陽少陽輕邪也宜梔子豉湯湧吐之若胸滿痞硬氣上衝喉不得息者太陽少陽重邪也宜瓜蒂散吐之俱見醫方湧吐門一可汗如邪傳少陽惡寒發熱四肢煩疼心下支結而微嘔者太陽少陽表證也宜柴胡桂枝湯微汗兩解之見醫方和解門一可下如邪傳少陽鬱郁微煩作嘔不止心下痛硬少陽陽明表裡證也宜大柴胡湯緩攻兩解之誤下不致變逆見表裡門至已下之後小柴胡證仍在者復與小柴胡湯和解之若邪欲解則必蒸蒸而振汗出而解以下後虛故也合病並病全篇辨合病並病脈證治法傷寒有六經之證有六經之脈井然不雜則可直指為某經之病若兩經三經陰陽混淆不可以一經名者或一經未罷又傳一經二經三經同病而不歸併一經者則名曰合病或二經三經同病其後歸併一經自病者則名曰並病論中所著合病並病雖單舉三陽經而未及陰經然陽經既有合病並病則陰經亦必有之可類推矣如太陽病脈反沉少陰病反發熱是少陰太陽合病也陽明病脈遲太陰病大實痛是太陰陽明合病也少陽病脈細而厥厥陰病嘔而發熱是厥陰少陽合病也以上三者雖無合病之名而確有合病之實焉且三陽皆有發熱證三陰皆有下利證如發熱而下利是陰陽合病也陰陽合病若陽盛者屬陽經則下利為實熱即論中所謂太陽陽明陽明少陽太陽少陽合病者是也陰盛者屬陰經則下為虛寒即論中所謂少陰下利反發熱不死少陰下利清穀裡寒外熱不惡寒而面赤者是也蓋陽與陽合不合於陰為三陽合病則不下利而自汗出乃白虎湯證也陰與陰合不合於陽為三陰合病則不發熱而吐利厥逆乃四逆湯證也誠以人之藏府互根陰陽相合三陽既有合併之病則三陰亦有合併之病不待言矣辨合病合病者一經未罷又傳一經二經三經同病而不歸併一經也辨並病並病者一經未罷又傳一經初則同病而後歸併一經自病也辨同病同病者謂陽經陰經表裡同病也太陽陽明合病總訣太陽病合陽明無汗心煩肌熱蒸不下利兮加喘滿麻黃髮汗自安寧不滿喘下利頻葛根湯服效通神若不下利而多嘔半夏加添嘔即平首章言太陽陽明相合為病也如太陽則有惡寒無汗頭痛發熱之證陽明則有心煩不眠肌熱惡熱之證二陽合病證當下利若不下利更加胸滿而喘者宜用麻黃湯發汗見發表門次章一言太陽陽明合病有如前之證而不胸滿喘急且自下利者則是合病本證也當從正治主以葛根湯見發表門又言有如前之合病應下利而反不下利但加嘔者亦用葛根湯內加薑製半夏以平嘔也太陽陽明並病總訣邪怫鬱界兩經表輕柴葛解肌靈表寒深入將為熱兩解還須服大青太陽罷並陽明潮熱便難譫語生手足汗蒸知胃實大承攻下莫逡巡首章言太陽陽明並病不與合病同例也初因邪在太陽發汗未徹又傳陽明經此時邪猶怫鬱於太陽陽明之表尚未併入陽明之裡脈微洪無汗肌熱惡寒頭目眼眶痛鼻乾不眠者服柴葛解肌湯兩解之又言前證若加面赤身痛脈浮緊而煩躁者表邪深入將化為熱病也治宜大青龍湯兩解之方見發表門次章言太陽表證已罷邪歸併陽明一經而成並病也邪入胃府從陽化熱胃實則不大便而腹滿痛潮熱譫語手足汗出喘冒不能臥身不惡寒脈滑實沉實者用大承氣湯攻陽明之實熱見攻裡門太陽少陽合病總訣太陽證合少陽時常下利黃芩湯若還下利而加嘔半夏二錢添入良不嘔利要更方只服柴胡桂枝湯六七日間有合病此湯兩解自然康首章言太陽少陽相合為病也如太陽則有頭痛發熱惡寒無汗之證少陽則有寒熱往來口苦咽乾目眩耳聾胸脅滿痛之證二經合病當自下利宜服黃芩湯見和解門若有如前之證而不下利但加嘔者前湯內加製半夏二錢以止嘔次章言雖有如前太陽少陽合病之證然審其中卻不嘔逆並不下利此非真合病乃太陽少陽交代未清也主以柴胡桂枝湯和解兩經之邪方見和解門又言六七日間有合病用此湯兩解自然康也太陽少陽並病總訣太陽經少陽經二經並病證難分頭疼牽強目昏眩心下痞硬似結胸邪未定三法停尚未歸併法宜針大椎肺俞肝俞穴刺之瀉熱自然輕二章統言太陽少陽並病禁吐下三法也如頭項強痛目眩昏冒心下痞硬狀似結胸是二經之邪尚未歸併一經也若誤發汗則生譫語若誤吐下則心煩驚悸宜刺大椎肺俞肝俞三處穴道以瀉其熱大椎穴在後項脊骨第一節上骨陷中肺俞穴在脊骨第三節下兩邊第二行骨陷中肝俞穴在脊骨第九節下兩旁第二行骨陷中陽明少陽合病總訣陽明證合少陽脈來滑數胃邪強下利黏汙是宿食攻其積滯大承湯木脈弦土脈長土衰木盛不為祥弦數下利嘔酸苦表裡交治大柴湯首章言陽明少陽相合為病也蓋兩經之證同見下利方為合病弦為少陽木脈木勝則土負負則死也長為陽明土脈土盛則木不能災則為順也若陽明少陽合病下利黏穢者脈必滑數是宿食也宜攻積滯主以大承氣湯見攻裡門次章言陽明少陽合病脈弦甚固不祥若脈弦數而不滑數但下利而不黏穢更加嘔吐酸苦者此表裡俱實也宜用大柴胡湯解表清裡方見表裡門三陽合病總訣三陽合病叢生未經汗下解肌靈口乾腹痛多譫妄面垢貪眠盜汗蒸三陽熱灼枯津脈浮禁汗法宜清縱然脈大君休下主治白虎加人參二章統言太陽陽明少陽三陽合病禁汗下只宜清解也有因初患傷寒未曾發汗或未吐下致寒邪鬱於中三陽諸證叢起者宜服柴葛解肌湯清解表裡見發表門如已經汗吐下而餘邪傳遍三陽寒鬱為熱致口中乾燥腹滿脹痛譫語妄言面生油垢欲眠遺尿合目而出熱汗者此皆三陽熱盛津液枯竭之證設若脈浮禁不可汗即令脈大亦不可下主以白虎湯內加人參益氣生津以清其熱見瀉火門以上皆三陽合病並病正治之法也由此觸類旁通於以施治壞病過經不解病而無難矣茲不備載分見各篇救逆門三陰受病傳經欲愈脈證傷寒論曰陽去入陰謂陽邪去表入里傳於三陰經也凡傷寒三日三陽傳盡三陰當受邪其人身熱雖微而煩躁者是邪去陽入陰而不解也若其人反能食而不嘔脈靜小小便清是邪未入於陰為不傳欲自愈也方有執曰去者往也言表邪往而入於裡所以外無他熱而內則煩躁也蓋身無大熱表熱微也心煩身躁裡熱盛也成無己曰表邪傳裡里不和則不能食而嘔今反能食而不嘔脈靜小小便清是邪不傳陰但在陽止也汪琥曰邪在少陽原嘔不能食今反能食而不嘔可徵裡氣之和而少陽之邪自解故曰不傳欲自愈也三陰傷寒篇太陰全篇辨太陰傷寒初終脈證治法金鑑曰六氣之邪感人雖同人受之而生病各異者何也蓋以人之形有厚薄氣有盛衰藏有寒熱所受之邪每從其人之藏氣而化故生病各異也是以或從虛化或從實化或從寒化或從熱化譬諸水火水盛則火滅火盛則水耗物盛從化理固然也誠知乎此又何疑乎陽邪傳陰變寒化熱而遂以為奇耶自後漢迄今千載以來皆謂三陰寒邪不傳且以傷寒傳經陰邪謂之直中抑知直中乃中寒之證非傳經之邪耶是皆未熟讀仲景之書致有此誤耳如論中下利腹脹滿身體疼痛者先溫其里乃攻其表溫里宜四逆等湯攻表宜桂枝湯此三陽之邪傳入太陰邪從陰化之寒證也如少陰病下利白通湯主之此太陰寒邪傳少陰之寒證也如下利清穀裡寒外熱汗出而厥者通脈四逆湯主之此少陰寒邪傳厥陰之寒證也皆歷歷可據豈得謂傷寒陰不相傳無陽從陰化之理乎夫太陰濕土純陰之藏也故病一入太陰則邪從陰化者多從陽化者少從陰化者如論中腹滿吐食自利不渴手足自溫腹時自痛宜服理中四逆輩者是也從陽化者如論中發汗後不解腹滿痛者急下之宜大承氣湯又腹滿大實痛者宜桂枝加大黃湯主之者是也蓋脾與胃同處腹中故腹滿腹痛兩皆有之然腹滿為太陰土病心下滿為陽明主病其陽明亦有腹滿者以陽明腹滿與熱同化故必有潮熱自汗不大便之證而不似太陰與濕同化有發黃暴煩下利穢腐之證也誠能更於腹之時痛大實痛腹滿痛數條詳審其虛實寒熱隨證斟酌溫之下之則了無遺義矣此篇總括太陰脈證治法之要訣也太陰陰邪總訣三日滿三陽盡邪傳太陰變寒證從陰化寒脈沉遲吐食腹滿時痛甚理中湯可頻進手足自溫亦不論下利不渴與諸般此湯加減何容紊首章言傷寒初傳太陰邪從陰化之寒證也脈沉遲太陰陰邪脈也吐食腹滿腹中有時痛有時不痛太陰裡寒證也手足自溫邪入陰也主以理中湯見醫方祛寒門次章言有如前之脈證正用理中湯治之若兼他證又當隨證加減也如自利不渴藏無熱也若利少吐多當去白朮加生薑惟下利多雖兼吐證仍用白朮渴欲飲水更倍白朮腹滿去白朮加附子臍下動氣欲作奔豚去白朮加肉桂中寒倍乾薑腹痛甚倍人參心下悸加茯苓太陰陰邪集解總注曰太陰脾經也其脈布胃中絡於嗌寒邪傳於太陰故腹滿時自痛寒邪循脈犯胃故吐食不下此太陰裡虛邪從寒化之證也當以理中四逆輩溫之若腹滿嗌乾不大便大實痛始為太陰裡實邪從熱化之證當以桂枝加大黃湯下之矣若以太陰虛寒之滿痛而誤認為太陰實熱之滿痛而下之則寒虛相搏必變為藏結痞硬及自利不止矣此條為太陰病之提綱後凡稱太陰病者皆指此證而言也吳人駒曰太陰自利有時而腹自痛非若蓄積而常痛者若以時痛為實從而下之其滿益甚必令胸下結硬而自利不止曰胸下者陰邪結於胸下之陰分異於陽邪結胸之在胸間且按之而痛也曰結硬者無陽以化氣則為堅陰異於痞之濡而軟也彼皆陽從上陷而阻留此則陰從下逆而不歸寒熱大別也程應旄曰陽邪亦有腹滿得吐則滿去而食可下者今腹滿而吐食不下則滿為寒脹吐為寒格也陽邪亦有下利腹痛得利則痛隨減者今下利而腹時自痛則利為寒利痛為寒痛也論曰傷寒四五日腹中痛若轉氣下趨少腹者此欲自利也謂邪傳太陰之時腹痛轉氣下趨少腹者因裡虛不能守而寒邪上迫欲自利之候確是太陰寒痛也若不轉氣下趨痛自下攻上則屬陽明實痛矣此仲景示人不可以寒痛為實而妄議下也總注曰三陰同屬藏寒少陰厥陰有渴證太陰獨無渴證者以其寒在中焦總與龍雷之火無涉少陰中有龍火底寒甚則龍升故自利而渴厥陰中有雷火故有消渴太陽一照雷雨收聲故發熱則利見厥而複利也又曰少陰屬腎水熱入而耗其水故自利而渴太陰屬脾土寒入而從其濕則不渴而自利故太陰自利法當溫也太陰陽邪總訣太陰邪從陽化脈數咽乾腹滿大實痛桂枝加大黃若成胃實大承下脈浮弱休議下腹中時痛或時罷桂枝湯加芍藥醫邪陷太陰能自化首章言太陰邪從陽化之熱證也有因太陽病誤下之致邪陷太陰脈數咽乾太陰熱也腹大滿痛痛無止時太陰有餘證也宜以桂枝加大黃湯升舉陽邪而瀉內實見醫方發表門若成陽明胃實痞滿燥實堅全見者當用大承氣湯先攻裡後解表見攻裡門次章申言太陰邪從陽化亦有虛實之分也如脈浮弱胃氣虛也腹不大滿時痛時止不足之證也但用桂枝加芍藥湯和之見發表門太陰陽邪集解總注曰本太陽中風病醫不以桂枝湯發之而反下之因而邪陷入里如無他證惟腹滿時痛者此屬太陰裡虛痛也故宜桂枝加芍藥湯以外解太陽之表而內調太陰之裡虛也若大滿實痛則屬太陰熱化胃實痛也故宜桂枝加大黃湯以外解太陽之表而內攻太陰之裡實也劉宏壁曰太陰無可下之法也設在經則各經已無可下之理在藏則太陰尤無受下之處桂枝加大黃湯安能無疑乎不知脾與胃相表裡也太陽誤下太陰受邪適胃有宿食則脾因胃之實而實亦即因太陽之邪而痛矣若既大滿大痛已成胃實又非此湯所能勝任故宜大承氣湯急攻其里而後和表也程應旄曰脈浮弱腹滿時痛者太陰之證見矣然太陽表邪內陷留滯於太陰非藏寒痛也仍用桂枝湯升發陽邪但倍加芍藥以調和之柯琴曰腹滿為太陰陽明俱有之證然位同而職異太陰主出太陰病則腐穢氣凝不利故滿而時痛陽明主納陽明病則腐穢燥結不行故大實而痛是知大實痛是陽明病而非太陰病矣仲景因表證未解陽邪已陷入太陰故倍芍藥以益脾調中而除腹滿之時痛此用陰和陽法也若表邪未解而陽邪陷入陽明則加大黃以潤胃通結而除其大實之痛此雙解表裡法也凡妄下必傷胃之氣液胃氣虛則陽邪襲陰故轉屬太陰胃液涸則兩陽相搏故轉屬陽明屬太陰則腹滿時痛而不實陰道虛也屬陽明則腹滿大實而痛陽道實也滿而時痛是下利之兆大實而痛是燥屎之徵故一則倍加芍藥小變建中之劑一則少加大黃微示調胃之方也太陰陽明同病總訣太陰寒陽明熱表裡同病須詳擇汗後腹滿時減復寒虛厚朴方可啜發汗後表不徹腹滿大痛無休歇實熱內壅便不通大承攻裡為先策首章言脾與胃表裡同病當分虛實寒熱也如發汗後表邪已解但見腹中時滿時不滿減復如常而無腹痛燥結之證者此是太陰寒邪寒虛之氣上逆作滿乃可溫之證服厚朴生薑半夏人參甘草湯以散滿溫中降逆方見和解門次章申言脾胃同病有屬實熱者如發汗後表邪不解從陽化熱則見腹滿大痛終日不減常常而滿或不大便此為轉屬陽明實熱內壅之滿乃可攻之證服大承氣湯見攻裡門下之而腹滿如故即減去一二分算不得減不妨再下之必當以減盡為度太陰陽明同病集解成無己曰吐後脹滿與下後脹滿皆為實者言邪氣乘虛入里而為實也今發汗後外邪已解腹時脹滿知非裡實由太陰不足脾氣不通故壅而為滿也與此湯和脾氣而降逆氣宜矣至後條發汗後表不解腹滿大痛者乃腹滿不減減不足言之實滿也當用大承氣湯下之總注曰太陰為病必腹滿而痛治之之法當以脈消息之若其人脈弱續自便利則其中不實設當行大黃芍藥者宜減之以胃氣弱難堪峻攻其便易動故也由此推之可知大便硬者不論在陰在陽凡脈弱皆不可輕下也或問大黃能傷胃氣故宜減芍藥能調脾陰何以亦宜減答曰脈弱則氣餒不充仲景以溫甘之藥能生氣芍藥之味酸寒雖不若大黃之峻要非氣弱者所宜多用故亦減之少陰全篇辨少陰傷寒初終脈證治法少陰腎經水火之藏邪傷其經隨人虛實或從水化以為寒或從火化以為熱水化為陰寒之邪是其本也火化為陽熱之邪是其標也陰邪之脈沉細而微陽邪之脈沉細而數至其見證亦各有別陰邪但欲寐身無熱陽邪雖欲寐則多心煩陰邪背惡寒口中和陽邪背惡寒則口中燥陰邪咽痛不腫陽邪咽痛則腫陰邪腹痛下利清穀陽邪腹痛下利清水或便膿血也陰邪外熱面色赤裡寒大便利小便白陽邪外寒手足厥裡熱大便秘小便赤此少陰標本寒熱之脈證也凡從本之治均宜溫寒回陽從標之治均宜攻熱救陰回陽救陰其機甚微總在臨證詳究辨別標本寒熱以急施其治庶克有濟稍緩則不及矣少陰陰邪總訣太陰罷傳少陰沉細而微脈可憑背惡寒兮但欲寐口和腹痛並咽疼利清穀骨節疼四肢厥冷是寒淫陽浮面赤尿清白四逆一湯主治靈此二章統言傷寒初傳少陰邪從陰化寒所見脈證治法也脈沉細而微少陰陰邪之脈也背惡寒而身無熱陽氣虛也但欲寐陰氣盛也口中和口不幹燥也腹中時痛咽痛不腫下利清穀寒盛於中也骨節疼痛四肢厥逆寒淫於外也面色赤屬陽浮尿清白屬裡寒宜溫中散寒主以四逆湯見醫方祛寒門原注曰少陰病但欲寐脈沉者若無發熱口燥之證則寒邪已入其藏不須遲疑急以四逆湯溫之消陰助陽可也少陰陰邪集解傷寒論曰少陰之為病脈微細但欲寐也張璐曰此言少陰之總脈總證也蓋少陰屬水主靜即使熱邪傳至其經在先之脈雖浮大此時亦必變為沉細在先之證雖煩熱不寧此時亦變為昏沉嗜臥但須辨出脈細沉數口中燥為熱證脈微細口中和為寒證以此明辨萬無差矣汪琥曰少陰病本脈微細但欲寐今輕取之微脈不見重取之細脈幾亡伏匿而至於沉此寒邪深入於裡殆將入藏溫之不容或緩也稍遲則惡寒身蜷吐利煩躁不得安臥手足逆冷脈不至死而死證至矣少陰陽邪總訣少陰邪從陽化口燥咽乾陽熱跨沉細而數脈有力瀉陽救陰大承下四五日不嘔下變生煩擾無休暇陽邪乘陰不得眠黃連阿膠湯可化首章言少陰邪從陽化之熱證也少陰病但欲寐前條從陰化寒則脈沉細無力今從陽化熱則脈沉細加數而有力矣前條口中和咽痛不腫今則口中燥而咽乾腫痛矣此因水不上升熱之甚也宜瀉陽救陰主以大承氣湯見攻裡門次章承上條言少陰但欲寐之證已病二三日或至四五日內忽然變生心煩不得眠而不嘔不下利者是陽邪乘陰陰不能靜也宜清陽益陰服黃連阿膠湯見和解門少陰陽邪集解總注曰二三日邪在少陰故脈沉細但欲寐至四五日邪已轉屬陽明故無嘔利厥逆諸證而心煩不得眠者是陽明之熱內擾少陰故不欲寐法當解熱滋陰也至若二三日內即口燥咽乾脈沉數有力者必其人胃火素盛腎水素虧當以大承氣湯瀉胃火以救腎水若遷延時日腎水告竭其陰必亡雖下之亦無及矣成無己曰與大承氣湯急下之以全腎何也經云三陰經受病已入於府者可下而已則是此條少陰病乃入府證也少陰邪熱已轉屬於府胃府實熱消灼腎水故口燥咽乾用大承氣以瀉府而實熱自除且少陰之藏本屬腎水胃府屬土瀉土所以救水也少陰太陽同病總訣少陰寒太陽表表裡同病君須曉反發熱兮脈只沉麻附細辛湯可了二三日熱不了卻無吐利裡寒擾熱浮於外緩溫之前湯去細加甘草首章言同病初起所見脈證治法也少陰病脈沉為寒之證當無熱今反發熱是兼有太陽之表也宜溫散用麻黃附子細辛湯次章言同病得之二三日熱仍不解亦無裡寒吐利之證是邪已衰但熱仍在外法當緩溫而和之用麻黃附子甘草湯俱見發表門前言少陰陰邪本病但欲寐脈沉細而微當不發熱今病初起而反發熱脈只沉而不微細者是少陰之裡寒兼有太陽之表熱也故用麻黃附子細辛湯溫中散寒固元陽以發汗則兩感之寒邪均得而解矣後詳上條少陰病得之二三日仍脈沉發熱不解亦無吐利裡寒之證者知邪已衰但熱仍在外尚當汗之但不可過故用麻黃附子甘草湯少陰太陽同病集解總注曰一起病便發熱是兼太陽證邪在表也脈沉少陰位北而居里也以其居里邪在表而發熱故曰反也以其邪在表不在裡故用麻黃髮之以其本陰而標寒故用附子溫之細辛辛溫通於少陰用之以佐主治者以其專經而為嚮導也次條詳上條而言少陰病得之二三日仍脈沉發熱而無裡寒吐利證者知邪已衰熱浮在外宜緩溫而和之故前湯去細辛加甘草於溫散之中寓有和意也程知曰三陰經表法與三陽經不同三陰必以溫經之藥為表而少陰尤為緊關故用散邪溫經之劑俾外邪之深入者可出而內陽亦不因之而外越矣厥陰全篇辨厥陰傷寒初終脈證治法厥陰者陰盡陽生之藏與少陽為表裡者也故其為病陰陽錯雜寒熱混淆邪至其經從化各異若其人素偏於熱則邪從陽化故消渴氣上撞心心中疼熱蛔厥口爛咽痛喉痹癰膿便血等陽證見矣若其人素偏於寒則邪從陰化故手足厥冷脈微欲絕膚冷藏厥下利除中等陰證見矣所以少陽不解傳變厥陰而病危厥陰病衰轉屬少陽為欲愈陰陽消長大伏危機茲以陰陽從化厥熱勝復之微旨詳發於篇中俾學者便於記誦臨證診治有要道焉厥陰分節註解傷寒論曰厥陰之為病消渴氣上撞心心中疼熱飢而不欲食食則吐蛔下之利不止此條總言厥陰陽邪化熱之大綱厥陰者為陰盡陽生之藏邪至其經從陰化寒從陽化熱故其為病陰陽錯雜寒熱混淆也消渴者飲水多而小便少乃厥陰熱化而耗水也厥陰之脈起足大指循股內入陰中環陰器抵少腹貫心膈其注肺熱邪循經上逆膈中故氣上撞心心中疼熱也飢而不欲食者非不食也因食則動蛔而吐故雖飢而不欲食食則吐蛔也夫消渴多飲飢不能食則胃中所有者但水與熱耳若更以厥陰熱氣挾蛔撞疼誤認為轉屬陽明之實痛而下之則胃愈虛必下利不止矣此條申解厥陰傳經熱邪為患歷舉其證以禁誤下也傷寒論曰脈微而厥至七八日膚冷其人躁無暫安時者此為藏厥非蛔厥也蛔厥者其人當吐蛔今病者靜而復時煩者此非藏寒蛔上入其膈故煩須臾復止得食而嘔又煩者蛔聞食臭出其人當自吐蛔蛔厥者烏梅丸主之又主久利此條總言厥陰陰邪化寒之大綱傷寒脈微而厥厥陰脈證也至七八日不回手足厥冷而更通身膚冷躁無暫安之時者此為厥陰陽虛陰盛之藏厥非陰陽錯雜之蛔厥也若蛔厥者其人當吐蛔今病者靜而復時煩不似藏厥之躁無暫安時知非藏厥之躁乃蛔上其膈之上故其煩須臾復止也得食而吐又煩者是蛔聞食臭而出故又煩也得食蛔動而嘔蛔因嘔吐而出故曰其人當自吐蛔也蛔厥主以烏梅丸又主久利者以此藥性味酸苦辛溫寒熱並用能解陰陽錯雜寒熱混淆之邪也藏厥者宜吳茱萸湯兼少陰者宜四逆通脈附子等湯臨證選用可也此條詳辨厥陰陰邪化寒以明藏厥蛔厥之不同而出其治也厥陰陰邪總訣邪化寒藏厥甚膚冷脈微躁不靜四逆吳萸附子湯縮陰轉筋皆同進藏厥輕脈細甚當歸四逆隨加並時煩嘔吐為蛔厥但服烏梅丸即定首章先言厥陰藏寒之重證分別治法也脈微細四肢厥冷者陽氣衰微也膚冷者通身肌膚冰冷也躁不靜者心煩身躁無有暫時安也縮陰轉筋者如男子外腎被寒收引縮入少腹婦人則兩乳縮小陰器束緊少腹牽痛要皆舌短胎滑不幹而見黑色故均服四逆湯吳茱萸湯附子湯聽其選用俱見祛寒門再有灸法附於後次章前三句言藏厥輕證又當分別施治也如脈微細欲絕手足厥寒而不通身膚冷亦不煩躁無安時則非陽虛陰盛之比故不用薑附之類主以當歸四逆湯和厥陰以散寒邪調榮衛以通陽氣方見祛寒門又當隨證加並如少腹滿按之痛而厥冷者其人內有久寒則加吳萸生薑以直走厥陰溫而散之也次章末兩句分別蛔厥證治也蛔厥者厥逆吐蛔靜而時煩煩而時止因蛔動始煩也飢不欲食得食而嘔因蛔聞臭氣而始嘔也蓋木盛則生風蛔為風化飢則胃中空虛蛔聞食而出故吐蛔飢不欲食也主以烏梅丸見醫方殺蟲門輕者用理中湯去甘草加川椒烏梅煎服見祛寒門厥陰陰邪集解總注曰傷寒六七日脈微手足厥逆通身膚冷煩躁無有安時者是厥陰藏寒之重病也若不早為陰消陽長之計必至於陰氣寢盛厥冷日深煩躁日甚雖用吳茱萸附子四逆等湯恐緩不及事當灸厥陰太衝穴太衝穴在兩足大指後離指甲寸半骨陷中動脈處為厥陰脈之所注各灸三壯以通其陽灸後手足仍厥冷過時不還者是陽已亡也必死鄭重光曰藏厥輕病但手足厥冷脈微細欲絕者是厥陰傷寒之外證也當歸四逆湯是厥陰傷寒之表藥也程知曰厥陰輕證不用姜附者以證無下利不屬純陰也蓋脈細欲絕之人薑附亦足以劫其陰故不惟不輕用下且亦不輕用溫也此治厥陰厥逆與治太陰少陰不同也至若內有久寒非辛溫甘緩之品所能兼治則加吳萸生薑之辛熱更用酒煎佐細辛直通厥陰之藏速散內外之寒是又救厥陰內外兩傷於寒之法也林瀾曰陽煩陰躁是煩輕躁重也故藏厥言躁蛔厥言煩已具安危之異藏厥者陽氣將脫藏氣欲絕而爭故藏厥為死候若蛔厥者藏氣虛寒而未至於絕藏氣寒則蛔不安其宮而動藏氣虛則蛔求食而出故其證吐蛔主以烏梅丸安之厥陰陽邪總訣從陽化熱厥頻煩渴便硬撞心疼舌卷胎焦消渴甚腎為熱灼縮宗筋前證的服大承若有疑似要分明四肢厥冷熱未定四逆散中加味靈首章先言厥陰熱厥之主證分別治法也厥陰邪從陽化熱又有可下之條厥陰者謂手足寒冷即四逆證也今厥而復熱熱而復厥厥熱相因厥微熱微厥深熱深是為陽厥也少腹煩滿大便燥硬舌卷而胎焦乾飲水多而小便短赤外腎為熱所灼宗筋牽痛縮入少腹婦人則陰戶拘急乳縮牽疼皆屬厥陰熱厥主證宜大承氣湯下之見攻裡門次章申言熱厥證尚未的確慎不可下也如寒熱二厥疑似不分但見四肢厥冷雖有如前陽邪證尚未確者用四逆散隨證加味見祛寒門先服以疏通厥陰其厥不回再審證施治厥陰陽邪集解總注曰傷寒一二日即厥四五日仍厥不已者是陰盛陽衰之寒厥也寒厥即藏厥也若一二日厥至四五日而熱或一二日熱至四五日而厥前厥後熱前熱後厥是陰陽互為勝復之熱厥也熱厥即陽厥也厥深者熱亦深厥微者熱亦微此乃應下之熱厥非當溫散之寒厥也若誤認為寒厥而反用溫散之劑則益助其熱上攻必口傷爛赤而成惡候至若熱證只見二三宗其人但四肢冰冷寒熱二厥界在疑似慎不可下惟用四逆散隨證加味以和陰散邪輕者自愈尚厥不回再審寒熱或汗或下分別治之成無己曰經云諸四逆者不可下之此條又云應下最宜詳審先賢謂陽厥證手足雖厥冷而或有溫時手足雖逆冷而掌心必溫暖戴元禮又以指甲之溫冷爪色之紅活青白別厥之寒熱皆慎之至也少陰厥陰外熱裡寒總訣厥陰肝少陰腎外熱裡寒同一論面色赤微身熱微脈遲鬱冒戴陽證不惡寒面赤甚脈微欲絕肢冷並下利汗蒸是格陽通脈四逆加味進首章先言少陰厥陰俱有戴陽證屬外熱裡寒也面微赤身微熱似表有陽熱也脈遲而下利清穀是里有陰寒也夫內有里陰之寒外有表陽之熱則陰得陽化而解者有之但其未解之先病人必鬱冒汗出而解所以然者面戴之虛陽與下利之虛陰兩相和順故作解也此非在下之陰格在上之陽所以病人雖冒而厥必微必不似不解之冒厥而甚也戴陽鬱冒格陽三證俱見後集解次章承上條互言格陽證以出其治也脈微欲絕四肢逆冷下利清穀陰極裡寒也不惡寒面色赤身熱汗蒸格陽外熱也主以通脈四逆湯隨證加味治之見醫方祛寒門辨戴陽證林潤曰戴陽者陽浮於上如相負載也夫真寒入里陰氣未有不盛者然其劇不過陽愈微陰愈盛耳喻嘉言曰戴陽證下利脈沉遲裡寒也面少赤身微熱是仍兼外邪必從汗解但必見微厥此中大伏危機其用法當迥異常法矣辨鬱冒證汪琥曰鬱冒者頭目之際郁然昏冒乃陽氣能勝寒邪里陽回而表和順故解鬱冒汗出而解者是陽回裡寒散而榮衛和故自汗出而解非謂解表而使之汗出也辨格陽證金鑑曰格陽者拒格其陽也亦曰隔陽陰陽隔離也少陰經熱因寒格無論腹痛乾嘔咽痛皆下利中格陽之證即使利止而脈仍前欲絕不出者亦不得謂裡寒已退輒妄治其外熱也須循四逆湯條例消陰翳於下部但加蔥白宣陽氣於下焦使陽氣通而脈亦出方為全愈彤園曰三陰傷寒俱有下利證自利不渴者屬太陰自利而渴者屬少陰惟厥陰下利屬於寒者厥而不渴下利清穀屬於熱者消渴飲多下利清水或裡急後重或便膿血也亦有邪熱不殺穀完穀不化協熱下利之證治各不同當於脈之陰陽虛實辨之另詳二卷傷寒辨證篇六經傷寒脈證治法已次第疏明分節集解具列卷首又歷舉致變救逆合病並病同病兼病附錄於後法律井然示學者以有所遵循也第六經篇中證候傳變各有寒熱虛實之分且類傷寒五證同傷寒十二證治有因時制宜之妙非辨之明審之確不至目迷五色者幾希謹遵御纂醫宗金鑑例發明切要證治八十餘條薈萃成篇列於二卷大綱畢舉萬目咸張庶幾傷寒門中經權常變法無剩義俾學者知所變通云
