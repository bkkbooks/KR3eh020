front:
  text: 序一粵稽醫書天玉册本草靈樞素問三經始自伏羲氏神農氏軒轅黃帝與臣岐伯等所作也殷時伊尹著湯液本草戰國時扁鵲著難經類皆有法無方惟後漢時張機著傷寒論論傷寒著金匱要略論雜病創立方法包舉兼括於此啓萬世之法程焉但系千載遺書辭旨古奧未易通曉且傳流至今錯誤缺漏文義多不相屬雖經歷代注家編次詮解然各執己見位置無常每遇疑難率多隨文附會鮮有明白指陳者欽惟御纂醫宗金鑑搜羅仲景全書詳加訂正博採諸家辨論歸諸折衷而又推衍奧旨酌古準今芟繁就簡舉大小男婦內外諸科另著心法要訣五十八卷大綱畢舉萬目咸張誠哉濟世編允矣醫學正派也仰見我皇上聖慈仁心欲民同登壽域之至意茲謹遵條例每科標出品題於前悉體法言隨證附方集解於後並擇諸家經驗方法分門別類薈萃成篇以備參考云乾隆六十年歲次乙卯孟春吉日沭手敬書序二古語云不為良相必為良醫以和緩蕭曹房杜爭功烈非謂其術之同也同此仁心而已矣余幼侍先大夫側嘗指一册示余曰此汝從祖彤園公醫書也公少讀書存心利物不第乃究心於醫晚年輯此書分門別類覼縷示人無非因立達之心郁不得施而欲藉是以抒其萬一也有志行仁者甚珍之余之知醫蓋自此始其後官京師使四方旬宣中州恨無仁政及天下而公事之餘士大夫有以疾來謁者輒本此書之意治之往往立應於是嘆是書之足以信今傳公之用心良苦也於呼古君子遇無窮達心大而用此心於天下國家除殘去害以利無加也小而用此心於一鄉一邑救敝扶傷以命於仁無損也使公得志於時推此心以濟世必有登斯民於仁壽者而豈僅在刀圭之末哉然則余之讀是書而慨然興嘆者非以其術之同也亦同此仁心而已矣適其孫靜安侄孫星浦重刻是書屬序於余余因推公所以著書之意願與讀是書者共質之也於是乎書咸豐五年十月從侄孫敦謹拜撰
