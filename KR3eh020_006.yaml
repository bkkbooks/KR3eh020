川芎藁本炙草防風各一錢蔓荊子六分生薑引如身重腰中沉沉然中有寒濕也加酒洗防己炮附子肩背常痛不止氣鬱滯痛也加木香香附陳皮時痛時止氣虛郁痛也加人參蜜耆升麻柴胡夜痛甚時或止者血虛郁痛也加當歸炒芍夜痛不止血瘀郁痛也加紅花薑黃靈脂痛則肩項牽強風氣鬱盛也加威靈仙痛則沉重濕氣鬱盛也加製蒼朮白朮痛則嘔眩痰風鬱結也用此湯吞送白丸子方見痰門羌活除濕湯治濕因外中身痛昏冒便溏浮腫羌活藁本升麻柴胡防風製蒼朮等分煎服升麻除濕湯即前勝濕湯去川芎加蒼朮黃耆升麻當歸治水疝腫大陰汗不絶再加炒曲麥芽豬苓澤瀉去黃耆當歸治脾虛風濕瀉痢羌活導滯湯治腳氣裡實熱盛便祕羌活獨活防己當歸酒炒大黃各錢半炒枳實八分煎湯熱服取汗下勝濕餅子治腳氣濕盛腫而重痛黑醜白醜甘遂各五錢蕎麥粉二兩共研極細水和作餅每重三錢蒸熟每食一餅茶湯呷下攢風散治腳氣表實無汗麻黃桂枝炙草萆薢炮川烏制杏仁煎服加味蒼柏散治濕熱腳氣脈症實者製蒼朮白朮酒炒黃柏知母羌活獨活防己木瓜木通甘草當歸生地牛膝檳榔赤芍生薑當歸拈痛湯治濕熱相搏肢節煩痛肩背沉重或遍身痛腳氣腫痛腿足生瘡膿水不絶及濕熱發黃脈沉實緊數動滑者茵陳苦參條芩知母俱用酒炒製蒼朮炒白朮當歸炙草羌活防風升麻澤瀉豬苓每味一錢煎湯空心服八正散治濕熱下注咽乾口渴少腹急滿小便不通或淋痛尿血或因熱為腫木通瞿麥扁蓄大黃滑石末甘草梢車前子炒梔子各錢半燈草引氣滯加木香血淋加生地鬱金大便燥結加牛膝鬱金膏淋加製蒼朮氣淋加木香石韋烏藥冬葵子木通散八正內加赤茯苓枯黃芩薄荷少許治大小便祕萆薢分清飲治陽虛白濁小便頻數漩白如油名曰膏淋川萆薢石菖蒲鹽水炒研益智仁烏藥茯苓各二錢甘草梢一錢煎服珍珠粉丸治赤白濁帶屬濕熱者炮黑姜炒神麯酒炒黃柏炒椿根皮各一兩滑石二兩青黛蛤粉各五錢研末麵糊小丸鹽湯每下二錢琥珀散治氣淋血淋膏淋砂淋滑石四錢琥珀木香當歸扁蓄木通鬱金各二錢共研極細燈草湯每下二錢尿祕加冬葵子珀珠散治尿血成塊堵塞精竅脹痛欲死琥珀一錢珍珠五分硃砂八分滑石六錢粉甘草錢半共研極細篩末分作三貼木通煎湯空心調下日三服自愈滋腎散治赤白濁帶下焦虛熱者川萆薢去心麥冬去骨遠志鹽水炒菟絲酒炒黃柏各錢半五味子淡竹葉各一錢燈草引滋腎丸又名通關丸治腎虛濕熱壅於下焦腳膝無力陰痿陰汗衝脈上衝而喘及下焦邪熱口不作渴而小便癃閉酒炒黃柏二兩酒炒知母一兩肉桂一錢研極細末蜜為丸梧子大鹽湯每下二錢空心日三服腎虛目昏內去肉桂醫方潤燥門瓊玉膏治肺虛肺痿乾咳嗽乾地黃一斤水浸透搗極爛入砂鍋內水熬成糊布絞去渣再和白蜜半斤慢火煉成膏另研茯苓三兩人參一兩無人參代以北地沙參三兩共研極細末篩入前膏內攪勻用磁瓶盛貯謹封瓶口坐滾湯鍋中慢火煮三炷香久白湯每化服一匙炙甘草湯治傷寒脈結代心悸動及肺痿咳多厄逆燥症炙草生薑桂枝各錢半麥冬麻仁各三錢生地六錢人參阿膠各一錢棗引酒煎潤燥生津湯治內燥津液枯竭當歸白芍熟地栝蔞仁去心麥冬天冬各三錢不去皮尖桃仁七粒紅花五分煎服清燥湯治肺受濕熱胸滿喘促頭眩體重面白食少口渴便祕及身痛痿躄蜜耆錢半製蒼朮白朮茯苓陳皮當歸生地澤瀉麥冬各一錢人參升麻柴胡豬苓炙草五味子炒神麯酒炒川連黃柏各五分煎服清肺湯治肺金燥熱喘嗽稠痰去心麥冬天冬知母貝母條芩陳皮桑皮甘草煎服或按後痰門二陳湯加減法救肺湯治肺氣本虛燥郁喘咳及諸氣膨脹諸痿喘嘔經霜桑葉熟石膏各三錢去心麥冬炒研麻仁蛤粉炒阿膠沙參甘草各錢半去皮尖杏仁蜜炙枇杷葉各五分血枯加生地熱甚加羚羊角末養肺湯治肺胃虛寒咳嗽喘急及年久勞嗽吐血氣腥人參炙草蛤粉炒阿膠蜜炒桑皮罌粟殼酒炒知母地骨皮等分烏梅紅棗引瀉肺湯治肺燥積熱喘咳稠痰色黃而多脹滿便祕沙參桔梗連翹枯芩薄荷梔子桑皮枳殼酒煨大黃去皮尖杏仁等分煎服瀉肺丸治燥實喘嗽痰稠腥穢氣促痞悶去油栝蔞仁炒葶藶去皮尖杏仁酒炒大黃黃連黃芩法半貝母鬱金研末麵糊丸白湯下二錢清燥寧嗽丸膽星一兩花粉貝母前胡桔梗桑皮陳皮炒黃芩去皮杏仁各七錢甘草五錢研末蜜丸青黛滾衣薑湯每下二錢滋燥養榮湯治火爍肺金血虛外燥皮膚皺揭筋急爪枯或大便風祕當歸三錢生地熟地酒炒黃芩白芍秦艽各錢半防風甘草各一錢潤腸丸治腸胃有伏火大便祕澀全不思食風結血結大黃歸尾羌活秦艽各五錢去皮尖桃仁去殼麻仁各一兩研末蜜丸白湯下二錢通幽湯治幽門不通上衝吸門噎塞不開氣不得下大便艱難脹滿者當歸身制桃仁升麻紅花生地熟地炙草各錢半或加檳榔五分韭汁牛乳飲治胃脘有死血乾燥枯槁食下作痛翻胃便祕搗韭菜汁和牛乳等分薑湯調勻時時呷之膈噎方韭汁散瘀竹瀝薑汁消痰童便降火人乳潤燥補血蘆根汁止嘔茅根汁涼血甘蔗汁和胃隨症用汁或加燒酒燙熱服之麻仁蘇子粥治産後大便不通及老人風祕大麻仁淨蘇子等分洗淨同研極細用布袋盛入水中擺出淨粉取粉煮粥啜之本事黃耆湯治心中煩躁不生津液不思飲食蜜黃耆五味子去心麥冬天冬熟地白芍炙草茯苓北地沙參等分烏梅姜棗引竹葉黃耆湯治氣血兩虛胃熱作渴生地淡竹葉各二錢當歸川芎黃耆人參白芍甘草去心麥冬酒炒黃芩製半夏熟石膏各一錢煎服地黃飲子治消渴煩躁咽乾面赤生地熟地人參蜜耆炙草澤瀉去心