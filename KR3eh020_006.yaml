無津液而氣哽者蛤粉炒阿膠二錢焙馬兜鈴炒研牛蒡子去皮大杏仁各一錢糯米引百合湯治肺傷咽痛喘咳痰血生地熟地去心麥冬各錢半百合貝母元參桔梗當歸白芍甘草茯苓各一錢煎服紫菀湯治肺傷氣極勞熱久嗽吐痰吐血及肺痿成癰蛤粉炒阿膠酒炒紫菀知母貝母桔梗茯苓各一錢甘草人參五味子各五分獨參湯治元氣大虛暴絶昏死氣脫血脫者人參不拘多少捶碎煎湯頻頻灌之下咽良久鼻上津津汗出者生參附湯治陰陽氣血暴脫人參炮附子等分煎服治真頭痛加川芎參地湯治失血陰亡昏死人參生地黃等分煎湯灌入以固氣救陰生脈補精湯治房勞精泄氣脫人參麥冬五味子各一錢酥炙鹿茸當歸熟地各錢半煎湯灌之或加棗肉龍眼肉粳米同煎服生脈保元湯治熱傷元氣出汗困倦人參五味子桂枝各一錢去心麥冬蜜耆炙草各二錢紅棗三枚粳米一合拯陰理勞湯治陰虛火動皮寒骨蒸咳嗽煩逆食少痰多人參五味子去心麥冬醋炙龜板炒苡仁蓮肉白芍當歸生地丹皮陳皮甘草百合冬青子各一錢煎服汗多不寐加棗仁咳而嗽痰加桑皮貝母嗽吐濕痰加茯苓法半咯血加蛤粉炒阿膠骨蒸熱甚加地骨皮拯陽理勞湯治陽虛氣弱倦怠惡煩勞動則張口喘氣表熱自汗身體痠痛等症人參肉桂各五分炙草陳皮五味子各一錢當歸蜜耆炙白朮各錢半薑棗煎服惡寒加炮附子泄瀉加升麻柴胡瀉久不止加訶子肉蔻木香夏月咳嗽去桂加再麥冬冬月咳嗽加乾薑滋陰降火湯治火既刑金咳嗽醋炙龜板去心麥冬天冬生地當歸白芍各錢半酒炒黃柏知母炒砂仁炙草各五分咳甚加百合五味咯血加鬱金多痰加貝母盜汗加地骨皮氣虛加參耆滋陰地黃湯治陰虛火炎唇口悶痛熟地棗皮山藥茯苓麥冬五味當歸枸杞巴戟菊花酒炒肉蓯蓉等分煎服固本湯治肺腎兩虛成勞咳血人參一錢去心麥冬天冬生地熟地各二錢若脾肺三藏虛損再加蜜耆炙草五味子貞元飲治氣短喘促提不能升咽不能降人但知為氣急其病在上焦而不知其元海無根肝腎已敗此為子午不交氣脫症也用此救之蒸曬熟地黃五錢當歸三錢炙甘草一錢如嘔吐惡食或惡寒者加煨姜五片氣乏脈微加人參手足逆冷加肉桂或加炮附子理陰煎治肝腎虛敗不能納氣浮散而作喘者熟地四錢當歸三錢炮姜炙草各錢半照前方加味此二方出自景嶽滋補湯治遺精不止虛羸垂危及強中病後用此調理人參茯苓炙白朮煅龍骨牡蠣粉炒杜仲炒故脂遠志肉金櫻子去心麥冬天冬牛膝枸杞當歸熟地炒芍川芎蓮鬚炙草等分煎服坎離既濟湯治久曠火強心有所慕夢而後遺生地四錢黃柏知母鹽酒炒灱各二錢煎服如胃虛食少便溏者亦不可服大劑坎離湯治強中精泄陽盛陰虛胃尚實者生地五錢黃柏知母鹽酒炒灱打碎龍骨各三錢煎湯日服二次醫方明目門滋陰地黃丸治血弱氣虛不能養心心火旺盛肝木自實瞳子散大視物不明者熟地生地各一兩天冬五錢同用酒浸透另搗成膏聽用淨柴胡八錢酒炒黃芩當歸各五錢酒炒黃連麵炒枳殼地骨皮五味子炙草人參各三錢曬研細末拌勻前膏加煮麵糊為小丸茶湯每下二錢日三服忌食辛熱生冷發物明目地黃丸治腎虛目昏當歸棗皮山藥茯苓丹皮澤瀉柴胡五味子各五錢曬灱研末搗熟地膏二兩和煉蜜糊丸硃砂滾衣酒下二錢光明丸治內翳外障生地川芎歸尾防風羌活獨活芥穗薄荷白芷甘草菊花桔梗酒炒大黃黃柏黃芩黃連草決明等分研末蜜丸酒下駐景丸治肝腎氣虛目暗枸杞五味子車前子楮實子各一兩炒灱炒川椒五錢酒炒菟絲當歸各三兩曬灱研末搗地黃膏四兩和煉蜜打糊為丸梧子大酒水下二錢日三服地芝丸治目能遠視不能近視有火無水者焙灱天冬生地各四兩炒枳殼白菊花各二兩研末麵糊小丸酒下二錢日三服煎服亦效定志丸治目不能遠視只能近視有水無火者石菖蒲遠志肉各二兩茯苓人參各一兩研末蜜為小丸硃砂滾衣酒下二錢日三服加減定志丸前方去人參加蜜耆炙草桂心棗仁炒柏子仁炒益智仁各一兩研末煮麵糊丸硃砂滾衣酒下二錢撥雲退翳丸通治風熱障翳當歸兩半芥穗羌活木賊川芎地骨皮白菊花炒蒺藜蜜蒙花各一兩炒枳實蔓荊子薄荷葉天花粉炙草川椒各五錢酒炒川連焙灱蛇皮去足蟬蛻各二錢曬研細末蜜為小丸每服二錢生翳者米泔水送下內障用木香湯外障用當歸湯羊肝丸通治內障淨夜明砂去足蟬蛻木賊當歸各一兩曬灱研末切碎羊肝四兩水煮爛搗膏糊藥為小丸空心酒下三錢日二服益氣聰明湯治內障目昏耳鳴耳聾北沙參蜜黃耆各二錢酒炒黃柏蔓荊子升麻白芍葛根炙草各一錢煎湯臨臥一服五更再服人參益胃湯治勞役過度飲食不節脾胃受傷致生障翳人參炙草各一錢蜜耆錢半酒炒黃柏白芍蔓荊子各八分姜棗引清風養血湯治目赤腫痛當歸甘草草決明炒白芍煅石決明各一錢芥穗防風白芷川芎白菊蔓荊麻黃紅花去皮尖桃仁各五分煎服洗肝散治風熱上攻暴腫焮赤目痛難開隱澀眵淚羌活防風薄荷炙草當歸川芎酒炒大黃梔子各一錢便利不渴去梔子大黃防風飲子治倒睫拳毛酒炒川連炙草防風葛根各一錢北沙參當歸各二錢蔓荊子北細辛各三分煎湯熱服避風寒濕熱石膏羌活散治拳毛倒睫初起風熱盛者羌活芥穗白芷川芎細辛藁本黃芩石膏菊花甘草木賊歸尾胡麻子蜜蒙花製蒼朮等分煎服菊花通聖散治暴熱火眼初起外障痛甚發熱無汗便祕口渴脈浮數表裡實者菊花二錢滑石末三錢石膏末黃芩桔梗各一錢防風芥穗麻黃連翹當歸川芎白芍薄荷土炒白朮酒炒大黃酒炒梔仁芒硝甘草各五分生薑三片蔥白三寸煎湯熱服取汗下為度洗刀散前散再加羌活獨活蔓荊子青葙子各五分治頭風傷目焮赤腫痛暴生翳膜脈症實者祛風清熱散治風熱赤眼暴腫痛甚歸尾赤芍生地川芎芥穗防風羌活白芷枳殼桔梗薄荷連翹酒炒川連黃芩梔子甘草蔥白等分服焮赤腫痛口渴便祕加芒硝酒炒大黃風熱脹痛加炒研牛子蔓荊烏珠脹痛加天麻炮川烏犯眼生翳加硃砂製蒼朮翳障加蒺藜撞刺腫痛瘀血不散加酒炒大黃去皮桃仁血熱赤痛亦加之清風散熱湯治天行赤眼四時流行羌活防風歸尾川芎連翹赤芍甘草薄荷炒研牛蒡炒大黃梔仁等分熱服四物補肝湯治去血過多致成內障外障熟地四錢當歸夏枯草酒炒香附各二錢炒芍川芎各錢半炙草芥穗各五分因嗜辛辣厚味或久患頭風致成風濕赤爛久不愈者倍加夏枯草川芎香附芥穗如因思慮哭泣及竭視勞瞻致精血內耗而成障翳者倍加熟地當歸除風湯治初患五風有餘之症銼羚羊角末車前子元參茯苓各二錢酒炒大黃黃芩白芍芒硝益母子各一錢全蠍蟬蛻各五分酒引防風散治圓翳初起形氣實者防風知母桔梗元參各錢半酒炒大黃黃芩芒硝車前子益母子各一錢北細辛薄荷各五分酒引兔矢散治痘翳日久及平常昏暗障翳取山野兔矢洗淨曬灱研末茶湯調下一錢日三服或用兔矢茶湯吞下點眼方治陽分風熱目赤腫痛捶破川連人乳浸透蘸汁頻點之或蒸汁蘸搽或加朴硝或加黃柏明礬棗肉蒸洗圓明膏治內障生翳及瞳子散大因勞心過度飲食失節者麻黃生地川連柴胡各五錢歸身甘草訶子皮各三錢先捶碎麻黃五錢以水二碗漫火熬至一碗掠去浮沫再將諸藥研末入內同熬至滴水不散布絞去渣加生蜜少許和勻成膏頻頻蘸搽百點膏治翳膜遮瞳人常點自效研碎川連二錢用水二碗熬至一碗後加當歸甘草防風各八分去皮蕤仁五分研碎共入川連湯內漫火熬成膏細布絞去渣和勻白蜜少許患者靜坐每挑少許對鏡蘸點翳膜上點至目睛微痛方效日點五七次臨臥亦點之務使藥力相續故名百點膏再有石𤫇丹爐甘石丹方載六集眼科書廣大重明湯治風熱目疾赤眼腫痛肉防風白菊花龍膽草各錢半粉甘草北細辛各一錢煎湯濾去渣乘熱先熏後洗再燙熱洗數次治飛絲塵沙入目濃磨京墨汁點之或用滾茶調鹽一匙以目就茶碗上蓋以衣口含竹筒吹起熱氣對眼熏蒸飛塵自落治感寒目痛色淡紅者煎紫蘇湯一碗攪化雞子一枚入湯內煮熟取放眼前上蓋以衣口含竹筒吹起熱氣張眼熏蒸軟帛拭淨要避風寒救急良方暴死凡中風中痰類中九症皆令卒然昏倒牙關緊急不省人事急以大指甲掐定人中穴研半夏皂角或細辛末吹鼻取嚏有嚏者肺氣未絶也生如口噤不開用鹽梅肉或烏梅肉遍擦牙關待醒時煎生薑湯與服方按三卷中風門隨症施治凡涎潮於心卒然仆倒者當扶入暖室抱定正坐燒紅白石子或燃炭塊煤放瓶中用醋或酒沃取濕氣頻頻熏鼻或吹半夏皂角細辛末取嚏醒後但服生薑湯隨按症用藥忌遽食粥飯恐涎飲繫於心絡而不去古法用生半夏研末水糊丸如豆大納入兩鼻孔心頭溫者一日猶可活通治五死併産後暈死救縊死切忌急暴割索放倒坐落其氣須用綿衣裹手兜住糞門以物墊足輕輕抱起再令人解開繩索同扶下安放平處以一人腳踏兩肩手扯頭髮醫者按揉項痕捻圓喉管令兩人口含竹筒吹氣入兩耳中再揉將胸膈屈曲手足使氣流通若氣不相接將腰拍打三五掌自通或研皂角等末吹鼻得嚏自活活時頻飲稀粥以潤咽喉後方食肉飯古云自旦至暮身冷猶可活自暮至旦陰氣盛為難救心下溫亦可活救溺死須倒提出水扶令伏身橫臥牛背上牽牛徐走水自口鼻糞門滲出後以薑汁捺牙或灌薑湯或吹皂角等末或以竹筒吹氣入耳鼻氣通自活如口噤不開須撬開牙齒橫放一竹箸使水得出或研皂角末用綿裝定納入肛中少頃取出亦能導水如倉卒無牛以鍋覆地將溺人臍心正對鍋臍托住頭足輕輕揉動水出即活或以鹽捺臍心伏身橫臥凳上亦能吐水或炒熱鹽填塞鼻孔亦能引水救凍死凡中寒昏倒口噤身強手足逆冷須撬開牙齒頻以薑湯灌之若落水凍死微有氣者急去濕衣解活人熱衣包裹隨炒熱米或熱柴灰用布二塊包裹輪流揉尉心胸俟身溫暖目開氣回旋以薑湯或熱酒米湯灌之凍死切忌遽用火烤及洗熱湯冷與熱爭必死救熱死凡暑月中熱昏死或稍醒而不能運動者搗爛薑蔥炒熱尉臍或尉炒鹽若途中患此取道旁熱土圍臍作圈內撒熱尿後用薑湯或茶或粥乘熱灌之切忌遽飲涼水及臥濕地熱與冷爭必死至若北地專燒石煤人中煙毒乍然昏死必須移向寒涼之處凍之則解又不可遽灌薑湯熱水恐助毒邪不即解也救壓死凡被牆土木石壓壞心頭溫者扶令盤坐緊提其發研半夏等末吹鼻取嚏旋以生薑湯調麻油少許灌之或用童便和熱酒兌服或取東向桃柳枝各七寸煎服余法詳見七集正骨篇救魘死凡夢中魘死或被鬼擊原系無燈火時得者不可用燈火去照亦不可抱頭狂呼但以津唾其面移動臥處自醒如不醒當痛咬其腳跟或緊掐虎口用半夏牙皂細辛等末吹鼻取嚏或灌薑湯余詳三卷中惡至心虛膽怯之人夜間仰臥以手拊心或衣被塞胸氣窒心懼神亂夢魘驚呼悲哭者但當喚醒轉身側眠甚者詳三卷神病門施治內經云陰盛則夢涉大水恐懼陽盛則夢大火燔灼陰陽俱盛則夢相殺上盛則夢飛下盛則夢墮飽盛則夢與飢盛則夢取肝氣盛則夢怒肺氣盛則夢哭雜録云肝實則夢伏樹下而多驚恐肝虛則夢細草芒芒肺實則夢兵刀血戰肺虛則夢白雪孝服心實則夢火焚心虛則夢撲火或陽物堅舉脾虛則夢飲食不足脾實則夢築牆架屋腎虛則夢舟行涉水腎實則夢身伏水中此皆五藏虛實所生之夢也他如情欲相感致生怪夢難以枚舉莊子曰至人無夢至人無欲故無夢也解毒方凡中蠱毒必嘗白礬不澀食生黃豆不知腥也研膽礬末熱茶每調五分頓服旋以雞翎掃喉間探吐惡毒或研鬱金末米泔調服三錢逐下惡毒或煎石榴皮湯溫服或常服黑豆甘草湯凡中砒霜毒搗大藍根汁水調服或飲熱羊血或搗田螺冷水浸汁頻頻服或研緑豆粉水調服或飲大糞汁凡中鹽滷毒縱飲生豆腐漿即解或服緑豆湯凡中河豚毒研爛胡麻子水調服或食生橄欖凡中菌菌毒水調黃泥漿飽服取下亦治誤吞螞蝗凡中鉛粉毒以麻油蜂蜜飴糖等分調勻滾湯沖服
