body:
  text: 傷寒雜病醫方卷六醫方祛風門小續命湯治中風不省人事神氣潰亂半身不遂筋急拘攣口眼喎斜語言蹇澀風濕腰痛痰火併多六經中風及痙病諸痹腳氣隨症加減防風錢半麻黃桂枝防己人參炙草川芎酒炒白芍酒炒黃芩去皮尖炒研杏仁各一錢炮附子五分生薑三片紅棗二枚煎湯溫服中風加減法筋急語遲脈弦者去白芍加當歸苡仁煩躁便祕去附桂倍白芍加竹瀝便祕日久胸滿不快加大黃炒枳殼藏寒下利去防己黃芩倍附子加白朮嘔逆加製半夏語言蹇澀手足戰掉加竹瀝石菖蒲身痛發搐加羌活口渴加花粉麥冬煩渴多驚加羚羊角末汗甚去麻黃杏仁加炙白朮舌燥去附桂加石膏末小續命湯易老分治六經中風加減活法太陽中風無汗惡寒倍用麻黃杏仁防風有汗倍用桂枝杏仁白芍陽明中風無汗壯熱去附子加知母石膏有汗倍用桂枝黃芩加葛根太陰中風無汗身涼倍附子加乾薑甘草少陰中風有汗無熱倍用桂枝附子甘草藏府中風六經混淆系之於少陽厥陰者加羌活連翹痙病加減法風寒盛則無汗為剛痙去桂枝風濕盛則有汗為柔痙減去麻黃表實去人參附子加羌活獨活裡實祕結加大黃芒硝諸痹加減法行痹風勝倍防風痛痹寒勝倍附子著痹濕勝加防己皮痹加黃耆脈痹加紅花薑黃肌痹加白芷葛根筋痹加川續斷羚羊角末骨痹加炙虎骨狗脊有汗減去麻黃便溏去防己寒勝去黃芩熱盛去附子加石膏加減續命湯通治腳氣製蒼朮白朮麻黃桂枝防己防風羌活獨活炒白芍川芎炙草姜棗引腳氣加減法邪中三陽必熱而脈數去麻黃桂枝加炒黃柏條芩柴胡寒中三陰所患必冷而脈遲加秦艽細辛冷痛再加炮附子乾薑脈浮者起於風加秦艽脈滑急者濕痰盛加半夏威靈仙脈微弱者屬濕熱加牛膝木瓜脈緊數大便硬者加酒炒大黃或加歸尾大秦艽湯治中風手足不能運掉舌強不能言語風邪散見不拘一經秦艽石膏末各三錢酒洗當歸酒炒黃芩土炒白朮炙草茯苓生地熟地白芷川芎羌活獨活防風各一錢北細辛五分生薑三片春夏月加知母心下痞悶加炒枳殼此通治六經中風之輕劑三生飲治中風卒倒但見六脈沉伏四肢逆冷者生南星二錢生川烏附子人參各一錢木香三分生薑三片煎服換骨丹治中經之人左癱右瘓形氣虛者製蒼朮防風川芎各八錢制何首烏炒蔓荊子炒桑皮白芷梢各五錢炒苦參威靈仙各一兩五味子槐角人參木香各三錢曬研極細另切麻黃四兩水熬成膏糊前末為丸每重二錢研冰片麝香各五分硃砂五錢滾丸為衣磁瓶收貯每用一丸溫酒化下日三服再有萬靈丹見外科醫方黃字號黃耆五物湯治風中經絡審其脈症的是榮衛不足者蜜炙黃耆六錢酒炒白芍二錢桂枝生薑各三錢紅棗四枚水煎服經曰衛虛則不用營虛則不仁中左者加當歸三錢中右者倍蜜耆風中兩腿脛膝加牛膝苡仁筋軟難屈伸加木瓜骨痿加炙虎骨經絡不通兼裡寒者加附子此方功專補外故不用人參炙草搜風順氣丸治中風風祕氣祕便溺阻隔遍身瘙癢脈來浮數亦治左癱右瘓及腸風下血酒蒸曬透大黃五兩泡去皮郁李仁酒炒牛膝炒麻仁車前子山藥棗皮各二兩炒枳殼菟絲子獨活防風檳榔各一兩曬灱研末蜜為丸梧子大酒水每下二錢空心日一服牛黃清心丸治中藏之人痰迷口噤形氣實者真牛黃白附子炒殭蠶煨天麻肉防風各二錢真膽星焙蠍梢蟬蛻梢各三錢先曬研極細加麝香五分再同研勻煮紅棗取肉糊丸梧子大薑湯每下一錢祛風至寶丹治風邪卒中不論藏府經絡得見六脈浮數身熱心煩者麻黃細辛天麻白附羌活獨活芥惠防風天麻薄荷甘草桔梗殭蠶全蠍黃柏黃芩黃連大黃俱用酒炒連翹梔仁石膏滑石人參芒硝當歸熟地炒芍川芎土炒白朮等分曬灱研末蜜丸重二錢茶酒任下祛風至寶湯即前方每味一錢大罐煎湯作三次溫服其效尤速牽正散治中風口眼喎歪焙灱全蠍炒灱殭蠶曬白附子等分研細末酒水每調一錢數服自止羌活愈風湯凡中風必有先兆服此預防之中風初愈常服行導諸經秦艽石膏末各一錢羌活防己防風麻黃桂枝柴胡前胡薄荷白芷炙草川芎當歸茯苓熟地生地地骨皮蔓荊子白菊花北枸杞炒白芍蜜黃耆製蒼朮炙白朮製半夏炒厚朴煨枳殼炒條芩各六分人參北細辛各三分生薑引加重分量研末蜜丸酒下二錢日三服最妙活絡丹治中風手足不仁日久不愈經絡有濕痰死血腿臂間忽有一二點痛者炮製川烏草烏真膽星各三兩焙灱蚯蚓去油乳香沒藥各兩半研末酒糊小丸酒下一錢日二服若兼腰痛加炒五靈脂豨蘞丸治中風喎僻語言蹇澀肢軟骨痛及風痹走痛十指麻木肝腎風氣風濕諸瘡五月初五或六月六七月七採豨蘞草不拘多少取枝葉花實用酒浸透九蒸九曬研末蜜為小丸空心酒下二錢日三服加味地黃飲治中風舌喑不能言語足不能行解見三卷中風喑痱熟地二錢制肉蓯蓉去心麥冬茯苓巴戟各錢半遠志肉炒棗皮石菖蒲五味子金叉石斛各一錢炮附子肉桂薄荷各五分姜棗引桂枝補血湯治産後金瘡大傷血後風襲成痙桂枝生薑酒洗白芍各二錢當歸炙草各一錢蜜炙黃耆五錢棗二枚如聖飲治剛痙柔痙面赤項強頭搖口噤角弓反張手足瘛瘲等症羌活防風白芷川芎甘草法半柴胡黃芩當歸白芍烏藥生薑煎服時加竹瀝半杯剛痙無汗加蒼朮麻黃柔痙有汗加白朮桂枝口噤咬牙大便祕結加酒炒大黃玉真散治破傷風牙關噤急角弓反張生南星白附子天麻白芷羌活防風等分曬研極細熱酒每調下二錢外用唾津調此散塗敷傷口干則再塗若痙風昏死心口尚溫者連進三服可生有瘀亦愈外用唾津調敷瘋犬咬傷最妙江鰾丸治破傷風風邪在裡驚悸抽搐天麻雄黃各一錢細切魚鰾炒灱殭蠶炒鴿子糞炙焦蜈蚣各稱足五分共研極細末分作四分以一分兌巴豆淨霜一分三釐搗飯糊為丸梧子大又將三分搗飯糊為丸緑豆大研硃砂末滾衣每用二十丸兌前巴豆丸二粒白湯送下俟大便利後只服朱衣丸獨活湯治風虛瘛瘲昏憒不醒獨活羌活防風桂心當歸法半川芎茯神淨白薇石菖蒲遠志肉各一錢人參炙草北細辛各五分姜棗引五痹湯主治諸痹隨症加味麻黃桂枝白芷葛根防風防己羌活黃耆紅花甘草羚羊角末炙焦虎骨炮製附子水煎酒引行痹走痛以羌活防風為主痛痹苦痛以麻黃附子為主著痹重痛以羌活防己為主皮痹麻癢以桂枝黃耆為主脈痹色變以桂枝紅花為主肌痹頑木以白芷葛根為主筋痹牽強以羚羊角末為主骨痹痠痛以醋炙虎骨為主木通湯隨症加味鮮木通一兩煎湯熱服以取微汗不愈再煎服行痹上下左右流走無定風邪甚也加羌活防風各二錢痛痹其痛甚苦寒邪盛也有汗加附子無汗加麻黃一錢著痹其痛重著而難移動濕邪甚也加防己苡仁各二錢胞痹腸痹俱服五苓散加味見後利濕門蠲痹湯治中風身體煩痛項背拘急手足冷痹腰膝沉重舉動艱難蜜耆炙草羌活防風當歸酒炒赤芍酒炒片子薑黃姜棗引三痹湯治氣血凝滯手足拘攣風寒濕痹人參蜜耆茯苓甘草當歸生地白芍川芎獨活防風秦艽續斷杜仲牛膝桂心細辛姜棗引舒筋散治血脈凝滯筋骨拘牽肢節脹痛川獨活上桂心酒洗當歸酒炒元胡索等分酒煎服獨活寄生湯治肝腎虛熱風濕內攻腰膝作痛冷痹無力屈伸不便川獨活桑寄生無真寄生代以川續斷秦艽防風甘草茯苓當歸熟地炒芍川芎川牛膝薑汁炒杜仲各一錢桂心人參北細辛各五分姜棗引煎湯服或加分量如法浸酒通治風濕痹痙久服自效三五秦艽湯通治痛風當歸生地赤芍川芎蜜耆炙草牛膝杜仲紅花秦艽羌活獨活五加皮製蒼朮炒萆薢黃柏川連黃芩俱用酒炒如遇陰天預先痛甚加防風天麻升麻午後夜間痛甚加丹皮熟地酒炒升麻午前痛甚加連翹兌竹瀝通用痛風方痛風有寒熱痰濕血瘀之辨此方通治製蒼朮泡南星酒炒黃柏各二兩去皮尖桃仁炒神麯膽草川芎防己白芷各一兩羌活桂枝紅花歸尾威靈仙各四錢曬灱研末麵糊小丸酒水每下二錢二妙散治濕熱痛風製蒼朮酒炒黃柏等分研末薑湯每下二錢加味二妙散治濕熱腰痛注足熱腫製蒼朮炒川柏炒杜仲牛膝木瓜防己川芎熱甚加梔仁濕盛加苡仁酒水煎服胃風湯治風邪乘虛入胃其人反能食但牙關緊閉手足瘛瘲肉瞤面腫名曰胃風又治風冷客於腸胃飧瀉下注完穀不化及腸風下血土炒白朮炒白芍茯苓當歸川芎各二錢人參桂心各一錢粟米百粒東垣方治胃風內熱成痹而消中葛根白芷各錢半升麻麻黃留節各一錢柴胡羌活藁本當歸黃柏炙草蔓荊子煨草蔻製蒼朮各五分姜棗引渴加花粉石膏熱甚加生地竹瀝津少重加萎蕤腰痛方治濕痰攻痛製蒼朮炒黃柏炒苡仁威靈仙炒杜仲川牛膝羌活陳皮澤瀉木瓜炒芍甘草煎服奇效方治閃挫腰痛當歸木香鹽水炒小茴杜仲酒煮元胡炒黑醜等分研末酒水每下二錢傷重加乳香沒藥煨腎散治濕痰蓄積腰如物覆痛連脊背豬腰子剖開研川椒甘遂食鹽末各五分捺內合攏濕紙包定入燃灰中煨熟嚼食酒水咽下獨活散治風熱頭痛牙痛羌活獨活芥穗防風陳皮甘草薄荷炒芩石膏生地白芷川芎各一錢北細辛五分煎服清空膏治偏正頭痛日久不愈及風邪濕熱上壅頭目頭腦苦痛不止酒炒黃連黃芩羌活防風各一兩柴胡七錢川芎五錢炙甘草兩半曬灱研末每用三錢茶調如膏白湯送下加減法如少陰頭痛必足寒氣逆脈沉而遲內加北細辛三錢如太陰頭痛必兼吐痰涎脈沉而緩去羌活防風川芎甘草加製半夏如偏頭痛服之不愈減羌活防風川芎一半倍加柴胡以散少陽相火如自汗發熱惡熱煩渴此屬陽明頭痛不可服此用白虎湯加白芷朱丹溪曰東垣制清空膏治諸般頭痛惟血虛頭痛從魚尾相連者不治又云治少陽頭痛固妙如痛在太陽厥陰者勿用蓋謂巔頂痛也王海藏曰熱在至高之分當以輕劑抑之從緩治也若急治之上熱未除中寒生矣故芩連用酒炒非獨制其寒且欲其上升也醫方祛寒門理中湯治太陰病自利不渴寒多而嘔腹痛脈沉或厥冷拘急及感寒霍亂陳壁土拌炒白朮炙甘草乾薑人參各二錢無人參用沙參蜜蒸萎蕤加倍代之亦可煎湯溫服少頃啜熱粥一碗以助藥力加減法自利腹痛加木香五分不痛利多者倍白朮渴者倍白朮倦臥沉重利不止者加炮附子腹滿去甘草嘔吐去白朮加法半臍下動氣去白朮加肉桂一錢心悸加茯苓寒實結胸加炒枳實脾氣虛寒作瀉者加陳皮茯苓脾虛作瀉惡食不化食再加炒砂仁腹滿痞悶兼食者加陳皮青皮脾虛作滿加蜜耆炒芍陳皮藿香憂思鬱結脾氣脹滿上衝飲食不下者加當歸炒芍厚朴陳皮川椒理中丸前湯加分量研末蜜為丸重二錢日服二丸夜服一丸白湯化下治同前症凡中氣不運腹中不實口失滋味病久不食者可常服之連理湯前湯加黃連茯苓主治傷暑瀉而渴者丁萸理中湯理中加丁香吳萸治脾寒厄逆噦噫手足溫者茵陳理中湯理中加茵陳等分治陰黃脾濕腎寒兩經虛者加減理中湯理中去炙草加川椒錢半烏梅一個治胃寒蟲擾腹痛理中安蛔丸理中去炙草加炒川椒茯苓等分研末醋煮烏梅取肉搗膏糊藥為小丸白湯每下二錢治胃寒吐蛔附子理中湯理中加炮附子一錢治中寒身痛腹痛四肢拘急逆冷若中寒無汗加麻黃細辛陰毒加生川烏嘔吐加吳萸丁香生薑脈微細欲絶倍加人參附子湯治少陰病身體痛手足寒骨節痛脈沉者及少陰病得之一二日口中和背惡