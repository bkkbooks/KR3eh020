者加陳皮香附木香如氣虛郁痛時作時止加人參蜜耆升麻柴胡如血虛郁痛夜則痛甚亦或時止加當歸白芍如血瘀郁痛夜痛不止加紅花薑黃五靈脂如風氣鬱盛痛則肩項牽強加威靈仙如濕氣鬱甚痛則肩背沉重加製蒼朮白朮若風痰凝郁痛則嘔暈本湯送下白丸子見除痰門又法治濕熱相搏背重熱痛服當歸拈痛湯見利濕門若風痰鬱結走痛服豁痰湯痰氣凝聚背心一點痛甚服痰氣方手臂症治治兩臂重痛麻木服加味二陳湯痰飲走注手臂冷痛無定服控涎丹若兩臂疼痛脈沉細服指迷丸以上俱見除痰門痛風門要略痛風者皆因氣虛體弱調理失宜風寒暑濕結於腰背及四肢骨節之間如痛處肉色不變日減夜甚者為寒痛腫滿墜痛者為濕痛遍身走痛者為風痛更有氣虛血瘀痰鬱等症當與三卷五痹五痿參合治之治略治一切痛風初起主以三五秦艽湯隨症加減並上中下通用痛風方若血脈凝滯筋骨拘攣肢節煩痛服舒筋散若濕熱痛風焮熱重痛服二妙散俱見祛風門治因勞碌太過遍身軟痛氣乏自汗用十全大補湯加製半夏炒乾姜老人筋骨痛暈眩尿赤夜則痛甚用六味地黃湯加炒梔仁柴胡方見補養門鶴膝風要略此症治法詳見外科茲難備載大抵由三陰虛弱風寒濕邪乘虛為病也寒甚則膝內冷痛風盛則筋脈拘攣濕盛則沉著重痛筋緩無力初起膝上至髀膝下至脛漸漸枯細膝獨胖大形如鶴膝皮色不變日增腫痛也治略鶴膝風初起毋論雙單先用五積散加牛膝酒引汗之見表裡門次服換骨丹見祛風門外敷沖和膏玉龍膏見外科六卷如日久不消勢欲潰膿服獨活寄生湯見祛風門若形氣虛者但服大防風湯見補養門潰後托補外治諸法俱見外科六卷有因痢後患鶴膝者雖名痢風法治卻同也大便燥結總括熱燥即陽結也能食而脈浮數有力與三陽熱症同見者也寒燥即陰結也不能食而脈沉遲有力與三陰寒症同見者也實燥即胃實便燥也與腹滿痛症同見者也虛燥即脾虛先硬後溏之燥也與少氣腹縮症同見者也氣燥即氣道阻膈之燥也與噎膈反胃症同見者也血燥即血液乾枯之燥也與久病老人虛人同見者也風燥即久患風病之燥也當從風家治之直腸結即燥屎巨硬結在肛門難出之燥也當從導法治之治法治熱燥腸結能食而脈浮數有力與三陽實熱諸症同見者欲急下服大承氣湯通治三焦不欲急下服小承氣湯不犯下焦欲緩下服調胃承氣湯不犯上焦或服六一順氣湯麻仁丸俱見攻裡門若熱燥輕者只用八正散通利之見利濕門治寒燥陰結不能食而沉遲有力與三陰寒症同見者或因冷食積留胃中心腹脹痛閉結欲死者用備急丸下之見攻裡門若寒燥輕者用大黃附子乾薑桂心厚朴甘草煎服大便自通治寒虛燥結及老人虛秘冷秘小兒形白虛肥日能飲食悉化為痰流散肢體久不大便者常服半硫丸方見補養門外用握藥法見和解門治氣虛燥結食少形羸虛喘自汗時或下墜糞燥難出者用補中益氣湯加芒硝酒炒大黃補而行之見理氣門治陰陽虛壅滯氣不宣通腹滿便閉服木香順氣湯兼痰服蘇子降氣湯若因七情感傷上氣喘急胸膈脹悶氣燥便秘服四磨湯分心氣飲若因氣道阻隔呃噎便燥初服人參利膈丸推陳致新次服橘杏丸或服加減正氣散俱見理氣門治火灼肺金內虛外燥皮膚皺裂筋急爪枯大便燥結者服滋燥養榮湯若肺受濕熱之邪胸滿喘促食少頭昏口渴便秘者服清燥湯若腸胃有伏火大便閉結全不思食及風結血結俱服潤腸丸若血虛燥結津液乾枯糞澀難出者服潤燥生津湯均見潤燥門治中風風秘氣道不利脈浮而數不得大便者服搖風順氣丸見祛風門若老人風秘常服麻仁蘇子粥通幽湯見潤燥門治直腸燥結糞燥巨硬結滯肛門者用蜜煎導法豬膽導法見攻裡門或用滋燥養榮湯加槐花芥穗白蜜引見潤燥門治食滯便閉兼腹滿脹痛惡食等症形氣實者服木香檳榔丸導滯丸見攻裡門虛者用保和湯加酒煨大黃炒枳實見理氣門治血瘀便閉腹肋脹痛大便黑小水利及蓄血發熱如狂服桃仁承氣湯輕者用復元活血湯俱見理血門小便癃閉總括膀胱熱結輕者為癃重者為閉閉者謂尿閉而無點滴下出致小腹實滿脹痛也癃者謂淋瀝點滴而出一日數十次或頻數無度莖中常澀痛也若上為嘔噦飲食不入下為癃閉小便不通則陰陽之氣關格倘更頭汗大出此為陽絕決難生也熨臍法切碎蔥白二斤搗如泥裂去汁分作四起用絹二塊包二起先以一包置臍上用熨斗盛炭火熨半炷香久換第二包用熨斗盛涼水熨一刻再換蔥包照前法先火後水輪流熨臍以尿通為度俗用蔥熨法炒鹽熨法見和解門輕者用之亦效或取田螺肉蔥白豆豉等分搗如泥作餅烘熱貼臍以布縛定宣上法尿閉脹滿關格不利服藥不效者濃煎木通老蔥湯頓服數碗旋以指探吐再服再探吐以尿利為度或用炒鹽淬童便頓服探吐法甚簡便制陽光之臍治之俗醫不察輒以便秘為熱概用寒涼殺人多矣故詳言之二便俱閉總注前陰主氣後陰主血蓋膀胱之津液血所化也由氣而後能出太陰之傳送氣之運也由血而後能潤此便溺之流通見氣血之依附也清陽出上竅呼吸是也濁陰出下竅二便是也倘一息不運則機緘閉而死矣故二便不通加以腹脹氣喘嘔噦煩躁者不可治也治法凡二便俱閉形氣實者用八正散加芒硝虛者服木通散見利濕門二便俱閉腹滿脹痛者當審其所因用黑白散三化湯木香檳榔丸隨症施治俱見攻裡門下之不效按前熨吐汗三法治之淋症門總括淋者因心腎氣鬱清濁相干熱蓄膀胱而成蓋熱甚生濕則水液渾濁而為淋若冷氣滯於膀胱而作淋者十不一二分別症治於下氣淋有因肺金燥熱不能生水氣結於下致小水短澀餘瀝而出用八正散加石葦木香烏藥冬葵子見利濕門有因內傷氣虛不能運化氣結於下虛喘自汗小水淋瀝者用補中益氣湯加茯苓澤瀉桂心見理氣門血淋有因心熱遺於小腸熱結尿竅致血與尿同出莖中痛甚先服小薊飲子清之後用四物湯調琥珀滑石末常服自愈俱見理血門有因熱傷陽絡迫血妄行與尿同出脹痛血瘀者用八正散加生地鬱金行之弱者用導赤散加生地鬱金牛膝見瀉火門余按三卷尿血石淋俗名砂淋因濕熱蘊結膀胱日久煉成砂石便時莖中澀痛同尿出盡則止先用八正散加冬葵子炒桑皮利之常服琥珀散俱見利濕門膏淋膀胱氣虛濕熱凝結清濁不分故津溺同出如油如膏濕熱盛者先服八正散加蒼朮虛者服琥珀散萆薢分清飲俱見利濕門或研鹿角霜糯米粥糊丸鹽水下二丸或六一散加海金沙鹽水服勞淋有因勞苦傷氣虛損成淋及遇勞碌淋即發者用補中益氣湯加茯苓澤瀉桂心見理氣門若思慮勞心淋濁煩熱服蓮子清心飲見瀉火門有因房勞過度氣陷成淋形羸自汗虛喘心煩用補中益氣湯加益智仁萆薢見理氣門若腎虛成淋用六味地黃湯加鹽水炒益智萆薢如陰虛火動精滑淋漓久則髓枯初服知柏地黃湯俱見補養門痰淋此因七情氣鬱痰走尿竅故小便時通時秘滑白如脂莖或澀痛服三因七氣湯見理氣門風痰服青洲白丸子滌痰湯俱見除痰門冷淋此因冷氣滯於膀胱故便時先牙噤寒戰然後尿出淋瀝冷痛用附子理中湯加茯苓車前子炒小茴煎湯調琥珀末頻頻溫服見祛寒門熱淋總因熱結膀胱重者服八正散木通散輕者服五苓散琥珀散精滑蒸熱服通關丸見利濕門諸淋表裡俱熱服六一散見清暑門便濁帶下便濁因腎氣虛不能管束而小便數膀胱有熱則水道澀而清濁不分或敗精滲入胞中及服熱藥飲食痰積滲入而成主以萆薢分清飲見利濕門若因憂思抑鬱及酒色過度虛損釀成者主以蓮子清心飲見瀉火門若因腸胃濕熱釀成便濁服固本丸見收澀門小兒尿白症初起服胃苓湯見利濕門後服六君子湯八珍湯俱見補養門帶下赤帶屬熱亦有濁帶日久精竭陽虛不及化白者主以蓮子清心飲白帶屬寒亦有敗精濕瘀釀成腐化黏穢氣熱者主以萆薢分清飲赤白帶下則屬濕熱主以珍珠粉丸虛者服滋腎散俱見利濕門若赤白帶下暈睡喘嗽痰壅氣逆上盛下虛者服黑錫丹見補養門遺尿不禁總括膀胱寒虛輕者為遺尿重者為不禁遺尿者膀胱不約尿出而不自知也不禁者膀胱傳送失度知而不能自固也治法遺尿不禁及諸淋症尿色晃白皆屬寒虛寒盛用八味地黃湯加白果益智見補養門虛甚用補中益氣湯加白果益智見理氣門遺尿不禁及諸淋症尿色黃赤或渴或煩皆屬虛中夾熱服坎離既濟湯見補養門或四物湯加鹽水炒知母黃柏益智麥冬見理血門若因勞傷發熱小便自遺時或不利午前服補中益氣湯加炒山藥知母黃柏見理氣門午後服知柏地黃湯見補養門每日如此間服小解頻數而尿短少者服桑螵蛸散見收澀門余法再詳幼科婦科遺精強中總括不夢而精自遺者謂無所感於心而自遺則為心腎虛弱不固也夢與人交合而後遺者謂有所感於心相火煽而強迫之則為君相火強不固也或過欲之人日慣精滑或清氣不足下陷不固或久曠之人精盛溢泄洩或因醇酒厚味內釀濕熱火強不固皆令遺精也遺精症治如心腎虛弱精滑不能自固不夢而自遺甚者陽痿精脫日夜點滴而出當服龍骨遠志丸見收澀門兼服滋補湯見補養門如心有所慕夜多煩躁寐則夢遺此君火既動相火隨之法當治心初服黃連清心湯次服蓮子清心飲俱見瀉火門如久曠火強兼有所慕夢遺滑泄虛怯食少大便溏者服三才封髓丹若陰虛火動兩尺脈旺服知柏地黃湯俱見補養門如久曠之人火強精溢素慣遺精胃強能食大便硬者服坎離既濟湯見補養門若間或夢遺不必服藥房勞遺精見後精滑症治強中症治強中者陽強不倒精出不禁也或服房術熱藥或貪淫縱欲火併而成久則精竭陽強不化迫血而出莖痛腹疼形羸瘦死輕則發消渴大癰初起形實熱盛者服黃連解毒湯見瀉火門渴甚服茯菟丹見收澀門若陽盛陰虛強中精泄不止服大劑坎離湯精泄氣脫服補精湯強中已愈常服滋補湯俱見補養門凡陽盛者不必瀉陽只補其陰以配陽使水火均平自無偏盛之患陰痿精滑總括陰痿者謂陽物痿軟而不興舉也精滑者謂陽方興舉而精隨滑泄也用平和之劑分別調治若妄服房中術藥金石燥劑則貽害深矣治法如因清陽下陷氣怯痿滑者用補中益氣湯加鹽水炒益智萆薢五味子見理氣門肝腎虛損用八仙長壽飲加炒研益智仁萆薢如因氣血兩虛羸弱痿滑者服七寶美髯丹脾腎虛寒服還少丹火強不固服坎離既濟湯相火不足服八味地黃丸俱見補養門如因肝腎虛濕熱壅於下焦致陰痿陰汗精滑蒸熱服通關丸見利濕門心腎氣虛服龍骨遠志丸心神不安服寧神丸精滑甚服固精丸俱見收澀門以上皆平正之方聽其選用所有方家術藥一概削除附法便覽房事雜忌飽食入房脾腎俱傷血乘氣亂滲入大腸時便清血久則腹痛結為腸癖大醉入房氣竭肝傷男子精液衰耗陰痿不舉女則氣血錯亂經候不調忿怒後入房精衰氣怯多發癰疽恐懼後入房陰陽偏盛主自汗盜汗疲勞後入房氣血傷損多變五勞月事未絕入房冷氣干內身面痿黃金瘡未痊犯房勞瘡目敗壞變逆強忍小便入房主成淋疾轉胞等症癰疽未愈犯房勞瘡口破裂不治時疾未愈犯房勞舌出數寸主死再有縮陰症見前霍亂轉筋門欲冒症脫陽症見三卷中虛門附錄於此俾養生者知所顧忌云陰陽易病見一卷傷寒辨症篇養生格言抱朴子曰才不逮強思之力不勝強舉之傷也甚矣強之字真戕生伐壽之本也飲食所以養生然使醉而強酒飽而強食未有不致疾喪身者彼夫孳孳名利心力交疲死而後已非強而何航中帆曰常想病時即塵心漸滅常想死日則道念自生風流得意之事一過輒生悲涼清真寂寞之鄉愈久轉增意味汪訒庵曰人之有生備五官百骸之軀具聖知中和之德所繫非細也不加葆攝恣其戕傷使中道而夭橫負天地之賦畀辜父母之生成不祥孰大焉故內經曰聖人不治已病治未病夫病已成而後藥之譬猶渴而掘井鬥而鑄兵不亦晚乎故養生為先務也
