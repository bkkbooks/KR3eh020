body:
  text: 雜病心法集解卷四腫脹門總括經曰衛氣之在身也常然並脈循分肉行陰陽相隨何病之有若其人內傷七情外感六氣飲食失節勞役過度則邪正相攻榮衛失和衛氣與風寒之邪客於脈中則為脈脹衛氣與風寒之邪留於分肉則為膚脹也辨脈脹單腹脹膚脹鼓脹脈脹之症腹筋努起脈絡色變久而不已則成單腹脹腹則脹大而四末脫瘦清冷也膚脹之症初起皮膚脹起空空然而不堅硬久而不已則成氣鼓脹皮膚脹滿膨膨然而急硬也辨腸蕈石瘕腸蕈之症因風寒之邪不客於脈中分肉而干衛氣深入客於腸外僻而內著日以益大狀如懷子月事仍以時行名曰腸蕈風寒之邪若干營氣深入客於胞中惡血留止日以益大狀如懷子月事不以時下此名曰石瘕二症皆生於女子在男子則為疝病也治詳婦科辨水脹石水風水凡腫脹之病皮厚色蒼者皆屬氣也皮薄色澤者皆屬水也氣陽也陽性急故為脹也速每從上腫而漸下得以安臥邪在外也水陰也陰性遲故為脹也漸每從下腫而漸上更有喘咳不得臥之徵也石水之症少腹腫滿水在下故不喘也上腫曰風下腫曰水風水之症面與脛足同腫也然石水屬陰邪故曰寒結風水屬陽邪故曰熱濕凝也脈症腹脹身熱陽盛脹也若吐衄瀉血則陰亡矣四肢瘦冷陰盛脹也若瀉下不止則中脫矣腹先腫脹後散四肢者可治四肢先腫後歸入腹者不治腫脹之病多實服下利之藥旋消旋起者此為正不勝邪也腹筋青漲努起脹腫蒼黑臍腫突出陰囊腫爛缺盆脊背腫平手足心腫平則五臟皆傷均屬不治脈大而時絕或虛細或微澀氣血兩敗也陰分腫脹皮色慘白便溏不渴小便清利或秘脈必沉遲忌細澀無神陽分腫脹皮色或黃或赤口渴多煩尿澀糞燥脈必沉數忌大而時絕經曰脈大兼以澀者脹也關上脈浮則為內脹脈遲而滑脈盛而緊者皆脹也腫脹之脈浮大洪實來去有神者易治易愈治法治脈脹初起腹筋努突脈絡色變服木香流氣飲加川芎薑黃見理氣門治單腹脹腹中脹滿堅硬四末脫瘦清冷者服厚朴散見利濕門治膚脹初起皮膚腫脹空空然而不堅硬者服木香流氣飲治氣鼓脹脹滿如鼓膨膨然束緊急硬服厚朴散余按後總治法凡單腹脹氣鼓脹二症又當分氣血施治如屬氣實作脹故宜厚朴散若屬血實作脹俱宜下瘀血湯攻下之見理血門治腸蕈原屬氣病初起服厚朴散通利之見利濕門治石瘕原屬血病初服下瘀血湯攻下之余法詳考婦科一卷以上治脹滿六症之主方余按後總方及水腫門選方施治總方通治寒熱濕痰食氣諸腫脹初起形氣虛而屬寒者服寒脹中滿分消湯若形氣虛而屬熱者服熱脹中滿分消湯若成蠱脹服治蠱脹方若腹脹發熱陽邪並陰則陽實而陰虛陽盛則外熱陰虛則內熱脈浮數便秘者服枳實分消湯中寒脹滿脈浮滑者服樸香散老弱虛寒腫脹脈弱者服溫中湯以上均見利濕門若食積痰氣濕鬱諸腫脹服香砂和中木香順氣養親等湯見理氣門水腫門總括水腫之症屬脾肺二經水停胸中則喘水停膈下則脹從上腫者多外感風邪名風水腫治宜發汗從下腫者多內生濕邪名濕水腫治宜利水通身腫者屬風濕兩傷名風濕腫治宜汗利兼施腫而喘不得臥宜逐肺飲腫而脹滿便秘宜攻脾水腫從腹起後散四肢者易治腫從四肢起漸歸入腹者難治又有陽水陰水之分陽水屬實與濕治宜攻瀉陰水屬虛與寒治宜溫補分別症治於下忌食酸鹹百日風水腫自頭面兩手胸背腫至腰止惡寒無汗骨節脹疼脈浮緊者先服越婢加蒼朮汗之見利濕門若兼外感內傷發熱頭痛嘔逆咳嗽喘滿氣脹脈浮緩者只用杏蘇飲加蒼朮桂枝大腹皮桑白皮生薑皮見表裡門經所謂開鬼門是也濕水腫自腰起腫至下身兩足止腰腹腿足脹痛重墜小水短赤脈沉澀有力者用貼臍餅三法服沉香琥珀丸形氣虛者難任峻利只用五皮飲或五苓散俱加蒼朮防己苡仁木通車前子緩緩施治俱見利濕門經所謂潔淨腑是也風濕腫頭身手足遍體腫脹乃因內停濕飲外感風邪風濕相搏水道不利外攻肌表而作也腫甚脹急煩渴便秘脈症實者宜外散內利兩解之峻劑服疏鑿飲子形氣虛者難受峻劑服茯苓導水湯五子五皮飲或用胃苓湯去甘草白朮加檳榔木瓜大腹皮桑白皮以上俱見利濕門胃苓湯加減法去甘草白朮恐助滿也加腹毛桑皮木瓜檳榔以消腫如惡寒無汗加麻黃葛根喘急加杏仁蘇子葶藶喘咳加蘇莖葉兼頭痛加羌活防風葛根足重冷脹加防己附子身痛加五加皮尿秘加木通麥冬車前子脹甚加枳殼香附草果通治風濕水腫陽水因濕熱內郁水道壅塞外攻肌表致外腫內脹發熱煩渴尿赤便秘等症濕偏盛者腫滿脹急身肢重墜難於轉側其色黃亮主以舟車丸熱偏盛者腫脹兼痛黃赤便燥主以浚川散俱見利濕門治陽水輕症可服沆瀣丹見攻裡門陰水因脾虛不能制水腎虛不能主水致外泛作腫內停作脹腫色暗而便利脾虛水腫必食少便軟不熱不躁肢冷脈微主以實脾散見利濕門虛水腫其症足脛冷硬尿秘便溏尺脈微弱服金匱腎氣湯見補養門如陰水初起身冷怯寒脈沉遲者用平胃散見消導門加白朮茯苓木香藿香炮薑草果腫脹日久服金鯉魚湯麥門冬湯俱見利濕門附法凡患大病之後脾虛變生浮腫脈細弱者主以香砂六君湯見補養門加味法脈症虛寒加丁香炮姜如只胸腹腫脹按之卻軟彈之如鼓鳴者去甘草加神麯厚朴腹毛若腫硬如石膏按前單腹脹治之脾胃虛寒腫脹及客寒犯胃作痛服調中健脾丸溫中湯見利濕門總注曰腫脹之病屬虛寒者宜服諸溫補藥若服之不效虛中必有實邪也欲投攻下之劑體卻難堪然不攻之邪終不退須行九補一攻之法先服補養之藥九日而一日用瀉下之藥攻之初宜少少與服要在審其元氣與藥相當其後或七日一攻五日一攻三日一攻緩緩取效瘧疾門總括經曰痎瘧皆生於風謂四時病瘧未有不因風寒外束暑邪內攻者又曰瘧者風寒之氣不常也此言比時病瘧者也又曰夏傷於暑秋為痎瘧又曰夏暑汗不出者秋成風瘧謂夏傷於暑其邪甚者即病暑其邪微者則舍於營復感秋氣寒風與衛並居則暑與風寒合邪始成瘧病也其不即病傷寒者亦以有暑邪預伏於營中也蓋有風無暑惟病風有暑無風惟病暑必風暑合邪始病瘧也日作間作瘧氣之邪伏藏於營隨其經絡循脊膂之表而下此初病邪淺傳舍之次也其邪深者則入脊膂之內伏注於衝脈橫連諸經脂膜之原內及臟腑此邪漸深傳舍之次也衛氣者一日一夜周於身每至明旦則出足太陽睛明穴大會於風府穴腠理乃開開則所客營衛之邪入邪入得陰內搏則生寒得陽外出則生熱內外相搏邪正交爭而病乃作也病初邪淺者衛行未失常度其邪日與衛會故每日發瘧也病久邪深者衛行遲失其常度其邪不能日與衛會故間日發瘧也又有間二日三日或間數日瘧發作者亦因衛氣行愈遲會愈遲所以發作愈遲也晝作夜作營氣循經而行脈中衛氣不循經而行脈外惟日行於三陽夜行於三陰故邪在三陽之淺者則晝發邪在三陰之深者則夜瘧發邪將退者由夜發退為晝發此為去陰就陽病欲愈也瘧邪漸進者晝發進為夜發此為去陽入陰病益盛也早作晏作衛氣流行每日平旦會於風府而邪氣中人從頭項歷風府下循背腰日下傳脊之第一節邪與衛會日晚故瘧發益晏也邪傳下極沖其氣復上行邪與衛會日早所以瘧發益早也辨脈經曰瘧脈自弦蓋瘧為寒熱之病弦為少陽之脈少陽主病寒熱往來屬半表半裡之界故瘧脈自應得弦象也弦遲多寒弦數多熱弦短傷食弦滑痰飲理自然也若得代脈散脈邪尚未解正氣先衰命難生矣又曰弦而緊者宜下浮大而弦者宜吐弦而遲者宜溫治瘧之大法也治法瘧疾初起表實者汗之裡實者下之胸滿嘔逆有飲者吐之表裡俱清宜用和解清解不愈表裡無症可用截藥久瘧不已形羸氣虛又當補養也寒瘧此因先傷於寒後傷於風先寒後熱寒多熱少脈浮緊無汗者初起服麻黃羌活湯汗之見發表門汗吐下後余按後附法施治風瘧此因先傷於風後傷於寒先熱後寒熱多寒少脈浮有汗者初起服桂枝羌活湯汗之見發表門余方按後附法風寒瘧此症寒熱兩平不多不少不先不後脈浮而數初起服麻桂各半湯汗之見發表門汗少熱微寒多者倍用麻黃湯汗多寒少熱平者倍用桂枝湯和之汗多熱多更加石膏末食瘧此因飲食所傷復受風暑之氣致寒熱交作胸腹痞悶面黃惡食噫氣吐酸右關氣口脈來弦緊主以柴平湯見和解門氣實加檳榔草果如食瘧腹脹便秘脈弦數者服大柴胡湯兩解之見表裡門痰飲瘧此因素有痰飲復感外邪凝滯脾胃致嘔逆痰涎熱多寒少或往來寒熱口苦咽乾小水赤澀弦滑者服清脾飲見和解門隨症加味若痰飲壅盛胸滿嘔逆氣閉不通先服常山方吐之見湧吐門溫瘧此因先傷於風後傷於寒先熱後寒或但熱無寒骨節焮痛煩渴嘔苦服白虎湯清之若汗多脈浮服桂枝白虎湯兩解之見瀉火門瘴瘧此因陽氣盛陽獨發但熱而不惡寒也主以柴胡白虎湯見瀉火門牝瘧此因陰氣盛陰獨發但惡寒而不發熱也服柴胡合桂枝湯見和解門以上諸瘧若兼裡熱便秘脈實者俱服大柴胡湯清解之見表裡門虛瘧久患瘧疾形氣俱虛脾胃皆弱不思飲食者服四獸飲見補養門或用補中益氣等湯隨症施治俱見理氣門勞瘧久病勞損氣血已虛復感時氣而病瘧者用十全大補湯倍加鱉甲見補養門熱盛者去黃耆肉桂加柴胡黃芩痎瘧瘧母痎瘧經不愈之老瘧也瘧母患瘧日久腹中結成塊癖也形氣實者先用控涎丹攻之見除痰門或用化滯丸攻積滯見攻裡門攻下之後按後附法調治三陰瘧疾發在夜間天明即退初起發熱惡寒主以麻桂柴胡四物湯見和解門鬼瘧發在夜間雖與三陰瘧疾相同此由屍氣注之夜多惡夢心常恐懼為異主以蘇合香丸截瘧七寶飲俱見和解門暑瘧暑月發瘧有陰陽虛實之分當從三卷中暑門審症施治如二香飲之類皆治暑瘧之標劑見清暑門癉瘧凡山嵐瘴氣及時行疫氣其邪中人皆令成瘧初起形氣實者宜汗利和三法兼行服三解湯若不愈服卻瘴湯藿香正氣散俱見和解門附法凡治瘧疾已施汗吐下三法表裡已清邪不即解者宜用和解之法主以清脾飲隨症加味見和解門凡瘧已按前汗吐下和施治表裡已清其邪不解又發過三五次法當截之用柴胡截瘧飲密陀僧散常山飲均見和解門凡用截藥最要及時如表裡未清而早截之則邪必復發反留連而難治若表裡已清瘧久而不截之則正衰而日憊矣凡久瘧脾胃俱虛常服四獸飲氣血兩虛用八珍湯十全大補湯均加煨研草果烏梅見補養門血虛服地骨皮飲見理血門氣虛用補中益氣湯升陽益胃湯均見理氣門凡瘧正發作之時勿遂服湯藥飲食恐其助寒助熱壅閉瘧邪也當於將發未發之時服藥則效至若食飲須後寒熱退後方可與之否則中脘多蓄黃水久則成癖口渴忌飲冷湯生薑陳茶煎湯少少溫服最妙陳米炒黃煮粥瘧後溫飲食最妙霍亂轉筋總括霍亂者因風寒暑熱飲食生冷之邪雜揉交病於中正不能堪一任邪之揮霍撩亂故令三焦混淆清濁相干亂於腸胃也表甚則有頭痛身痛發熱惡寒之症里甚則有嘔吐瀉利腹中大痛之症寒甚則轉筋縮陰厥逆冷汗暑甚則大渴引飲不已各有所因也濕霍亂此因風寒暑食水飲雜揉為病卒然揮霍變亂心腹大痛吐瀉交作夫暑飲雖盛得經吐瀉邪當自解此症易治初起表盛者服藿香正氣散若濕盛則瀉多內加蒼朮食滯加炒神麯麥芽山楂方見和解門如暑盛則吐多服二香飲暑熱盛則渴飲服益元散俱見清暑門或服甘露飲見瀉火門乾霍亂此因寒暑凝結心腹絞痛欲吐不能吐欲瀉不得瀉俗名絞腸痧蓋寒盛則凝不得吐瀉邪無去路若兼舌卷筋縮卵陰入腹則難治矣初起用探吐方以開關見湧吐門次審其暑甚寒甚分別用藥如用前方幸得吐利其人渴飲小水赤澀脈沉有力者此屬暑濕內結也主以甘露飲見瀉火門若系寒盛凝結不得吐瀉絞痛不渴手足厥冷脈伏不見者用理中湯加炮附子川烏見祛寒門霍亂轉筋傷寒論注曰寒則轉筋入腹厥逆冷汗又曰舌卷筋縮則卵陰入腹難治是知霍亂轉筋因宗筋被邪收引多屬寒症然亦有熱爍宗筋而成者見厥陰篇至平常老弱人偶犯風濕腿足轉筋少頃即愈此屬輕症縮陰一症縮陰寒症厥陰篇注曰厥陰主宗筋外腎為寒收引男子陰縮入腹女子陰器收束兩乳縮入胸中脈微細肌膚冷四肢厥逆煩躁難安舌短縮苔不幹而色黑是寒陰臟厥也先服當歸四逆湯次加吳萸生薑再服見祛寒門若系霍亂轉筋雖有前症只用理中湯加茯苓附子桂心陳皮兼服豆淋酒俱見祛寒門如夾表邪用藿香正氣散加木瓜吳萸見和解門治縮陰寒症初起臍腹脹痛逆冷者搗爛大蒜鋪臍周圍及氣海穴間多搓艾丸排列蒜上齊點火灸七壯或再灸會陰穴熱盛忌灸又方取鵝鴨蛋連殼煮熟尖上去殼以竹筋插孔納鹽入內正頂臍心輪流揉按氣通自出或搗薑蔥和鹽炒熱用布二塊輪流包熨臍腹凡腎莖縮入急用竹戥盒夾住龜頭以箍扣緊勿令盡縮隨用前後方藥如婦人陰器束緊脹痛研胡椒乾薑末各二錢唾津調塗本人手掌心上隔薄綿令以掌覆按陰戶側臥片時氣通自愈枯礬調塗亦效如婦人兩乳收縮脹痛令人以手牽乳頭按向兩旁搗薑蔥炒熱用布二塊輪流包熨胸腹若系熱灼宗筋乳縮陰緊只用炒鹽推熨一方研硫黃胡椒末酒調服一錢又方樟腦末酒下一錢俱治寒症縮陰熱症厥陰篇注曰厥陰邪從陽化熱熱灼宗筋男子陰縮入腹女子陰束乳收舌卷而苔乾焦消渴恣飲大小便秘熱氣撞心用承氣諸湯瀉陽救陰若霍亂熱灼宗筋雖有前症脈實有力只用六一順氣湯俱見攻裡門如陽熱尚微界在疑似只用四逆散疏通其陰見祛寒門當服陰陽湯外用鹽湯探吐法見湧吐門炒鹽熨之忌灸法溫補藥噎膈翻胃總括總由胃腑小腸大腸三陽經熱結不散灼傷津液而成胃之上口為賁門小腸之上口為幽門大腸之下口為魄門二腑津液即傷三門自然乾枯而水穀出入之道不得流通矣賁門乾枯則納入水穀路狹隘故食入反出而為翻胃二症留連日久則大腸傳導之路狹隘故魄門自應燥澀而難行也胸痛如刺胃脘傷也便如羊屎津液枯也吐沫嘔血血液不行皆凶症也脈略脈浮為虛滑屬痰飲是為順脈若沉數細澀則為氣少液竭而難治矣又曰嘔噎宜滑數反胃宜浮緩呃逆脈結或促或微皆可治忌弦緊代散治噎膈治噎膈初起胸中不利大便燥結痰嗽喘滿脾胃壅滯脈浮滑者先宜推陳致新服人參利膈丸表裡氣盛服加味正氣散俱見理氣門治五噎氣噎心下悸上下不通噦噫不徹胸脅苦痛憂噎心悸動手足厥逆天際若冷勞噎苦氣膈脅下支滿胸中填塞四肢冰冷食噎食無多少胸膈膨脹不得喘息思噎心悸善忘目視慌張俱服五噎丸見理氣門胃脘枯燥食下梗痛服韭汁牛乳飲見潤燥門治諸噎氣滯服順氣消滯湯木香流氣飲大便燥結服橘杏丸氣虛兼寒服丁香柿蒂湯俱見理氣門治噎久氣虛用六君湯加丁香見補養門面枯氣噎用四物湯隨症加味見理血門兼痰飲用二陳湯隨症加味見除痰門賁門乾枯用膈噎諸方熱結噎甚服五汁飲俱見潤燥門治翻胃治三陽熱結灼傷津液幽門乾枯腐化道路狹窄食入反出初起形氣實者當清其燥結服大黃湯見攻裡門治積熱反胃大便燥結服橘杏丸若兼食積服保和湯如初起表裡氣實喘渴脹滿服加減正氣散俱見理氣門治胃脘有死血乾枯燥結食下作痛反胃吐食大便燥者常服韭汁牛乳飲下脘不通者服通幽湯俱見潤燥門附法凡反胃兼吐痰飲者用二陳湯隨症加味見除痰門日久氣虛用六君八珍等湯隨症加味見補養門血虛血枯用四物加味或人參養榮湯見理血門嘔吐噦氣總括古人謂嘔屬陽明有聲有物氣血俱病也吐屬太陽有物無聲血病也噦屬少陽有聲無物氣病也李杲謂三者皆屬脾胃虛弱潔古又從三焦以分氣積寒之三因然皆不外諸逆上衝也脈略脈浮為虛脈滑為痰滑數主嘔不宜澀促又曰脈沉數或細澀而色青爪甲黑中痛不止肢厥不回皆逆症也治法凡嘔吐症湯藥到咽即吐者先用重墜藥鎮之旋進湯藥主以硫汞散見湧吐門一方取黃土和鹽少許搓三大丸煅紅淬水頓服立止又方研灶心土末水糊作挺子塞兩鼻孔旋服諸藥可不再吐治一切痰飲嘔吐用二陳湯隨症加味治氣盛嘔痰服陳皮半夏湯治水氣嘔吐噁心服小半夏加茯苓湯治乾嘔噦四肢厥冷湯俱見除痰門治外感風寒內傷飲食寒熱嘔吐諸症主以藿香正氣散隨症加減治膽熱發咳嘔出苦水服黃芩半夏生薑湯乾嘔下利服外臺黃芩湯治傷寒口渴得食則吐服乾薑黃芩黃連湯俱見和解門治積滯嘔吐心胃痛甚形氣實者服化滯丸沆瀣丹見攻裡門治三陽熱結灼傷津液胃脘乾枯致嘔噦不已服五汁飲見潤燥門治虛熱作吐服竹葉石膏湯見瀉火門渴飲而吐服五苓散見利濕門治久病脾胃俱虛見食即吐服比和飲虛吐酸苦服保中湯見理氣門治中寒嘔吐厥冷腹痛服附子理中湯見祛寒門余法按前傷寒辨證治胃虛嘔吐服香砂六君子湯見補養門治噦氣同後呃逆呃逆噯噫總注格格連聲曰呃逆氣從臍下來自衝脈而出口也其聲噦噦曰噦氣從胃裡來而出口也噯氣因飽食氣急比時作噯而轉食氣也噫氣因傷食越時作噫而吐臭氣也四症皆屬氣逆治同呃逆治法治傷寒汗吐下後心下痞硬噫氣噯氣均服代赫旋覆湯治因久病之後胃中虛寒呃逆噯噫噦氣服丁香柿蒂湯治因吐痢之後胃氣已虛膈熱呃逆噯氣服橘皮竹茹湯治因飽食之後氣逆呃噎噫噦噯氣不止服順氣消滯湯治胃虛夾熱有前症者服保中湯久病見食即呃噦者服比和飲治久病元氣困敗胃氣與丹田之氣不相接續而成前症者服補元湯治年老虛人有前四症兼無脈者服復脈散以上均見理氣門兼太陰手足自溫症服丁萸理中湯若兼少陰手足厥冷之症前湯加炮附子見祛寒門治前症腹滿便秘氣實者服六一順氣散見攻裡門治前症口渴自汗小便赤澀者服四苓散見利濕門治前症因痰飲阻礙胸滿暈眩服導痰湯見除痰門治因腎虛不能攝衝脈之氣歸原者用都氣湯加牛膝見補養門吞酸吐酸治六郁為病痞滿吞酸服越鞠湯痰火氣食膈熱吞酸均服清郁湯噫氣吞酸服和中丸見理氣門宿食噯臭吞酸服平胃散見消導門治食滯吐酸服保和丸見消導門胸痞噫氣吐酸服枳桔湯見瀉火門鬱積吐酸服茱蓮丸醋心吐水服吳萸丸均見理氣門泄瀉門總括泄瀉一症古分為十六種要其症有名異治同者茲逐一分疏以出其治毋令學者目迷五色云脈症泄瀉裡虛脈宜沉小滑弱若形已衰而脈反實大浮數則身必發熱而成惡候泄利忌五虛謂脈細欲絕皮膚逆冷息氣出多入少胃損水漿不入肛門如筒下瀉不禁五虛見一二症者可治見三四症則難醫矣濕瀉濕瀉與濡瀉水瀉同皆因傷濕作瀉也蓋脾胃濕盛致清濁不分瀉下多水小便黃澀身體困重面黃懶食三者皆腸鳴而腹不脹痛寒瀉寒瀉寒盛於中也洞瀉洞直傾下也二症治同有因遇食生冷寒氣凝結致面色淡白四肢逆冷瀉下澄清糞如鴨屎之溏直傾注下腹似雷鳴腹常冷痛脈必沉遲主以附子理中湯見祛寒門飧瀉飧瀉食後即瀉完穀不化土衰木盛清氣不升也主以升陽益胃湯見理氣門余按附法脾瀉脾瀉脾虛腹滿飲食不化或黏或硬糞色純黃也主以參苓白朮散見補養門余按附法腎瀉腎瀉腎氣虛寒每至早晨行瀉數次服二神丸四神丸見祛寒門食瀉食瀉與胃瀉同因傷食作瀉氣臭稠黏噫氣腹痛若脹滿便秘形氣實者用諸承氣湯或化滯丸見攻裡門如形氣虛惡食吐瀉服保和丸食瀉兼痰濕用平胃散加味食瀉兼飲服枳朮丸俱見消導門飲瀉飲瀉渴而飲飲而瀉瀉而復渴渴而復瀉瀉渴相因也脈症實者服舟車丸逐飲形氣虛者用五苓散加滑石石膏甘草梢見利濕門痰瀉痰瀉時或瀉時或不瀉瀉無定期也形氣實者服蘇葶滾痰丸之類若酒食生痰服順氣消食丸俱見除痰門虛者服六君湯見補養門火瀉火瀉瀉一陣痛一陣反復瀉痛暴注下迫也若脈促喘汗服葛根芩連湯見表裡門輕者服四苓散見利濕門暑瀉暑瀉因傷暑作瀉口渴自汗心煩面垢也暑瀉渴甚服香薷葛根湯輕者服青六散吐瀉交作者服縮脾飲俱見清暑門滑瀉滑瀉謂諸瀉日久腸胃滑脫不能自禁也宜八柱散訶子散見收澀門若腎虛五更滑瀉用八味地黃丸加吳萸故脂五味肉蔻見補養門附法凡胃強脾弱能食而不得化食後腸鳴腹痛飧瀉暴注完穀不化者常服消食健脾丸脾瀉不思食服開胃進食湯俱載消導門凡酒病滑瀉尿澀食少胸滿腿足漸腫服金匱腎氣湯見補養門口糜下瀉其症上發口糜下瀉即止口糜方愈則又下瀉觀其上下相移之情狀亦必純實熱之所為也心之竅開於舌脾之竅開於口心脾之熱故上發口舌瘡赤糜爛胃主消化水穀小腸主盛受消化心脾之熱下移小腸胃腑則運化之職失故下注泄瀉也治法口糜發時晚用瀉心導赤散煎湯溫服見瀉火門或用導赤合五苓散若下瀉時早晚服參苓白朮散加糯米見補養門或服七味白朮散若小水甚少便瀉不止此為水走大腸用茯苓車前子等分煎湯代茶若口糜日久服涼藥不效者則為虛火上炎主以理中湯見祛寒門內加肉桂重加茯苓以降陽利水陽降而口糜自消水利而下瀉自止痢疾門總括古名大瘕瀉者裡急後重數至圊而不能便莖中痛也小腸瀉者尿澀而便膿血少腹痛也大腸瀉者食已窘迫大便色白腸鳴切痛也腸癖者飲食不節起居不時陰受之則入五臟腫脹閉塞下為飧瀉久為腸癖腹痛下血也滯下者積滯垢膩與濕熱滯於腸中因而下也此皆古痢之名也要之痢疾裡急者腹痛積滯也後重者下墜氣滯也小便赤澀濕熱鬱滯也皆因外受風暑濕蒸之氣內傷生冷飲食過度而生也白痢自大腸來大腸與肺為表裡肺主氣故屬傷氣也赤痢自小腸來小腸與心為表裡心主血故屬傷血也閉痛甚寒開痛微痢開病減故痛微也虛者少氣氣無壅滯故亦痛微也熱者多實性急不得舒通故窘痛甚也後墜下迫肛門糞出墜止為糞前墜乃滯也故曰實墜糞出更墜為糞後墜非滯也故曰虛墜初痢多屬濕熱久痢多屬寒虛也脈症凡下利不止水漿不入氣少脈細皮膚寒冷死於陽絕也下利純血噤口嘔逆中無臟氣身熱脈大死於陰絕也脈宜微小忌浮洪宜滑弱忌弦急又曰沉小滑弱為順實大浮數為逆噤口痢噤口痢者下利不食或嘔不能食也因裡熱盛毒上衝心口噤作嘔脈大身熱而赤唇紅呃逆飲冷不能食而痢甚初服大黃黃連湯任攻者煎黃連開噤散徐徐與服效俱外貼王瓜藤散俱見瀉火門或搗田螺入麝少許作餅貼臍以布縛定若老弱虛寒人患此者用參苓白朮散加石蓮肉菖蒲木香見補養門噤口嘔逆燒紅稱錘淬醋中張口吸氣嘔逆自止旋進湯藥暑夾表症當先解表然後攻裡初服倉廩散汗之見發表門寒痢因寒冷傷胃痢時腸鳴切痛瀉下清冷面唇青白口渴飲熱氣乏脈微先服理中湯見祛寒門痢甚加附子訶子砂仁常服薑茶飲見和解門若痢久滑脫服養臟湯見收澀門日久氣陷服補中益氣湯見理氣門熱痢因濕熱結於腸胃腹中窘痛裡急下痢膿血稠黏尿赤澀痛口渴飲冷舌赤唇焦用芍藥湯隨症加味見理血門或服四制丸沆瀣湯見攻裡門輕者服白頭翁湯香連丸俱見瀉火門或服海藏方梅蜜飲見和解門時疫痢因患痢時忽感時疫亦有氣候相傳者若熱為邪束惡寒無汗發熱嘔逆身痛頭疼下利脈浮先服倉廩湯汗之見發表門次按熱痢清裡諸方法若疫痢汗後表邪已解裡熱尚深煩躁脹痛形氣實者隨服香連化滯湯汗下後痢仍不止白痢服白朮和中湯赤痢服加味補血湯俱見理血門風濕痢風痢似腸風下血只多墜痛也濕痢治同風痢但不甚痛只多重墜也二痢初起用胃風湯東垣方當隨人虛實選用俱見祛風門若濕熱太盛先服香連平胃散見消導門水穀痢此因脾胃虛腐化不及清濁相干痢下水穀腹或脹痛而成此症如初起水穀糟粕與膿血雜下者主以調中益氣湯見理氣門若日久不止用六君子湯加蜜耆木香炒砂仁山藥見補養門休息痢其痢時發作時停止也五色痢五色膿血相雜而下也二症皆因用止澀藥太早邪尚稽留腸胃間或因滯熱內蘊下之未盡餘邪不時發作而成休息清濁混淆而成五色倘見臟腐屍臭之氣者死二症脈若有力雖日久仍當用香連化滯湯攻之倘脈症不實用和中補血地榆三湯隨症調理均見理血門形氣虛者按補養門治之附法凡痢初起有寒熱表症者當先解表然後攻裡用倉廩湯見發表門凡初起裡熱太盛上衝心者先攻其里用大黃黃連等湯見瀉火門凡初起外無表症內熱亦輕者法宜和解用芍藥湯之類見理血門凡痢攻下後病勢大減宜調氣血服香連和胃和中等湯見理血門凡久痢臟有寒熱不分者服烏梅丸調之見殺蟲門虛寒宜用溫補凡久痢服補養藥不效者必初起止澀太早邪熱稽留按前休息痢治之黃疸門總括面目身體皆黃但欲安臥小便黃渾者此黃疸病已成如已食如飢食難用飽飽則心煩頭眩此欲作胃疸也胃疸者即谷疸也若已見黃色疸已成得之於胃有濕熱故大飢過食也酒疸者得於之飲酒無度而發疸也女勞疸者疸而額黑少腹急小便自利得之於大勞大熱與女交接也瘀血發黃亦少腹急小便自利但額不黑為異耳見傷寒二卷辨症門黃汗者汗出色黃染衣皆黃也面目微腫得之於素有濕熱汗出入水洗浴而成此皆屬濕熱為病惟陰黃則屬濕寒陰黃者身重而痛厥冷如冰不與陽黃同其治法矣脈症仲景曰黃疸之病當以十八日為期治之十日以上宜差反劇為難治也色若煙燻目神青暗陽黃死症也喘滿渴煩不已心胸如啖蒜刺痛黃毒入腹死症也面色黧黑冷汗漐漐陰黃死症也天行癘疫發黃名曰瘟黃死人最暴也要之症屬濕熱脈宜浮大洪數微澀細弱鼻息氣冷者難治經曰凡黃候寸口脈近掌無脈口鼻黑色並不可治陽黃屬胃腑濕熱黃亮身溫唇紅口渴尿赤脈洪初起表實無汗者服麻黃茵陳湯汗之裡實便秘者服茵陳蒿湯下之表裡俱實者服當歸拈痛湯兩解之若表裡無症只小便短澀者服茵陳五苓散俱見利濕門傷寒身黃髮熱服梔子柏皮湯見湧吐門陰黃屬脾腎寒濕暗黃身冷唇白不渴便利脈遲初起腹痛或嘔者服茵陳理中湯溫之兼下利清穀肢冷腹痛脈沉細者服茵陳四逆湯見祛寒門陰黃初起者大便溏小便秘者服茵陳五苓散利之見利濕門胃疸胃疸即谷疸也面目純黃已食如飢食難用飽飽則心煩頭眩此因胃腑濕熱發蒸如外也主以胃疸湯見利濕門酒疸酒疸因飲酒無度濕熱鬱久而發黃心中懊憹時或熱痛形氣實者先服梔豉大黃湯見湧吐門虛者服茵陳解酲湯見消導門女勞疸女勞疸因大勞大熱候與女子交接致發黃疸額黑尿利而小腹拘急形氣實者服石膏散虛者服腎疸湯俱見利濕門黃汗疸研蔓京子末水調二錢日三服尿白則愈或服加味玉屏散見利濕門積聚門總括五積六聚之名本乎難經五積者肥氣伏梁痞氣息賁奔豚由屬五臟之陰所生發有常處不離部位是為血病也六聚者積之著於孫絡緩筋募原膂筋腸後輸六處也屬六腑之陽所生發無根本忽聚忽散是為氣病也五積脈宜伏結忌緊小六聚脈宜浮結忌沉細七症八瘕之名載千金方七症者蛟蛇鱉肉發蝨米也成塊不移而可見類積痃而症則屬氣病八瘕者青黃燥血脂狐蛇鱉也推之活動無定類聚癖而瘕則屬血病腸蕈者積在外狀如懷子月事以時而下石瘕者積在胞中狀如懷子月事不以時下也痃者外結募原肌肉之間屬淺病癖者內結隱僻膂脊腸胃之後屬深也以上八症皆得之於喜怒不節則傷臟飲食過飽飽則傷腑腸胃堆滿汁液外溢外寒與氣血凝結而成但婦女患此者多故諸症治特詳婦科治法積聚宜攻然必胃強能食方可攻之若虛人須兼補藥或三補一攻五補一攻攻邪而不傷正養正而不助邪方為合法後錄諸方聽其選用凡攻氣食積癖用化滯丸見攻裡門攻血積血瘕用桃仁煎見攻裡門攻痰飲積聚用控涎丹見除痰門攻癥瘕癖積用破積丸見攻裡門通治以前八症形氣實者用三稜煎一塊氣保安丸俱見攻裡門治八症形氣虛者用保合丸化堅湯大七氣湯開鬱正元散烏藥散分心氣飲俱見理氣門五積之中惟奔豚最惡若更發作正虛難支如從少腹攻起氣上衝喉神色昏怖皆屬逆症宜以奔豚方奪命湯見理氣門八症治法婦科一卷已詳言之茲難備載疝症門總括經曰任脈為病男子內結七疝女子帶下瘕聚瘕聚即女子之疝也七疝主任者原以任脈起中極循腹裡也七疝主肝者蓋以肝經脈過腹裡環陰器也是以諸疝無不由是二經主之如少腹痛引陰丸氣上衝心不得二便者為沖疝少腹痛引陰丸肝之逆氣衝胃作吐者為厥疝少腹之氣不伸左右症塊作痛者為瘕疝臥則入腹立則出腹入囊似狐之晝則出穴而溺夜則入穴而不溺者為狐疝少腹痛引陰丸橫骨兩端約紋中腫如黃瓜內有膿血者為腹痛引陰丸小便不通者為癃疝少腹不痛陰囊腫大頑硬者為㿗疝此七疝之症也有又血疝即便毒魚口瘡也氣疝即睪丸偏墜也筋疝即下疳瘡也水疝則尿閉不通胞疝即膀胱氣沖疝似小腸氣而更連腰痛也治法疝病在左邊睪丸者屬血分在右邊睪丸者屬氣分凡寒則收引而痛甚熱則形縱而痛緩濕則腫而重墜而虛亦腫墜但輕輕然而不重也治中寒冷疝陰丸收引痛甚脈沉遲者服當歸溫疝湯治外寒內熱陰丸入腹脹痛脈弦數者服烏頭梔子湯治因醇酒厚味內釀濕熱成疝不謹房勞致感外寒成疝服十味蒼柏散治膀胱氣及水疝尿閉不通用茴楝五苓散交加湯治血分寒疝或臍腹連脹痛服當歸羊肉湯豆淋酒治㿗疝腹不痛只陰囊腫脹頑硬服雲林方木腎方治狐疝睪丸臥則入腹立則入囊服茴楝丸雲林方治因著驚腎莖睪丸縮小入腹用貼臍方服豆淋酒治疝初起寒熱不分者服交加湯小腸奔豚膀胱偏墜俱服七疝湯治氣疝走注墜痛服青木香丸疝氣方導氣湯天台烏藥散治四種㿗疝服橘核丸囊縮入腹服烏附湯暑月疝氣服暑疝方寒月疝氣服寒疝方以上諸方見祛寒門治沖疝少腹痛引陰丸氣上衝心不得二便厥疝少腹痛引陰丸肝氣上逆沖胃作吐及奔豚氣上衝喉肢冷神色昏怖均服奪命湯治左右偏墜已服木香丸之類久而不消此屬氣虛用補中益氣湯加桂心酒炒黃柏知母以上二方見理氣門治老人虛人偏墜日久屬腎虛者用六味地黃湯見補養門加枸杞桂心巴戟炒故脂偏墜腫痛研槐米末鹽酒每調二錢日三服治瘕疝少腹氣鬱左右有症塊攻痛及血疝結聚外生便毒初起俱用大黃皂刺湯攻下之見攻裡門余法再詳婦科一卷凡疝初起宜灸大敦穴各三壯穴在足大指甲後聚毛處頭痛門總括因風而痛頭暈目眩謂之頭風則因熱而痛心煩口渴因氣鬱而痛暈則志意不伸因痰飲而痛暈則嘔吐痰涎因濕而痛暈則頭重不起因虛而痛暈動則更痛更暈也真頭痛痛連腦內手足青冷至肘膝之節朝發夕死凡頭痛時時昏冒及頭目卒然大痛目視物不見皆凶症也脈症頭痛之脈風浮寒緊濕細暑虛痰飲弦滑熱數食洪皆主脈也若初起短澀微濡氣血已虛更兼無神腦中劈痛心神昏憒此真頭痛矣治法頭風初起法宜取嚏兼熱者嗅蓽茇散兼濕者嗅二寶散兼痰者嗅三聖散風盛者嗅碧雲散俱見湧吐門外用貼穴法見發表門治偏正頭痛風濕熱盛服清空膏風熱上攻服獨活散俱見祛風門偏正頭風暈痛兼有濕熱脈浮洪數主以芎芷石膏湯隨症加味頭風兼表熱服川芎茶調散頭目脹痛風兼痰火一切頭痛主以清上蠲痛湯隨症加減以上俱見發表門治風痰頭痛暈眩嘔瀉服青洲白丸子痰厥暈痛服半夏天麻白朮湯頭目暈眩用清暈化痰湯隨症加味頭痛風眩常服都梁丸痰火痛用清熱化痰湯加川芎桔梗痰飲暈痛用二陳湯加味食痰痛服順氣消食丸熱痰攻痛服諸滾痰丸以上均見除痰門治血虛頭痛主以四物湯兼風加芥穗薄荷羌活天麻熱加炒芩連血虛暈眩加酒炒芥穗寒熱往來加酒炒條芩柴胡俱見理血門治氣虛頭痛主以補中益氣湯氣逆頭痛服蘇子降氣湯見理氣門氣血均虛主以十全大補湯陰陽不升降主以黑錫丹見補養門真頭痛真頭痛痛連腦內手足青冷脈沉遲或微細欲厥眩暈昏死者用人參附子川芎等分煎湯頻服良久鼻上出汗者生此方治一切虛寒頭痛若因風毒暴侵腦袋腦痛如破其脈浮數寒熱項強者此非真頭痛症也用人參敗毒散加酒炒黃柏條芩紅花藁本見發表門雷頭風因頭面感受冷熱毒氣癘風風動作聲頭中響如雷鳴頭面突起疙瘩漸增腫痛惡寒壯熱狀類傷寒初起邪在三陽之淺勿用寒涼重劑誅伐無過但服清震湯見發表門使邪從上越且固胃氣不致傳裡也若初起失治風毒傳裡衝入眼內腦汁下注瞳人變色或大小不定審其脈症尚實用瀉肝散攻之如形氣已虛用礞石丸服之俱見表裡門大頭瘟初起憎寒體重次傳頭面腫盛目不能開氣逆上喘咽喉不利口渴舌燥泰相間多有患此者醫以承氣湯加藍根下之稍緩翌日如故下之又緩終莫能愈東垣視之曰身半以上天之氣也身半以下地之氣也此邪熱客於心肺之間上攻頭面為腫盛以承氣瀉胃腑之濕熱是為誅伐無過遂制此方全活甚眾故名普濟消毒飲見瀉火門心法初服荊防敗毒散汗之見發表門次服黃連消毒湯見瀉火門眉骨風風攻眉稜骨時作痠痛眼皮跳動肢冷嘔涎日久損目服羌活沖和湯隨經加引見發表門常嗅碧雲散見湧吐門余按前頭痛治法三陽之氣皆會於頭從額至巔絡腦後者屬太陽從額至鼻下面者屬陽明從頭角下耳中及耳之前後者屬少陽此三陽部位也眼目門總括五臟六腑之精氣皆上注於目而為之精精之窠為眼氣之精為白眼筋之精為黑眼骨之精為瞳子血之精為絡眥肉之精為約束與眼胞也裹擷筋骨血氣之精而與脈繫上屬於腦後出於項中因經熱蒸開腠理故風邪得以入之風熱之邪合上攻於目赤腫疼痛輕者則為外障或暴生雲翳重者則積熱之甚陡然痛傷睛也外障風熱上攻白睛色赤腫痛多淚隱澀難開者火眼也腫而硬者屬熱腫而軟者屬風盛宜先發散兩瞼上下初生如粟漸大如米或赤或白不甚腫痛謂之瞼生風粟兩瞼黏睛赤爛癢痛經年不愈謂之爛弦風瞼內如雞冠蜆肉翻出視物阻礙痛楚羞明者謂之雞冠蜆肉以上四症皆屬脾經風熱為病也兩眥筋絡努出名胬肉攀睛兩眥赤脈漸漸侵睛名赤脈貫睛眼赤如朱痛如錐刺名血灌瞳仁兩眼癢痛忽然突起名突起睛高大痛生翳狀如旋螺名旋螺尖起瞳睛大痛忽然突如蟹目名蟹睛疼痛以上六症皆心肝二經積熱為病也兩瞼燥急睫毛倒刺謂之倒睫拳毛兩目衝風淚出涓涓冬月尤甚謂之迎風流淚兩目連眥癢極不痛謂之風癢目中從下忽生黃膜侵睛疼痛謂之黃膜上衝目中從上忽生赤膜垂下遮睛謂之赤膜下垂以上五症皆心肝脾三經風熱為病也內障內障之病每因頭風五風變成初起瞳珠漸漸變色睛內隱隱似翳或白或黃或綠雖與不病之眼相似然無精彩光明射入病頭風者發則頭痛引目無淚或左目或右目或先左後右相注不定如坐暗室之中此頭風傷目之漸也綠風者初起頭旋兩角牽鼻引目疼痛時或見起白花紅花此綠風傷目之漸也黑風者症同綠風時時則見起黑花此黑風傷目之漸也烏風者亦同綠風但不旋暈而見烏花此烏風傷目之漸也黃風者久病雀目瞳睛金色此黃風傷目之漸也青風者頭微旋而目不癢痛但見青花轉轉日漸昏蒙此青風傷目之漸也以上內障外障始終症治詳載彤園六集眼科茲特言其大概以示學者有所遵循而不至混於所施云雜症治法治暴熱火眼初起脈症實者用防風通聖散重加白菊花方見表裡門治天行赤眼暴腫痛甚服消風散熱湯風熱赤眼服祛風清熱湯治風毒攻目赤腫澀痛熱淚不止服洗肝散前後諸方見明目門三症均洗廣大重明湯再用點眼方風盛燥血兼服清風養血湯治風熱障翳主以撥雲退翳丸翳遮瞳人用百點膏點眼方內障生翳及瞳人散大因勞心過度飲食失節者外點圓明膏圓翳初起形氣實者用防風散攻之日久不愈常服光明丸治五風初起脈症有餘者俱服除風湯攻之若五風已成當按眼科書治倒睫拳毛初起風熱甚者服石膏羌活散日久不愈服防風飲子治飲食勞役不節致生內障者服益胃湯目視昏暗聽服經驗方治血弱氣虛火旺木實之症服滋陰地黃丸腎虛目昏服明目地黃丸治肝腎氣虛目忽昏暗之症服加味駐景丸血虛障翳服羊肝丸治能近視不能遠視當益心強志服定志丸能遠不能近視服地芝丸治竭視勞瞻致成內障外障服四物補肝湯並治冷淚羞明入夜痛甚治頭風傷目痛生翳膜初起服洗刀散以上諸方見明目門牙齒門總括牙齒者骨之餘屬乎腎也若無故齒長疏豁而動則為腎經衰憊也上牙齒屬胃下牙齒屬大腸牙痛皆牙齦作痛惟寒牙痛則為客寒犯腦多頭連齒痛也寒痛喜熱飲不腫不蛀余者皆為胃火邪風濕熱也火牙痛則多腫喜飲冷得寒則更疼者讎仇之意也蟲牙則一牙作痛蝕盡一牙又蝕又痛相因無已若骨槽風牙齦連頰腫硬疼痛齦肉腐爛先出血膿也牙疳瘡或因骨槽潰後腫硬不消然出臭血而不出膿水也亦有因痘疹癖疾後而成者症治詳見外科治法治胃火牙痛牽引頭額面熱腮腫牙齦潰爛或牙宣出血主以清胃散若腸胃積熱腫痛臭爛目赤頭暈口渴生瘡唇裂便秘者皆上中焦實火為病用涼膈散加升麻石膏末以下其熱見瀉火門治風牙痛常歪口吸氣不甚焮腫不怕冷熱服溫風散外捺風牙等方見湧吐門若風熱相兼齒連頭痛服獨活散見祛風門治寒牙痛其痛纏綿不紅不腫喜飲熱湯常畏風吹用溫風散加麻黃附子羌活煎湯以一半噙漱吐出寒涎後服一半或噙乾薑肉桂治蟲牙痛一牙作痛蝕盡一牙再痛再蝕相因無已用一笑丸如法取吐後次煎玉池散噙漱一半溫服一半捺牙疳散俱見湧吐門黑蟲牙法取韭菜子或蔥子置小爐中炭火燒燃擱放大水碗內復以漏斗將口向蟲牙痛處熏之其蟲極小盡落水中治濕熱牙痛牙齦焮腫口渴便秘裡熱盛者服諸承氣湯下之見攻裡門輕者用清胃散加炒芩牙宣口臭服清涼甘露飲俱見瀉火門治氣血痰火濕食六郁為病牙痛焮腫用越鞠湯隨症加味見理氣門治中氣素虛自汗氣乏頭暈牙疼者服補中益氣湯見理氣門治思慮傷脾食少不眠怔忡盜汗面齒痛服歸脾湯見理血門治腎水不足虛火上炎屬陰痛甚者服六味地黃湯見補養門治腎氣虛寒形羸氣短口冷牙疼者服八味地黃湯見補養門骨槽風骨槽症治載外科二卷初發耳前腫連腮頰筋骨隱痛不甚焮熱者服升陽散火湯見瀉火門捺冰硼散見湧吐門忌外敷涼藥牙疳瘡牙疳症治詳載外科二卷初終攻毒為主用蕪荑消疳湯見殺蟲門每日煎服以腫硬消黑色變息氣止為度若不能食或隔一日隔二三日仍攻之一切發物任其所食雖大便溏瀉仍量其輕重攻之外搽牙疳散見湧吐門余法按外科二卷口舌門總括口舌生瘡糜爛統名曰口糜乃心脾二經蘊熱深也平人口淡故曰脾和口出氣臭則為胃熱不因食五味而口內溢酸味者乃肝熱淫脾也溢苦味者心熱淫脾也溢辛味者肺熱淫脾也溢鹹味者腎熱淫脾也若溢甘味乃本經熱自浮也舌忽腫硬而木痛者名曰木舌舌下腫起又似生一舌者名曰重舌懸雍垂下墜者俗名小舌吊下唇腫潰裂成瘡名唇瘡唇緊小燥裂名繭唇以上皆脾胃與心積熱為病也治法治口舌腫痛初起色赤焮熱便秘脈實裡熱甚者服梔子金花湯下之中焦燥實服涼膈散心肺蘊熱服清金導赤散心胃火盛服清胃瀉火湯日久色淡屬虛熱者當服蓮子清心飲俱見瀉火門治口舌腫痛先服涼藥熱退色淡延久不愈火不歸原也服七味地黃湯口內似無皮時痛時止喜飲熱者外虛熱而內真寒也服八味地黃丸口瘡日久氣血兩虛無根之火上炎服涼藥而轉痛者用十全大補湯若胃弱痰盛滑白多涎痛久不愈服香砂六君子湯俱見補養門若口瘡淡痛微肢時止或屬陰痛甚服知柏四物湯見理血門若色淡痛微肢冷腹痛嘔涎者服理中湯見祛寒門寒盛加附子外治口舌腫痛糜爛吹搽冰硼散熱毒盛者吹經驗方俱見湧吐門舌忽青黑上起芒刺者將舌舔土壁頻揩去刺服清心散見瀉火門舌忽脹大俗名蜈蚣毒用雞冠熱血浸之即收服解毒湯見瀉火門舌忽腫硬不活動者用食鹽百草霜蒲黃研末頻塗之舌忽垂長數寸不得收縮者研冰片末頻搽之舌與唇或血出如泉湧者用百草霜蒲黃槐花同炒焦黑研末搽塗口氣臭甚香薷煎湯頻頻噙漱或噙公丁香服甘露飲見瀉火門凡舌吐出不收者名曰陽強宜清熱解毒舌收縮不能言者名曰陰強宜溫中散寒法見傷寒二卷木舌重舌痰包俱見外科二卷小舌吊下小舌即懸雍垂俗名碓嘴如吊下色赤腫痛口氣焮熱宜服清涼之劑外用鹽醋調百草霜以竹箸頭蘸點數次或吹冰硼散余法同口舌門若吊下垂長不赤不腫犯之則痛宜服清補之劑研硃砂末頻點之繭唇唇瘡經曰脾氣通於口又曰脾之榮在唇蓋脾燥則干熱則裂風則瞤動寒則皮揭初起唇皮燥裂緊小名曰繭唇又有唇腫重出如繭者有本細末大如繭如瘤者因七情動火傷血或因心火傳入脾經或因厚味積熱傷脾治宜審本病察兼症補脾氣生脾血則燥除火息風散腫消矣若妄用劫方或用線藥揭去繭皮反成翻花敗症治法繭唇初起口渴口臭服清涼甘露飲面赤便秘服涼膈散風盛瞤動燥裂服瀉黃散俱見瀉火門外搽冰硼散見湧吐門唇瘡腫爛有因肝經怒火風熱傳入脾經者服柴胡清肝湯見和解門若瘡色淡紅日輕夜重五心煩熱脈虛者服滋陰地黃湯見補養門唇裂出血搗桃仁和豬油調塗其餘唇舌症治詳見外科聲音門舌喑聲啞舌喑者因舌本不能轉運而難言也蓋腎脈夾舌本肝脈連舌本心別脈系舌本三經虛舌本脈道不利而喑而咽喉仍然通暢症治見前中風門喉喑嘶啞喉喑者因積熱上攻或痰涎上壅阻格氣道輕者音嘶重者聲啞而舌本仍然活動也服清化丸兒茶散聲啞方冰硼散見湧吐門或虛火上炎咽微腫痛語音嘶啞先服滋陰降火湯後服六味地黃丸若食生冷或犯風寒突然聲嘶者服香砂六君湯俱見補養門至喉癬嘶啞服牛蒡解毒湯清咽利膈湯見瀉火門余按外科屍咽症治此因脾肺濕熱郁久生蟲剝蝕咽喉麻癢兼痛聲先嘶而漸啞初起用榧子蕪荑桂心去皮尖炒黃杏仁等分研末蜜為丸彈子大常常噙咽日久宜服牛蒡解毒湯余法按外科二卷咽喉門總括胸膈上有風熱則咽喉腫痛風熱之邪若盛則生單雙乳蛾在會厭兩旁高腫似蛾俗名蛾風熱極則腫閉湯水不下言語難出呼吸不通名曰喉痹若熱極更兼痰盛則痰涎繞於喉間咽響作聲內外腫閉湯水不下名曰纏喉風此皆危病或服藥或吹藥或針刺潰破出膿血則愈若針後不出膿血仍然腫閉湯水不下則死矣治法大法乳蛾喉痹初起腫痛赤熱者主以消毒涼膈散清咽利膈湯玉屑無憂散俱見瀉火門其餘症治按外科二卷外治冰硼散八寶珍珠散七寶散消蛾方俱見湧吐門治雙單乳蛾輕者照前法調治若腫塞脹閉先用扁針刺兩手大指內側少商穴在左刺左在右刺右左右生蛾左右俱刺血鮮者生紫者重又以布針縛箸頭用竹板壓舌刺破乳蛾出血溫水漱淨方吹藥服藥若蛾生關內難用針者取手指甲或雞內金焙切研末對蛾頻吹當自破尚用前法不效蛾腫脹大聲息不通者研皂角末頻吹鼻取嚏蛾當掙破或用硬雞翎蘸鹽湯探掃喉間令作大吐掙破出血溫水漱淨方吹珍珠散見湧吐門再服清咽利膈湯見瀉火門禁一切辛酸熱物治喉痹纏喉輕者照大法調治若壯熱憎寒咽腫焮痛面赤腮腫喉中有塊堵塞湯水者照前法刺少商穴瀉熱開關若痰壅氣閉不通用桐油餞探吐見湧吐門甘草湯漱淨旋服荊防敗毒散載發表門治時氣纏喉喉閉腫痛發熱惡寒項背牽強狀似傷寒者初起連服如意勝金錠頻吹七寶散見湧吐門後服清咽利膈湯見瀉火門治時毒纏喉痰涎壅塞牙關噤急氣閉昏死先用如聖散吹鼻取嚏隨灌雄黃解毒丸令得吐利自醒外吹七寶散咽喉潰爛吹八寶珍珠散俱見湧吐門吐利後常服清咽利膈湯見瀉火門治酒毒喉痹毒蒸心脾痰熱上壅咽腫色黃面赤氣閉目睛上視初用桐油餞探吐之後吹冰硼散俱見湧吐門常服牛蒡解毒湯若腫痛妨食再服玉屑無憂散俱見瀉火門治少陰經咽痛喉痹失音乾咳等症主以甘桔湯隨症加味載瀉火門若虛火上升咽痛咽瘡色淡紅而不焮腫服滋陰四物湯見理氣門如陰虛相火上炎用六味地黃湯加酒炒黃柏知母甘草元參桔梗若肺傷咽痛喘咳痰血服固金湯俱見補養門虛痛忌吹噙涼藥治因勞役過傷無根之火上衝咽喉腫痛糜爛色不甚紅亦少焮熱但痰喘自汗脈浮大者用補中益氣湯加桂心見理氣門倘遇勞動則發或加重者前湯加知母黃柏元參服數劑去此只加麥冬常服自愈心腹門總括歧骨陷處痛者名曰心痛橫滿連胸名肺心痛下連胃脘名胃心痛痛連臍間名脾心痛痛連兩腰名腎心痛痛連小腹名大腸小腸痛痛連兩脅名肝心痛時痛時止頻吐清水名蟲心痛中惡腹痛名曰疰痛寒邪外干名中寒痛心悸而痛名悸心痛水停心下屬飲也思慮傷心脾屬傷也凡停食痛停水痛停痰痛胃火痛氣滯痛血瘀痛皆不死之症當分別施治惟真心痛面色黑四肢逆冷至節期周一日必死治法治心腹諸痛因濕熱鬱結及氣積食滯脈沉有力者服化滯丸見攻裡門量體虛實先攻積滯後用平胃散隨症加味見消導門治心腹諸痛因寒積水停及食停腸胃冷熱不調腹脹氣急痛滿欲死其脈沉遲有力者用備急丸先攻積滯見攻裡門後審症調治治心腹釣痛因痰飲停伏走移攻注手足冷痹氣脈不通筋骨牽引疼痛用控涎丹攻之攻後用二陳湯隨症加味俱見除痰門治一切蟲痛或寒厥吐蛔或胃腑發咳咳而嘔嘔甚吐蟲俱服烏梅丸若蟲齧腹痛作止有時或氣痛耕起往來無常服