body:
  text: 傷寒辨證篇卷二辨兩感傷寒脈證治法兩感者藏府表裡同病也一日初受病惡寒頭痛太陽表也而又口乾煩渴是兼少陰里證二日受病身熱譫語陽明病也而又腹滿不欲食是兼太陰里證三日受病耳聾目眩少陽邪也而又囊縮厥逆是兼厥陰里證凡傷寒傳經之邪其為病也漸兩感之邪其為病也速蓋因陽邪酷烈正不能御所以三日後水漿不入六府之氣欲絶昏不知人五藏之神已敗而不即死者賴有胃氣未盡耳故又三日其氣乃盡而死張潔古制大羌活湯以羌獨芩連輩辛甘以散太陽之表苦寒以清少陰之熱施之於表裡不急者因為得法也若夫一日則頭痛口乾煩渴二日則身熱譫語腹滿不欲食三日則耳聾囊縮而厥水漿不入昏不知人傳變如此迅速恐用大羌活湯平緩之劑反失機宜當遵仲景治有先後之説審其表裡孰急隨證施治猶或可活故於此證初病一日表裡俱熱者依少陰病得之二三日口燥咽乾之法用大承氣湯重劑以瀉陽邪之烈表裡俱寒者依少陰病始得之反發熱脈沉之法用麻黃附子細辛湯以解陰邪之急兩感二日表裡俱實者依陽明病譫語有潮熱腹滿大實痛之法用大承氣湯以攻胃府之邪表裡虛者依三陽合病腹滿身痛面垢譫語之法用人參白虎湯以清在經之熱兩感三日表裡俱熱者依厥深熱亦深之法用大承氣湯以瀉在府之熱表裡俱寒者依脈微欲絶手足厥寒之法用當歸四逆加吳萸生薑湯和厥陰以散陽邪要之兩感急病須計程施治稍緩則不及事矣圖治於早或可得生後之學者其留意焉兩感總訣第一日太陽少陰兩感兩感脈大而沉一日膀胱與腎經頭痛寒熱太陽表口乾煩渴屬少陰表裡熱服大承重劑瀉陽以救陰表裡寒從少陰治麻附細辛湯可平首章統言太陽少陰兩感初起所見脈證也膀胱表也腎臟里也如第一日初病兩感其脈大太陽脈也脈沉少陰脈也其證惡寒頭痛太陽表也口乾煩渴少陰里證也此中又有寒熱之分次章分別太陽少陰兩感寒熱脈證治法也如第一日有如前之證但見脈大而沉數有力者此為表裡俱熱依一卷少陰陽邪例用重劑大承氣湯以瀉陽救陰見醫方攻裡門若有如前之證但見脈大而沉遲無力者此為表裡俱寒依一卷少陰太陽同病例用麻黃附子細辛湯以散寒溫中見醫方發表門第二日陽明太陰兩感兩感脈長而沉二日陽明太陰病潮熱譫語胃家證滿不欲食屬脾經表裡實服大承腹大實痛例中尋表裡虛從合病治大劑白虎加人參首章統言陽明太陰表裡兩感所見脈證也胃府表也脾臟陰也如第二日表里兩感其脈長陽明脈也長而沉兼太陰脈也其證潮熱譫語胃家實也腹滿不欲食脾經里證也此中又有虛實之分次章分別陽明太陰兩感虛實脈證治法也如第二日有如前之證但見脈長而沉數有力燥渴譫語大便硬結腹大實痛終日不減者此為表裡俱實依一卷太陰陽明同病例用大承氣湯攻之若有時如前之證但見脈長而沉遲無力腹中滿痛時減時作面生油垢貪眠懶食者此為表裡俱虛依一卷三陽合病例用大劑人參白虎湯益氣生津以清其熱方見瀉火門第三日少陽厥陰兩感兩感脈弦而沉三日少陽厥陰病耳聾脅痛膽家證煩滿囊縮屬肝經表裡熱服大承厥深熱深例中尋表裡寒從藏厥治當歸四逆薑萸增首章統言少陽厥陰表裡兩感所見脈證也膽府表也肝藏里也如第三日表里兩感其脈弦少陽脈也弦而沉兼厥陰脈也其證耳聾脅痛少陽病也煩滿囊縮厥陰里證也此中又有寒熱之分次章分別少陽厥陰兩感寒熱脈證治法也如第三日有如前之證但見脈弦而沉數有力舌卷胎焦煩渴心疼囊縮陰緊少腹牽痛者此為表裡俱熱依一卷厥陰陽邪例用大承氣湯先攻裡熱見醫方攻裡門若有如前之證但見脈弦而沉細無力舌短胎滑通身冰冷男子縮陰婦人陰急兩乳縮小面色黑暗者此為表裡寒證用當歸四逆加吳萸生薑湯溫中散寒見醫方祛寒門兩感附法總訣兩感病無定形前將證治逐條分陰陽表裡和寒熱虛實機緘脈里尋大羌活潔古增表裡不急服之靈陶氏沖和靈寶飲回陽六一法通行首章申明兩感之證三陽三陰相合為病無有定形故已前三章逐條分別揭明陰陽表裡寒熱虛實脈證以出其治也次章附録諸家方法有可通者如張潔古之大羌活湯陶節庵之沖和靈寶飲施之於表裡不急之兩感病亦可湊效見醫方發表門又如節庵之六一順氣湯可代大承氣湯治兩感實熱之證見攻裡門如節庵之回陽救急湯可代四逆等湯治兩感裡寒之證見祛寒門以上數方皆可通用惟在醫師斟酌而已辨致變壞病脈證治法壞病者謂不當汗而汗不當吐而吐不當下而下即當汗吐下而用法過甚或當汗吐下而施治失宜皆為失治致變所以成壞病也凡三陰三陽若汗若吐若下若溫針火熏火尉火灸火劫等法致諸壞病者有汗後亡陽眩冒振惕魄汗不收者有下後虛中結胸痞硬下利不止者有吐後胸腹煩滿擾亂不安者有溫針後迫血妄行驚悸發狂者甚至陽毒發斑顛狂妄亂陰躁欲死神昏譫語循衣摸床者以上證治散見六經篇中難以枚舉惟在學者熟讀一卷傷寒篇以窮其理次詳審二卷辨證篇以通其變則理無不明而治無不當矣方有執曰傷寒壞病既不可定以正名則亦難以出其正治故但示人以隨機應變之微旨一以貫之斯言盡之矣致變壞病總訣太陽三日已發汗若吐若下若溫針不解致逆成壞病須詳脈證犯何經若是垂危難辨證陰陽紛錯莫能憑獨參煎湯頻冷服鼻上津津汗者生注曰太陽病三日邪在三陽之時若已經發汗而不解至吐下溫針其法備施病仍不解且生雜病是以前諸法失宜致變也如汗後亡陽動經躁渴譫語下後寒中虛煩結胸痞硬吐後內煩虛擾胸膈滿脹溫針後吐衄發黃驚悸狂妄之類皆屬壞病須詳審其脈證知其犯何經之逆隨證施治以反逆為順難以成法拘也諸般證治詳見傷寒論中至若脈微欲絶神昏不能言循衣摸床叉手冒心等重困垂危陰陽難辨六經莫可憑之證此時惟用人參煎湯徐徐冷服以待其機尚得鼻上津津有汗則為可生之兆也辨別諸證表證表證謂寒邪在表無汗發熱惡寒惡風頭項強痛身肢疼痛也太陽經主表故曰表證有是證而無汗者屬表實宜發汗有是證而有汗者屬表虛不可發汗雖有風邪只用桂枝湯解肌可也若表實無汗重者用麻黃湯輕者用麻桂各半湯時有汗時無汗者用桂枝二麻黃一湯俱見發表門如表實躁熱甚者當服三黃石膏湯見表裡門表實熱微者服大青龍湯不躁有熱者服桂枝二越婢一湯俱見發表門以上表證不必悉具亦不論日數多少但見有頭痛惡寒二證即為表邪未罷雖有里證當先解表表解之後乃可攻裡不可用藥失序也余法詳一卷太陽篇里證里證謂熱邪內結大便不通惡熱潮熱自汗蒸蒸口燥舌乾煩渴譫語腹滿硬痛也陽明胃府主裡故曰里證裡實者有脾約有胃實有大便難三證均為可下然亦當審其輕重用諸承氣湯麻仁丸分別下之庶乎無過也俱見攻裡門若便溏者為裡虛即有是證不可妄下只宜清解裡熱也余法詳見一卷陽明少陰篇陽證陽證謂陽熱之證也不論三陰三陽凡見是證者均為陽熱有餘也陽主動故身體輕便陽氣盛故氣高而喘陽主熱故口鼻氣蒸手陽主寤故目睛了了而不眠亦有熱極朦朧似不了瞭然必目赤多眵非若陰證之不了了而神短無光也陽氣熱故身熱面唇紅指甲紅也陽熱入里故心煩口燥舌乾而渴小便赤也表實者用三黃石膏湯發之見表裡門裡實者用諸承氣湯下之見攻裡門表裡不實而熱盛者用白虎解毒等湯清之方見瀉火門余法詳一卷三陽篇陰證陰證謂陰寒之證也不論三陽三陰凡見是證者均為陰寒不足也陰主靜故身體常重而難轉側陰主寐故目睛不了了而但欲眠陰氣虛寒故呼吸息短口鼻氣冷也陰淫於外故面無紅色四肢厥冷爪甲色青也陰邪入內故嘔吐時煩下利清穀小便清長也以上皆三陰寒證也治法宜溫如理中湯四逆湯附子湯吳茱萸湯皆應用之方惟在臨證時選用俱見祛寒門余法詳一卷三陰篇陽盛格陰經曰陽氣太盛陰氣不得相營也不相營者不相入也既不相入則格陰於外故曰陽盛格陰其外證雖身肢厥冷頗似陰寒而內則煩渴大便難小便赤惡熱不欲近衣爪甲色赤其脈沉滑一派陽實熱證汗清下三法得宜則陽得以消陰得以完全也如表實無汗用三黃石膏湯見表裡門裡實便祕用諸承氣湯見攻裡門熱盛而無表裡證者用黃連解毒湯合白虎湯清之方見瀉火門劉完素曰蓄熱內甚脈須疾數以其極熱蓄甚而脈道不利反致沉細欲絶俗未明造化之理反謂傳為寒極陰毒者誤矣蓋此證或始得之陽熱暴甚而成者或兩感熱甚而成者通用黃連解毒湯合大承氣湯下之下後熱稍退而未愈者再用黃連解毒湯調之或微熱未除者次用涼膈散調之俱見瀉火門或失下熱極以致全身冷脈微而昏冒將死者此時若急下之則殘陰暴絶必死蓋陽後竭而然也然不下之亦死宜涼膈散以養陰退陽積熱漸以消散則心胸再暖而脈漸以生也陰盛格陽經曰陰氣太盛陽氣不得相營也不相營者不相入也既不相入則格陽於外故曰陰盛格陽其外證面上見浮淺之紅赤色發熱而煩頗類陽熱其內則不渴下利清穀小便清白爪甲青白四肢厥冷脈浮微欲絶一派陰寒虛證治宜通脈四逆湯冷服之從其陰而復其陽也見醫方祛寒門服後利止脈仍不出者倍加人參再服若下利無脈宜服白通加膽汁人尿湯者厥煩欲死宜服吳茱萸湯俱見祛寒門總注曰論中扶陽抑陰之劑如中寒陽微不能外達主以四逆湯中外俱寒陽氣虛甚主以附子湯陽盛於下格陽於上主以白通湯陰盛於內格陽於外主以通脈四逆湯俱見醫方祛寒門從可知四逆湯運行陽氣者也附子湯溫補陽者也白通湯宣通上下之陽者也通脈四逆湯通達內外之陽者也今脈微欲絶裡寒外熱是腎中陰盛格陽於外故主以通脈四逆湯大壯元陽主持中外共招外熱返之於內面赤加蔥莖以通格上之陽腹痛加白芍以和在裡之陰嘔逆加生薑以止嘔咽痛加桔梗以利咽利止脈不出氣少者俱倍人參以生氣而復脈格陽證下利無脈者言利甚不止轉增厥逆脈微欲絶陰邪愈無忌也故用白通加膽汁人尿湯引薑附之溫入格拒之寒而調其逆此內經從治之法也至若吐利厥逆反見煩躁欲死之證以誑之是皆陽被陰拒而置身無地與陽證之心煩身躁為異耳故用吳茱萸湯挾木力以益火勢則土得溫而水寒卻矣此治陰盛格陽之要訣也陽毒陽毒謂陽熱至極之證也若傷寒病應汗不汗應下不下失其汗下之時熱毒炎炎不已致舌卷胎焦黑鼻內生煤煙熱毒內攻乘心致神昏噤栗咽痛唾血發狂如見鬼神熱毒外薄肌膚致肢體發赤色如錦云之斑也此證五六日之前其日尚淺毒未深入猶易治療七日之後則難調治矣治法有如前之證更加無汗便祕者此為表裡俱實用黑奴丸兩解之見表裡門如無表裡實證只熱毒盛者但服黃連解毒湯若兼燥渴須服白虎解毒湯見瀉火門至若表實無汗宜服三黃石膏湯發之見表裡門若裡實不大便用大承氣湯加黃連黃芩黃柏梔子攻之見攻裡門陰毒陰毒謂陰寒至極之證也血脈受陰毒之邪故面色青黑陰毒內攻於裡故咽痛腹中絞痛陰毒外攻於表故厥冷通身重強疼如被杖獨陰無陽不化故陰氣凝結腹若石之堅硬也或煩躁或嘔吐或下利或冷汗出皆陽虛不足或有之證治法以溫補為先用四逆湯倍加人參見祛寒門若有是證其人無汗服還陽散退陰散溫而汗之使寒毒散而陽得伸也方見表裡門凡遇陰毒初起宜切生薑片貼臍下氣海關元兩穴搓艾丸各灸數十壯以回陽隨服前方未有不效者也表熱表熱謂發熱無休止之時翕翕然如合毛羽外覆之象此熱不在裡而在表故尿色清白口不燥渴舌胎滑潤也治法表熱惡寒無汗者服麻黃湯升陽發表湯若表熱自汗服桂枝湯疏邪實表湯俱見發表門裡熱裡熱謂發熱自內騰越而出蒸蒸然如炊蒸籠熱氣內越之象此熱不在表而在裡故見證煩渴便祕譫語脹滿也治法裡熱者用諸承氣湯下之見攻裡門輕者用涼膈散清之見瀉火門陽熱陽熱謂陽經之熱也如蒸蒸發熱兼口燥口乾煩滿渴飲者此為陽熱宜白虎湯黃連解毒湯清解之見瀉火門余法詳一卷三陽篇陰熱陰熱屬陰經之熱也如發熱無常兼四肢厥逆下利清穀者此為陰熱宜四逆湯白通湯之類溫解之見祛寒門余法詳一卷三陰篇總注曰翕翕蒸蒸發熱俱有汗二證相類若以翕翕之表熱誤為蒸蒸之裡熱而妄下之則逆若以蒸蒸之裡熱誤為翕翕之表熱而妄汗之轉傷矣蓋翕翕之汗熱雖同蒸蒸然捫之自溫不似蒸蒸之汗熱捫之自有熱氣透手也其間或有疑似難辨又當審其小便之赤白與舌胎之燥潤自可決也潮熱蒸熱潮熱陽明胃府證也陽明旺於申酉故潮熱發於午後如潮信之不爽失故名潮熱可下之證然亦當審其輕重虛實治之蒸蒸者蒸蒸發熱而無休止之時熱氣透手溱溱有汗故名蒸熱亦屬陽明內實可下之證也治法詳見一卷陽明篇府病熱病門時熱自汗時熱自汗者謂發熱時輕時重而有汗也似潮熱而熱無定期似蒸熱而熱時休止凡潮熱蒸熱必兼有可下之證而時熱自汗時輕時重則必不兼可下之證因無里證也無里證故時熱自汗知風邪留連在表也宜當發熱汗出之先預服桂枝湯以解肌蓋桂枝湯不為時熱自汗者設而為時熱自汗有表邪而無里證者設也此處重在無里證非謂凡有時熱者皆服桂枝湯也方見發表門辨別惡寒惡寒一證有表裡陰陽之分如發熱惡寒發於陽表也有汗用桂枝湯解肌無汗用麻黃湯發表如惡寒而不發熱發於陰里也有汗用桂枝加附子湯溫解之無汗用麻附細辛湯溫散之俱見發表門辨背惡寒背惡寒證有屬少陰陽明之分如口中不燥而和只背惡寒者屬少陰腎經有寒也宜附子湯溫補陽氣見祛寒門如口中燥而煩渴背時惡寒者屬陽明表裡之邪也宜人參白虎湯補而清之見瀉火門前條陰陽二經惡寒雖同其身有熱無熱則異也一則汗之一則溫之此條少陰陽明背惡寒雖同其口中和口中燥則異也一則溫之一則清之惡寒雖屬微淺之病仲景立法可辨其他可類推矣辨別惡風風寒二者大率多相因而少相離有寒時不皆無風有風時不皆無寒故三陽傷寒俱以惡風惡寒同載也惡風與惡寒均屬表病法當從表施治然風屬陽邪寒屬陰邪故三陰傷寒只有惡寒而無惡風也往來寒熱寒而熱熱而寒寒熱相仍不已故名往來寒熱此為少陽膽經半表半裡之證主以小柴胡湯隨證加味見和解門如瘧寒熱凡瘧疾寒熱原有作止常期一日一次或隔日一次謂之瘧見後雜病門若寒熱而無作止之常日發三五次謂之如瘧此屬太陽未盡表邪也如寒熱兩平身無汗者服麻桂各半湯若熱多寒少服桂枝二越婢一湯若如瘧有汗服桂枝二麻黃一湯俱見發表門三陽頭痛凡太陽陽明少陽三陽頭痛必兼寒熱等證治從三陽例見一卷三陽篇如頭痛壯熱大便祕結小水短赤煩渴汗蒸此為裡實熱痛用諸承氣湯酌量下之見攻裡門若頭痛而兼發熱惡寒小便清利雖大便不通亦為裡熱未實表尚未清當先清表按一卷三陽表病篇治之厥陰頭痛厥陰頭痛則多厥冷而不發熱兼吐涎沫是肝臟挾寒邪上逆也用吳茱萸湯溫而降之見祛寒門蓋太陰少陰二經無頭痛之證惟厥陰經有頭痛以其脈與督脈上會於巔也太陰脾經無發熱之證而少陰厥陰亦有發熱者謂之皮發熱以其藏有相火陰盛格陽於外也項強背強項強太陽病也項背俱強太陽陽明病也項背𠘧𠘧音必拘強而甚之貌脈浮太陽陽明表脈也若項背強脈浮無汗是從傷寒傳來宜服葛根湯如項背強脈浮有汗是從中風傳來宜服桂枝加葛根湯若項背強而脈沉者是邪已入胸裡也宜服栝蔞桂枝湯三方見發表門若結胸病項強背反張而有汗如柔痙之狀者服大陷胸丸方見攻裡門若系太陽少陽並病項背強者不可再汗再下用小柴胡湯去半夏加花粉見和解門身痛身重傷寒身痛未經發汗者屬表實也用麻黃湯汗之若已發汗身仍痛者屬表虛也服桂枝新加湯解之若初病身痛尺中脈遲血少營弱者雖未經發汗不可發汗用小建中湯加黃耆先補其營血以待脈回俱見發表門若身痛而見少陰沉脈四肢厥冷者用附子湯溫中助陽而兼補其氣血若身痛而見厥陰厥逆汗出不止下利清穀證者服四逆湯俱見祛寒門若風濕身痛則一身重痛不能轉側牽引煩疼蓋濕則令人一身盡痛身重不能轉側風則令人筋脈牽引煩痛不寧也服桂枝附子湯見發表門煩躁懊憹身為熱動而不安謂之躁心為熱擾而不寧謂之煩煩則擾於內躁則動於外故有心煩而無身煩有身躁而無心躁也大抵煩屬陽躁屬陰若懊憹證則是心中反覆顛倒煩不得眠不與躁證同見且無冷病當作熱病觀也如兼便祕煩渴者當量其熱之深淺或白虎湯見瀉火門或承氣湯見攻裡門分別治之惟躁證則不然當分陰陽表裡施治故太陽下篇有不汗出而煩躁謂之在表服大青龍湯見發表門陽明熱病有心下硬之煩躁謂之在陽服白虎湯見瀉火門三陰陰邪有吐利手足厥逆之煩躁謂之在陰服四逆理中等湯見祛寒門要之煩與懊憹多屬陽熱而躁則有陰陽表裡之分故躁證與三陰證同見者便屬陰寒之躁均宜服四逆理中吳茱萸湯也諸煩不眠諸煩者即上之心煩也不眠者即上之懊憹也心煩懊憹夜不得眠無論已經未經汗吐下之前後但見大便不硬脈無力者此屬虛煩不眠主以竹葉石膏湯見瀉火門若煩不得眠兼見少陽口苦嘔涎驚悸證者主以溫膽湯見和解門若汗吐下後虛煩不眠及下後仍熱心上結硬者主以梔子豉湯見湧吐門自汗太陽中風脈浮緩而自汗者謂之風邪服桂枝湯疏邪實表湯見發表門若陽明胃熱熱越自汗口渴煩躁脈浮而洪者用白虎湯清之見瀉火門若陽明燥實口渴便祕大熱蒸蒸汗出過多者服調胃承氣湯見攻裡門若自汗而兼發熱下利不止者內外交脫也凶其雜病篇中自汗盜汗脈證治法詳見三卷汗證門此條第言傷寒門應有之證也頭汗頭上出汗齊頸而還此為熱不得外越上蒸於首也或因黃疸鬱而未發或因濕家誤下陽越或因火劫熱迫或因陽明蓄血或因熱入血室或因水飲結胸而成以上等因當循雜病篇中按證施治手足汗出脾胃主四肢為津液之主今熱聚於胃蒸其津液旁達於四肢故手足濈濈然汗出且小便自利胃中津液必干大便必硬本當攻也若中寒胃陽土虛脾不約束津液橫溢四肢猶如陰盛淫雨滂沱故汗出而冷也陽虛失運中寒不化故小便不利也傷寒雖便硬而手足汗出非為熱越者此慎不可攻攻之必變生固瘕泄利澄清不止也用白虎湯清之見瀉州門手足厥逆太陰經無厥逆而有手足自溫之證少陰經有寒厥而無熱厥厥陰經有寒熱二厥寒厥者只寒而不熱也熱厥者由熱而厥由厥而熱熱厥相因無休歇也當辨陰陽淺深治之寒厥主以當歸四逆湯見祛寒門熱厥主以承氣湯見攻裡門余詳一卷三陰篇渴證傷寒渴證多因汗吐下三法失宜傷其津液致胃中乾燥故口渴而引飲所謂陽邪往乘三陰者如乘太陰則嗌乾乘少陰則口燥乘厥陰則消渴陽邪乘陰雖三陰之渴亦屬熱傷津液也三陰渴證治法見一卷三陰篇如治太陽渴證邪在膀胱之府水停下焦小便不利服五苓散見利濕門如治陽明渴證邪在經中致胃熱飲水連連不已者服白虎湯見瀉火門如治少陽渴證心煩而渴口苦咽乾耳聾目眩寒熱往來者用小柴胡湯去半夏以避燥加花粉二錢以生津液見和解門嘔證諸經皆有嘔證論中因何屬於少陽蓋因表邪入里裡氣拒格上逆作嘔故取屬少陽也嘔而口苦咽乾目眩耳聾脅痛服小柴胡湯見和解門若傷寒煩嘔心下痞硬便祕發熱惡寒者服大柴胡湯兩解之見表裡門若太陽經惡寒頭痛之表不解而自汗嘔逆者服柴胡桂枝湯見和解門若太陽陽明合病不下利得湯更嘔屬表熱也服葛根半夏湯見發表門若陽明熱病府病作嘔胃中積滯食谷欲嘔者酌用諸承氣湯見攻裡門若脾寒胃冷食谷欲嘔少陰厥冷煩躁嘔利厥陰藏厥嘔吐涎沫俱服吳茱萸湯溫解之見祛寒門如厥陰吐蛔飢不欲食者服烏梅丸見殺蟲門吐證吐食不能食屬中寒吐逆不渴而厥屬寒虛宜理中吳萸等湯見祛寒門如煩渴得食即吐是火旺也熱實服黃連解毒湯熱虛服竹葉石膏湯俱見瀉火門若渴而飲飲而吐吐復渴飲是水逆病也服五苓散見利濕門厄逆噦噫厄逆古名曰噎噎者氣噎結有聲也俗誤以噦為厄逆蓋不知噦噦之聲聲從胃裡而出不似厄逆之格格連聲從臍下來自衝脈出口而作聲也厄逆頗類噯氣噫氣噯氣者因飽食太急比時作噯轉食氣也噫氣者因過食傷食越時作噫轉食臭氣也四證均屬氣逆為病故皆同厄逆治法凡厄逆等證多因胃氣虛竭而成初起亦有兼熱者主以橘皮竹茹湯加柿蒂見理氣門若兼熱而更大便不通服三承氣湯見攻裡門厄逆兼熱小便不利者服四苓散見利濕門此治厄逆噦噫有餘之證也厄逆噦噫如因腎虛不能攝衝脈之氣歸原而成者用都氣湯加牛膝見補養門若系寒虛兼太陰手足自溫之證者服丁萸理中湯加附子見祛寒門若寒虛兼少陰手足厥冷之證者用丁萸理中湯加附子至若心下痞硬下利完穀厄逆乾噦者主以生薑瀉心湯見瀉火門若傷寒汗吐下後心下痞硬噫氣不止者服代赭旋覆湯見理氣門余法詳見四卷厄逆門熱利下利口渴欲飲水者里有熱也小便黃赤大便稠黏氣穢皆熱利之本證若熱利兼有惡寒表證重者服葛根湯輕者服升麻葛根湯俱見發表門若熱利兼有腹脹滿痛脈沉實之裡證酌用諸承氣湯攻下之見攻裡門如無表里二證但熱結下利重者服葛根芩連湯見表裡門輕者服黃芩湯見利解門余法見後條寒利自利而不渴者屬太陰脾寒也小便清白下利澄徹清穀皆寒利之本證寒利初起用理中湯溫補之見祛寒門若服數劑不見效者屬下焦滑脫宜用赤石脂禹餘糧湯澀之見收澀門倘仍不效則是清濁不分水走大腸宜服五苓散利之見和濕門胸脅滿痛邪氣傳裡必先自胸若脈浮無汗惟胸滿而不及脅者仍屬太陽表分也用麻黃湯發之見發表門若因胸及脅而皆滿者屬少陽經半表半裡證也服小柴胡湯見和解門若十餘日不解胸脅俱滿兼乾嘔潮熱者是少陽兼陽明邪也用大柴胡湯加芒硝兩解之見表裡門若表已解心下及腹引脅滿硬而痛乾嘔尿祕是停飲內實也用十棗湯攻之見攻裡門腹滿腹痛腹中作滿時痛時止喜手按者此為不足之證服桂枝芍藥湯見發表門若不見效次服理中湯溫補之見祛寒門如腹滿大痛拒以手按脈證實者或因誤下邪陷太陰之裡此皆有餘之證服桂枝加大黃湯下之見發表門若腹滿實痛兼潮熱汗蒸大便硬者此為太陰之邪轉屬陽明也宜諸承氣湯攻之見攻裡門其餘證治見四捲心腹門少腹滿痛凡小腹滿按之覺痛兼四肢厥冷小便清長者是冷結膀胱也宜服當歸四逆加吳萸生薑湯見祛寒門若四肢不冷小便雖利時或刺痛者是血蓄膀胱也宜服桃仁承氣湯見理血門如少腹滿痛小水不利者是水蓄膀胱也服五苓散若大小便祕是水熱蓄結也服八正散俱見利濕門結胸傷寒下之太早則成痞硬中風下之太早則成結胸均為表邪乘虛入里辨法硬滿按之而痛者為結胸實邪也硬滿按之不痛者為痞硬虛邪也大結胸證從心下至少腹硬滿而痛手不可近者宜用大陷胸湯攻下之小結胸證微結心下按之方痛不按則不痛宜小陷胸湯開之若身體微熱頭自汗出兼有是證者為水結胸證也宜大陷胸丸攻之俱見攻裡門若漱水不欲咽兼有是證者為血結胸證也或曾衄血瘀血未盡或婦人經來適斷皆能成血結胸證宜用抵當丸或桃仁承氣湯攻之見理血門凡治結胸須詳審其形氣俱實脈實沉大者方可用抵當桃仁承氣大陷胸湯丸攻之若脈浮滑或浮大乃小陷胸證慎不可攻誤攻之必變逆也又有藏結證胸腹兩脅硬滿脹痛舌胎滑白脈浮而細狀似結胸卻屬陰邪治同藏厥見一卷厥陰篇痞鞭傷寒下早則成痞鞭中風下早則成結胸此其常也然論中中風下早未嘗無痞鞭傷寒下早亦有結胸大抵從虛化者多為痞硬從實化者多為結胸也凡陽經熱證心下痞硬者為熱痞服大黃黃連瀉心湯若陽經證汗出惡寒者為寒熱痞服附子瀉心湯若少陽證誤下發熱而嘔心下痞滿者為嘔逆痞服半夏瀉心湯凡陽證誤下心下痞硬下利心煩乾嘔脅下有水氣腹中雷鳴小便不利者為虛熱水氣之痞服生薑瀉心湯若有是證脅下無水氣但痞甚者為虛熱客氣上逆之痞服甘草瀉心湯和之大法凡患痞證若兼無汗惡寒之表宜先服桂枝湯見發表門俟表解後方用大黃黃連瀉心湯以攻痞俱見瀉火門凡痞攻之不解其人煩渴小便不利者先服五苓散見利濕門俟小便利後再照前法以攻痞喘急短氣喘息氣急喝喝而數張口抬肩欠肚者為喘急若短氣則似喘非喘而不張口抬肩也二證皆胸中氣病肺主氣故屬肺也無論喘急短氣若氣促壅塞不能布息者皆屬有餘實證氣短空乏不能續接者皆為不足虛證有內因冷飲傷肺者有內因痰熱灼肺者有外因形寒傷表表主皮毛內合於肺皮毛受邪漸次及膚及肌及胸及腹而入胃皆令病喘當審陰陽表裡從化分別治之但喘急短氣兼直視神昏汗出潤髮脈微肢冷者凶治法凡喘急短氣與三陰寒證同見者是為陰喘宜四逆湯加杏仁五味虛者倍加人參見祛寒門若與三陽熱證同見者是為陽喘用白虎湯見瀉火門表裡俱熱用葛根芩連湯見表裡門若與太陽表證同見者是為表喘表實無汗服麻黃湯發之表實更兼煩躁者服大青龍湯發之表虛有汗服桂枝加厚朴杏仁湯俱見發表門若與陽明裡證同見者是為裡熱喘急短氣實證服承氣湯更兼結胸證服大陷胸丸見攻裡門喘急兼心下有水氣裡實無汗服小青龍湯見發表門如表虛有汗只兼小便不利者用五苓散加葶藶子見利濕門喘急而兼水飲裡實者服葶藶大棗湯見表裡門更兼腹脅硬痛嘔逆短氣小便不利表解而里未和者服十棗湯見攻裡門如水飲喘逆裡寒甚者服真武湯見祛寒門氣虛作喘而無陰陽表裡諸證但見脈沉遲或微細口鼻氣涼喘息氣短用保元湯加杏仁五味子若腎氣虛喘服貞元飲理陰煎俱見補養門痰飲喘急喘而唾痰稠黏喉間漉漉有聲重者聲如拽鋸先宜瓜蒂散吐之見湧吐門次服滾痰丸滌痰湯之類輕者用二陳湯加葶藶子炒研蘇子俱見除痰門余詳四卷喘吼門氣上撞心氣撞吐蛔皆厥陰之本證只氣撞而不吐蛔者其邪猶在太陽表分也宜桂枝湯解之見發表門若氣上撞心更兼小腹引陰急痛者乃陰陽易病也服燒褲襠散見表裡門至若氣上衝喉胸滿難以布息者乃寒實結在胸也服瓜蒂散吐之見湧吐門心下悸動心下築築惕惕怔怔忡忡皆悸動之情狀也如飲水多而小便少水停心下之悸也宜茯苓甘草湯或五苓散見利濕門若心悸厥冷者為寒悸服真武湯見祛寒門如汗後心悸者為虛悸服小建中湯見發表門或不因汗後無故心下悸動怔忡不寧是虛之甚也宜服炙甘草湯見潤燥門余法詳三卷神病門身戰振栗身戰謂身抖聳動也栗謂心內發𢙿也振亦聳動比之於戰則無力也故論中曰振振者皆責其虛也栗者邪氣為之也戰者正氣為之也邪正相交故相爭也此證若生於汗吐下之後是虛其中外而致逆也法當補養若非裡虛致逆則是邪因以衰正因以和而邪將作解當其正勝邪卻之時則戰栗汗出而平矣咬牙寒戰此證有寒熱之分如外候身熱煩躁口渴大便祕結小水赤澀脈洪數者熱也蓋胃熱則咬牙肺熱鬱積反為寒戰治宜清解胃肺之熱如身涼惡寒大小便利脈沉遲者寒也蓋胃寒則咬牙肺寒則寒戰宜溫散寒邪亦有太陽暴受風寒先咬牙寒戰而後發熱惡寒者治宜發表也譫語鄭聲言語心之主也心氣實熱而神有餘則發為譫語聲長而壯亂言無次數數更端此屬實證心氣虛熱而神不足則發為鄭聲音短而細只將一言重復呢喃此屬虛證蓋神有餘則能機變而亂言神不足則無機變而只守一聲也凡譫語鄭聲與三陽經脈證同見者均作熱證實者攻之虛者只宜清解也與三陰經脈證同見者均作寒證寒實宜溫寒虛又當清補也神昏狂亂胃經熱極乘心則神昏熱入於陽則狂亂如神昏狂亂表實無汗者主以三黃石膏湯見表裡門若裡實便祕脈證俱實者服諸承氣湯見攻裡門如不兼表裡證但熱極乘心神昏狂亂者服白虎解毒湯見瀉火門蓄血發狂太陽膀胱經蓄血發狂者必少腹硬痛小便自利若小便不利是為水熱蓄非血蓄也陽明胃府血蓄如狂者必喜忘大便黑若便不黑是為熱極非血蓄也治蓄血發狂重者用抵當湯之類輕者服桃仁承氣湯俱見理血門然發狂證亦有陽盛陰虛之人作汗將解之時邪正交爭奄然發狂濈然汗出其邪自解勿誤用藥再有夾血證解見後條循衣摸床循衣摸床危惡證也有因太陽火劫取汗致陽盛傷陰陰若未竭則小便通利尚可施治若陰已竭則小便難出不必治也有因陽明熱極汗吐下三法失宜致成壞病其熱彌深脈若實者尚堪任下若脈弱者不堪攻下則難治矣此等危惡之證陰陽混淆虛實莫辨醫無從下手之處惟用人參生地煎湯時時與服鼻上汗出者生或用六味地黃湯見補養門或服節庵升陽散火湯隨證加味見瀉火門冒心撮空傷寒熱邪乘肺元氣虛衰不能主持致有此證陽虛氣弱故叉手冒心虛陽無主故兩手撮空熱昏其神故循衣摸床此三證小便利者可治蓋謂肺氣猶能降膀胱猶能化氣而腎水未枯也俱服節庵升陽散火湯見瀉火門至若久病垂危孤陽欲絶而見此證者煎人參湯冷服以持生機王海藏曰婦人産後及崩漏失血等證去血過多因而燥涸致閉目撮空循衣摸床揚手擲足錯語神昏脈浮弦而虛者服當歸補血湯見理血門經曰陽生則陰長此其義耳如因過汗患此服桂枝甘草湯見發表門但欲寐證傷寒行陰陰主寐但欲寐少陰證也若表裡已解其人身和脈微靜但欲寐者不必施治蓋解後貪眠呼之即醒醒而又睡此為陰氣來復非陰盛困陽者比也至風溫證亦欲寐貪眠然脈浮身重發熱多汗鼻息鼾鳴為異耳見後同傷寒門飢不欲食飢不欲食吐蛔厥逆皆厥陰本證也若傷寒取下後飢不欲食則屬陽明陽明病則必懊憹心中煩甚頭額多汗是熱在胃中宜服梔子豉湯吐之至厥陰病必兼厥逆吐蛔其脈必微若不微反緊更心煩者此非裡寒虛邪是裡寒實邪停蓄胸中也宜瓜蒂散吐之見湧吐門陰陽咽痛傷寒咽痛有熱有寒如咽乾腫痛為三陽熱證宜甘桔半夏苦酒豬膚四湯分別治之見瀉火門若不幹不腫而咽痛不休此為三陰寒證宜四逆湯加桔梗治之見祛寒門平常咽痛詳見四卷咽喉門舌色舌胎舌者心之外候正紅滋潤乃為無病若初感傷寒內外深紅則為有熱外紅內紫則為熱甚宜辛涼汗之舌胎滑白則為表寒宜辛溫汗之其胎漸厚則為傳少陽半里之熱未成半表之寒猶在也宜服小柴胡湯和解之且舌胎色白有寒熱之分如白胎滑厚與陰經脈證同見者乃屬藏虛寒結用理中湯加枳實溫而開之見祛寒門如白胎干薄與陽經脈證同見者乃氣虛液竭用人參白虎湯清而補之見瀉火門若白胎漸變黃色此為去表入里其熱尚淺表不罷者服三黃石膏湯見表裡門已入里者服涼膈散如焦乾黑色或芒刺裂紋此為裡熱極深服梔子金花湯俱見瀉火門舌黑裂紋更兼腹滿大痛煩渴便祕者服大承氣湯下之見攻裡門夫紅者火色也黑者水色也若舌黑與三陽熱證同見者此為熱極反兼勝己之化清之下之尚未可愈也若與三陰寒證同見者則為水來剋火百無一生治者先以生薑捺之其黑色稍退急用理中附子四逆等湯救之猶或可活也俱見祛寒門頤毒傷寒頤毒皆因汗下失宜毒熱挾少陽相火上攻而成若其人陽氣素盛則高腫色紅焮痛易於成膿順而易治服連翹解毒湯見瀉火門若其人陽素虛或服涼藥或敷涼藥郁遏毒熱伏藏在裡內攻神昏外毒漫腫不紅不熱木硬少疼則逆而難治矣蓋毒伏未發之前往往似三陰亡陽之證脈伏不見冷汗如淋肢冷如冰但目睛了了煩渴不大便指甲紅紫身輕不重為異耳治法當按外科面部目眩耳聾目眩者目忽昏黑不明也耳聾者耳忽閉塞無所聞也皆少陽經主證也凡目明耳聰神自完整若因汗吐下三法失宜致變諸逆甚者目眩而神昏亂言乃神散氣脫之候則難救矣若因誤發濕家溫家汗致變諸逆甚者神昏不能言耳聾無聞目不見物通身青色面色乍變名曰重暍主死若傷寒傳入少陽目眩耳聾口苦脅痛乃應有之證不與變逆同也主以小柴胡湯見和解門發黃陽明病應通身有汗謂之熱越若頭有汗身無汗者是熱不得越也渴而引飲小便不利是停水也熱與濕瘀從土而化外薄肌膚謂之濕熱發黃素有寒濕或表邪遏郁已經成黃又經發汗傳入太陰從陰而化謂之濕寒發黃辨法陽明屬陽色必明亮太陰屬陰色必晦暗此其大概也治濕熱發黃初起表實無汗者服麻黃連軺赤小豆湯發之見發表門陽黃裡實大便閉者服茵陳蒿湯下之見利濕門若陽黃表裡無證但熱盛發黃者服梔子柏皮湯清之見湧吐門凡陽黃身體枯燥如煙燻者死治濕寒發黃初起服茵陳四逆湯溫之見祛寒門若陰黃大便溏小水祕者服茵陳五苓散利之見利濕門凡陰黃環口黧黑冷汗不止者主死太陽蓄血亦有發陽黃者多與發狂同見當按蓄血治見前蓄血發狂此治傷寒發黃之大法也平常發黃見四卷黃疸門發斑痧疹傷寒汗下失宜外邪怫鬱內熱泛出致發斑發痧發疹其發迂緩不似瘟斑痧疹其發迅烈另見三卷瘟疫門要之發於衛分者為痧衛主氣故色白如膚粟發於榮分者為斑為疹榮主血故色紅然膚淺者為疹深重者為斑斑或如豆甚則連屬成片也正紅者輕紫赤者重黑色者死凡三陽傷寒斑疹初起表熱輕者用升麻葛根湯合消毒犀角飲見瀉火門表熱重者服三黃石膏湯見表裡門發表已透服消斑青黛飲見瀉火門凡陽分斑痧疹初起表裡不清者即服雙解通聖散解表清裡見表裡門若陰分斑痧疹其色淡而稀暗若隱若見留滯皮肉之間治法不同也有因先在陽經已成斑疹邪傳入里從陰化寒者有因原屬陽分斑疹或過服寒涼之藥冰伏其毒致內陷而為陰斑陰痧陰疹者法當從陰寒治按一卷三陰篇審證溫散之衄血陽明衄血熱在裡也太陽衄血熱瘀經也太陽失汗衄血則兼頭痛目瞑陽明失下衄血則兼漱水不欲咽衄後身涼脈靜邪將解也若仍不解是衄未盡熱留於榮也治法衄血無汗屬表熱者服升麻葛根合犀角地黃湯見理血門如欲作衄尚未衄時惡寒無汗表實未解者先服麻黃湯汗之見發表門若熱盛衄血只用犀角地黃湯加炒芩連清之見理門若衄血而兼表實裡熱者當用麻黃湯合犀角地黃湯兩解之吐血傷寒吐血皆因失汗失下火逆不解致邪熱熾盛沸騰經血而上逆也若血從口鼻耳目而出小便難者此由強發少陰經汗名曰下厥上竭主死治法三陽經熱盛吐血者用升麻葛根湯合犀角地黃湯方見理血門熱甚再加芩連清解之若血瘀吐血胸中必滿不時刺痛用桃仁承氣湯合犀角地黃湯攻之如暴吐腐臭之血名曰內潰或暴吐黑血皆屬不治凡吐血過多面唇爪甲俱無紅色者名曰血脫輕者服聖愈湯重者服人參養榮湯以上諸方見理血門平常失血詳見三卷二便膿血陽經之熱下注膀胱傷其營分熱少血多瘀成血蓄熱多血少熱迫血行血不得蓄而走下竅故小便尿血服八正散見利濕門導赤散見瀉火門陰經之熱轉迫陽明傷其營分瘀則血蓄喜忘如狂不蓄則便血熱腐則便膿便膿熱鬱裡急墜重所必然也輕者服黃連阿膠湯清之見和解門重者服白頭翁湯見瀉火門滑脫不禁服桃花湯澀之見收澀門平常便血見三卷失血門狐惑證狐惑證是牙疳下疳之古名下疳即曰狐肛門陰器被疳蟲蝕爛也牙疳即曰惑蝕咽腐齦脫牙穿腮破唇是也此因傷寒病後餘毒與濕熱鬱積慝之為害或生斑疹之後或患癖疾下利之後其為患亦皆同也外證面色與目眥或赤或白或黑時時不一喜睡而目不能閉潮熱聲啞腐爛之處穢氣燻人若胃壯能食堪受攻病之劑者庶可得愈也攻牙疳見外科二卷齒部治下疳見外科三卷下陰部百合病百合病謂傷寒過期留連不解不分經絡百脈悉合為一病也如寒似熱諸藥無靈欲飲不能飲欲食不能食欲臥不能臥欲行不能行精神忽忽如有鬼神附其形體而莫知所適從也如此證脈數撒尿時輒頭痛者六十日乃愈若撒尿時頭不痛惟淅淅然惡風寒者四十日乃愈若撒尿爽快但頭眩者二十日乃愈越經證傷寒病後心下不硬腹中不滿二便如常脈亦和平身不惡寒只微熱不解形如醉人漸變神昏不語睡中獨語目赤口乾與粥則咽不與勿思此因熱邪自足經傳入手經也故曰越經服瀉心導赤各半湯見瀉火門夾血證此與前蓄血發狂證治各別其證不惡寒頭腹不痛只發熱大渴小便清利大便黑色狂言妄語如見鬼神此因內經血鬱肝脾受病也不與前條桃仁承氣證相同主以當歸活血湯見理血門熱入血室婦人傷寒與男子治法同也惟産後經候熱邪乘虛入於血室治法不同其證晝日明瞭夜則譫語如見鬼狀主以小柴胡湯見和解門加生地丹皮無汗則為表實加麻黃髮汗有汗為表虛加桂枝解肌若有惡寒發熱之表在前已經發汗今雖無汗不可再加麻黃重發其汗只加桂枝解之若有如瘧之寒熱則加麻黃桂枝兩解之若發熱煩渴則為裡熱用柴胡白虎湯見瀉火門去半夏加花粉葛根若胸脅少腹或滿或脹痛則為瘀血內攻也宜小柴胡湯合桃仁承氣湯攻之見和解理血二門傷寒熱入血室亦有厥逆下利屬中寒之證者用小柴胡湯去黃芩加炮附子乾薑溫解之余法見婦科一卷雜證門食復傷寒初愈氣血俱虛營衛未調腸胃未和青蔬白飯亦宜適可而止忌食甘肥生冷發物若貪食過飽胃弱難消因反復煩熱者名曰食復治法脈浮有表者服枳實梔豉湯汗解之脈沉有里者服梔豉大黃湯下解之俱見湧吐門如無表裡證服小柴胡湯和解之見和解門若食復兼口燥煩渴喜嘔者服竹葉石膏湯清解之見瀉火門勞復傷寒新愈須要養息若過於勞役致生熱煩者名曰勞復治法初起兼有表裡證者服枳實梔豉湯先汗之見湧吐門若系內傷氣虛勞復者服補中益氣湯調養之見補養門如犯房勞陰虧煩熱者用六味地黃湯以乾地黃易熟地黃見補養門氣虛加人參房勞復陰陽易傷寒新愈肆行交接因而復病煩熱者名房勞復服前六味地黃湯又有新愈交接傷寒餘邪內發致病男傳不病之女病女傳不病之男者名陰陽易即交易之義也其證少腹急痛牽引陰中身重少氣頭暈目眩四肢拘攣熱氣衝胸治以燒褲襠散見表裡門太陽陽邪停飲太陽陽邪有水逆消渴之病如太陽中風有渴欲飲水水入即吐者名曰水逆如飲水多而小便少者名曰消渴發熱汗出風邪煩熱也小便不利水入則吐則為停飲治法其脈浮數屬風熱者主以五苓散見利濕門且多服熱湯令出微汗外解太陽內利停水若不喜熱湯只欲飲冷水者是熱盛也五苓散內加石膏寒水石滑石水煎服余詳太陽上篇太陽陰邪停飲太陽陰邪有水氣者因太陽傷寒表不解也外證發熱無汗而兼乾嘔微喘而咳此屬飲病主證宜服小青龍湯見發表門以外發寒邪內散寒飲或小便不利少腹作滿或下利或口渴或喘噎此飲病或有之證亦宜小青龍湯加減如小便不利少腹滿者是水停下焦大便下利是水走大腸也減去麻黃重加茯苓專滲利之如喘氣上逆加杏仁降之如兼厄噎是內寒甚也去麻黃加附子溫散之如口渴去半夏以避燥加花粉以生津余法詳一卷太陽篇少陰陽邪停飲少陰邪從陽化為熱證兼有停飲之病者如少陰當欲寐今至六七日反心煩不得眠是少陰內熱也下利而渴嘔逆而咳小水不利是水飲停也主以豬苓湯去其熱血利其水見利濕門余詳一卷少陰篇少陰陰邪停飲少陰陰寒之證兼有水氣病者其證腹中疼痛四肢沉重牽疼大便自利小水不行皆少陰停飲之主證用真武湯溫中利水見祛寒門若少陰停飲或咳或嘔或小便自利此皆或有之證亦用真武湯加減如咳則加生薑細辛五味子小便自利去茯苓嘔去附子倍加生薑大便下利去白芍加乾薑隨證施治可也以上皆傷寒門中辨證施治之總括也所有精義當於六經篇中詳之辨無陽證陶節庵曰治頭痛項強發熱惡寒無汗之證若服發汗藥二三劑不出者此因陽虛不能作汗名曰無陽證俗醫不審虛實不審時令動以麻黃重藥劫取其汗誤人多矣主以再造散見發表門人第知參耆能止汗而不知能發汗蓋參耆在表藥隊中則助表藥而解散外邪也李東垣曰丹溪治虛人感冒多用補中益氣湯內加表藥以發汗此為扶正祛邪同陶節庵意也辨亡陽證凡身熱汗多多脈來浮盛雖與風溫證相似但不鼾睡口中卻和不渴不燥脈雖浮盛按之空虛此非風溫乃亡陽證也主以獨參湯生脈保元湯玉屏風散俱見補養門誤汗厥逆筋惕肉瞤服真武湯見祛寒門辨熱結下利陶節庵曰熱邪傳裡胃有燥屎心下硬痛身熱口渴譫語下利純是清水者此非內寒之冷利乃日飲湯藥而下滲也名熱結下利俗醫妄稱為漏底傷寒以熱藥止之殺人多矣治法初起身熱脈實者用黃龍湯下之見攻裡門若年老氣血衰弱之人湯內減去硝黃若太陽病外證未除而數下之遂協熱下利利下不止心下痞硬表裡不解者服桂枝人參湯見發表門辨類傷寒同傷寒總括類傷寒有五證初病之時皆與太陽表證相類也同傷寒有十二證初病之時皆與太陽表證相同也初見表證雖與太陽傷寒相類相同而病因脈證治法實不同類也蓋傷寒因傷冬月之正寒而得名同傷寒則因傷三時之暴寒傷感風濕食熱異氣疫邪兼時令之氣而為病也世人見其傳變六經表裡情狀似乎傷寒通名傷寒又名曰時氣故以同類二字別之分疏證治於下類傷寒有五證停痰傷食腳氣虛煩內癰是也同傷寒十二證冬溫寒疫瘟疫溫病熱病風溫溫瘧濕溫中暍溫毒風濕痙證是也類傷寒門停痰一曰停痰該飲而言也清稀者為飲稠黏者為痰初起發熱惡寒表實無汗狀類傷寒但不頭頂強痛只胸膈滿悶痰飲壅塞喘氣不得息或氣上衝咽為異耳諸般證治詳見三卷痰飲門傷食一曰傷食統積滯而言也初起寒熱無汗狀類傷寒但身不強痛只心胸痞悶或腹脹痛失氣噫臭吞酸吐酸為異耳治詳三卷中食四卷腹痛腳氣一曰腳氣兼干濕二證而言也初起表證狀類傷寒但病起自腳兩足或腫痛焮熱或乾枯冷痛大便硬難為異耳證治載三卷腳氣門虛煩一曰虛煩兼懊憹不眠中虛等證而言也初起惟發熱心煩而無惡寒無汗之表證亦無躁渴便祕之裡證為異耳治法見前諸煩不眠條內癰一曰內癰統肺脾心肝腎胃府三焦大小腸癰而言也此九證初起皆狀類傷寒然各經募穴必隱痛微腫現出本經應有之證詳見外科二卷後再有羊毛疔暗疔內疔俱狀似傷寒證治各別詳見外科四卷疔瘡門又有大頭天行狀似傷寒脈證治法詳見四卷頭痛門同傷寒門總括金鑑曰同傷寒十二證皆非四時正令之常病也惟冬病傷寒春病傷風夏病暑熱秋病瘧疾乃四時正令之常病若春應暖而反寒夏應熱而反涼秋應涼而反熱冬應寒而反溫此非其時而有其氣疫為殃也冬溫寒疫瘟疫此三證病因異而治法同如冬應冷而反溫致表裡傳經同乎傷寒者名曰冬溫如春應溫而反寒致表裡傳經同乎傷寒者名曰寒疫若一時之氣不正長幼皆病互相傳染同乎傷寒而傳變尤速者名曰瘟疫治法須識歲氣太過不及六淫勝復亢害承製之理見八集運氣篇及審人之強弱藏之虛實輕者用雙解通聖散解表通里重者用二聖救苦丹俱見表裡門再有時疫瘟斑痧疹詳載三卷瘟疫門春溫病夏熱病經曰冬傷於寒春必病溫至夏為熱病熱病者皆傷寒之類也冬傷於寒謂冬傷正令微寒未即病也凡陰虧之人冬不藏精或辛苦之人其汗易出內外失其固密在冬則早已損傷腎藏陰氣陽熱獨治所以至春一感微邪即引內熱炎炎之勢不能已矣故病而即渴不惡寒也二證名異而治法同如初起無汗表實裡熱者服雙解通聖散見表裡門若有汗而內熱盛者用黃連解毒湯白虎湯涼膈散之類清解裡熱俱見瀉火門熱甚便祕用諸承氣湯攻之見攻裡門大抵溫病熱病陽熱居多清之攻之急瀉陽以救陰苟因循失治熱盛昏狂諸證叢起則難治矣亦有表無實邪里無實熱者當循一卷六經傷寒治例活法治之總注曰凡治春溫夏熱病初起無汗者用大青龍湯發之若時有汗時無汗者服桂枝二越婢一湯俱見發表門若蒸熱發熱自汗煩渴者服桂枝白虎湯見瀉火門如表裡俱實服雙解通聖散見表裡門表實無汗倍用麻黃裡實便祕倍用大黃量其病之輕重藥之多少而解之三日之前未有不愈者其有外感邪重內早傷陰已經汗下而不解者又當審其表裡虛實隨其脈證或清散或和解活變施治如黃芩敗毒散之類聽其選用見發表門又曰前法惟西北苦寒之地四時皆可行之至江淮楚粵地偏溫暖處但於冬月春初乃可用此法若春末秋前即脈證合有當用麻桂青龍等湯者亦必輕而減之適可而止慎不可過過則腠理疏反致變逆矣經所謂同病異治者此之謂也余可類推矣風溫冬傷於寒不即為病復感春寒而病者名曰春溫病若冬傷於寒不即為病復感春風而病者名曰風溫其證身重喜睡鼻息鼾鳴發熱自汗治法初起六脈浮盛表實壯熱微有汗者宜表散風邪服葳蕤湯隨證加味見表裡門若蒸熱汗多脈虛貪眠者法宜清解服桂枝合白虎湯見瀉火門如初起微有表者但服人參敗毒散清之見發表門總注曰風溫證原有汗不可汗也若誤汗之益助火邪則身熱如火自汗津津不止言語難出身重多眠鼻息鼾鳴不已也風溫證陰陽脈俱浮不可下也若誤下之熱陷膀胱竭其津液則直視遺尿小便點滴而出也風溫證內熱盛若誤以火熏蒸強汗火旺津亡則發黃瘛瘲而成驚癇也風溫禁用三法脈實汗少主以葳蕤湯脈虛汗多主以桂枝合人參白虎湯此至當之法也溫瘧經曰溫瘧得之冬中於風寒氣藏於骨髓之中至春陽氣尚微邪氣不能自出因值大暑爍腦髓消肌肉腠理發泄或用勞役邪氣與汗同出出則陰虛而陽盛故熱生也衰則氣復入入則陽虛而陰盛故後作寒也證治與前春溫夏熱病相同喘渴無汗服麻杏甘石湯見發表門濕溫春溫病復傷於濕名曰濕溫其證身重難於轉側頭痛胸滿多汗妄言兩脛逆冷濕熱內郁也用白虎湯見瀉火門加蒼朮茯苓兼治之中暍暍即暑也閣中暑中熱而且言也證有陰陽之分脈證治法見三卷中暑門原文曰太陽病中熱者暍是也其人汗出惡寒身熱而渴也又曰太陽中熱者身熱疼重而脈微弱此以夏月傷冷水水行皮中所致也又曰太陽中暍者發熱惡寒身重而疼痛其脈弦細芤遲小便已灑灑然毛聳手足逆冷小有勞身即熱口開前板齒燥若發汗則惡寒甚加溫針則發熱甚數下之則淋甚溫毒夏熱之病復中於暑暑熱合邪為病尤烈故名溫毒證治同春溫夏熱病風濕傷濕之病復感於風風濕合邪故名風濕其證發熱身重肢體牽痛不寧原文曰病者一身盡痛發熱日晡所劇者此名風濕此病傷於汗出當風或久傷取冷所致也證治見三卷中濕門痙證風寒濕三邪合而為痙其證背反張搖頭口噤項強拘急轉側艱難身熱足寒面目赤色也治法風濕盛者則有汗為柔痙風寒盛者則無汗為剛痙均用小續命湯隨證加減見祛風門又法剛痙無汗而惡寒者服葛根湯柔痙有汗而惡風者服桂枝加葛根湯俱見發表門其餘證治詳見三卷六經傷寒脈證治法已次第疏明分節集解詳載首卷而又歷舉傷寒門中所見諸證與夫類傷寒同傷寒一切證治辨別於二卷之中凡所以治傷寒者理無不該法無不備矣然近世治同傷寒類傷寒多用劉河間兩解等法每獲神效誠治斯證之捷法也今復採輯解利初法解利後法明白指陳附録於二卷之末俾學者知所變通庶幾於傷寒一證經權常交有所遵循而無遺法云傷寒附法劉河間解利初法雙解通聖散見醫方表裡門功能發表攻裡故曰雙解河間制此方解利四時冬溫春溫夏熱秋熱正令傷寒凡邪在三陽表裡不解者以兩許為劑加蔥薑淡豆豉煎湯服之俟汗下兼行表裡即解形氣強者兩半為劑形氣弱者八錢為劑若初服因汗少而不解者則為表實倍加麻黃以汗之若因便硬不解者則為裡實倍加大黃芒硝以下之連進二三服必令汗出下利而邪自解也今人不知其妙以河間過用寒涼仲景治傷寒初無下法棄而不用深可惜也不知其法神捷莫不應手取效從無寒痞結之變即有一二不解者非未盡法之善則必已傳陽明故不解也再詳後法河間解利後法先服雙解通聖散汗下已通而仍不解者皆因汗之不徹或已傳經治之不及也又當按法施治如表邪已解但里有微熱煩渴者服桂苓甘露飲以和解太陽之裡如內熱太盛煩熱大渴者用白虎解毒湯以清陽明之裡俱見瀉火門若表未解又傳陽明身熱而煩者用柴葛解肌湯兩解之見發表門若表實無汗大熱煩渴者用三黃石膏湯以清表裡之熱見表裡門若里有熱尿赤而澀者用涼膈散重加滑石末以清利之見瀉火門若胃實便祕潮熱而兼有微表者用大柴胡湯解表通里見表裡門若胃實便祕不兼表證當分別輕重用諸承氣湯攻下之見攻裡門以上皆劉河間解利二法也附録於此以備參考河間名完素辨難治脈證難治死證總括金鑑曰病有死生治有難易生病不藥可愈死病雖藥莫救何則以陰陽邪正有盛衰也正盛邪衰則生陰盛陽衰則死如傷寒陽證見浮大數動滑實之陽脈則易愈而生如見沉微澀弱弦小之陰脈則難治而死凡屬陰病得陽脈者可生凡屬陽病得陰脈者主死也若脈代散真氣衰敗也若大熱不止脈失神者正衰邪盛也陰毒陽毒亢極不生化也色枯聲敗內外兩奪也厄逆無休元氣不藏也水漿不入生無所賴也五絶證者謂形若煙燻神昏憒亂直視搖頭此陽邪獨留攻心而絶也環口黧黑腹滿下利不止冷汗陽黃者此為脾絶也脈但浮而無和緩象是無胃氣汗出如油喘息下休睡中鼾聲出多入少者此為肺絶也唇吻反青四肢冷汗舌卷囊縮者此為肝絶也面色黑暗齒長枯垢遺尿遺屎者此為腎絶也又有誤發風溫之汗因而成痙者誤發濕溫之汗名曰重暍者強發少陰之汗動其經血從口鼻耳目出名曰下厥上竭者汗後狂言不食仍復發熱不為汗衰脈常躁疾名曰陰陽交死之形者厥逆不回至七八日即通遍身膚冷而躁無暫安時此為陰邪盛極真陽飛越名藏厥者凡厥逆而甚者多無脈服四逆白通等湯脈微微續出從小而大真陽漸復也可生脈若暴出六脈如常者名曰回光返照也主死凡厥逆多下利當不能食若忽然能食者名曰除中中者胃也除者去也謂胃氣已去即反能食亦無補於胃也故仲景曰除中者死凡諸病久不能食忽然大能食而即死者此類是也以上皆言難治之死證也辨易愈生證易愈生證總括易愈之病取於神則神清取於色則色澤取於聲則音長取於體則身輕取於皮則膚潤取於脈則和洪皆一派不死之證故曰生證也若有如前生證忽然口噤不語煩躁而甚六脈停伏者非變凶也乃邪正交爭生戰汗之候為將愈之兆也凡傷寒渴者多陽證易治易愈若忽然飲多尋常消散無停者此為釀汗而邪作解也傷寒初起多不能食若漸漸能食且脈浮者此為胃和邪還於表而作解也若不即解者陰陽未得其時也如子時得之午時必解陽濟陰生而解也午時得之子時必解陰從陽化而解也以上皆傷寒易愈之生證也天時之不齊民病所由生也故素問言五運六氣特詳醫不明此則不識亢害承製淫勝郁復之理不足以稱醫之良也但經文散見諸篇學者每有望洋之嘆而太虛理氣天地陰陽宋儒各發妙論五行質氣生剋制化節令五音天符地會南北二政諸家多所發明欽惟御篡醫宗金鑑博採群言歸諸折衷另著心法要旨二卷愚已編次成書列於八集識者幸垂覽焉
